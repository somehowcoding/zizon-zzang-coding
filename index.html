<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존 SUPREME v20.1 - FIXED INTERFACE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --z-blue: #4f80ff; --z-bg: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--z-bg); margin: 0; overflow: hidden; height: 100vh; }
        
        /* [TOP NAV] - 메뉴가 사라지지 않도록 높이 고정 */
        .zizon-header { height: 64px; background: white; border-bottom: 2px solid #e2e8f0; display: flex; align-items: center; padding: 0 24px; position: relative; z-index: 1000; }
        
        /* [LAYOUT] */
        .main-container { display: flex; height: calc(100vh - 64px); }
        
        /* [LEFT AREA] */
        .sidebar-area { width: 420px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .stage-box { width: 380px; height: 285px; margin: 20px auto; border: 1px solid #cbd5e1; border-radius: 16px; position: relative; overflow: hidden; background: #fff; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05); }
        
        /* [VARIABLE LAYER] */
        .var-display { position: absolute; top: 10px; left: 10px; z-index: 50; pointer-events: none; }
        .var-box { background: rgba(255,255,255,0.9); border: 1.5px solid #4f80ff; border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 900; margin-bottom: 5px; display: flex; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* [STATUS PANEL] */
        .status-panel { background: #f8fafc; margin: 0 20px 15px; padding: 15px; border-radius: 16px; border: 1px solid #e2e8f0; }
        .status-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 8px; font-size: 11px; }
        .status-input { width: 100%; border: 1px solid #cbd5e1; padding: 5px; border-radius: 6px; font-weight: bold; outline: none; }

        /* [OBJECT LIST] */
        .list-header { padding: 0 20px 8px; display: flex; justify-content: space-between; align-items: center; }
        .obj-list-scroll { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
        .obj-card { display: flex; align-items: center; gap: 10px; padding: 12px; border: 2px solid transparent; border-radius: 14px; background: #f1f5f9; margin-bottom: 8px; cursor: pointer; }
        .obj-card.active { border-color: var(--z-blue); background: #eff6ff; }

        /* [RIGHT AREA] */
        #blocklyDiv { flex: 1; height: 100%; }

        .btn { padding: 10px 18px; border-radius: 10px; font-weight: 900; cursor: pointer; border: none; font-size: 14px; transition: 0.2s; }
        .btn-blue { background: var(--z-blue); color: white; }
        .btn-ghost { background: #f1f5f9; color: #475569; }
    </style>
</head>
<body>

<header class="zizon-header">
    <div class="flex items-center gap-2 mr-10">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black">Z</div>
        <span class="font-black text-xl">SUPREME v20.1</span>
    </div>
    <div class="flex gap-3">
        <button id="run-btn" onclick="engine.toggle()" class="btn btn-blue">▶ 시작하기</button>
        <button onclick="painter.open()" class="btn btn-ghost">🎨 모양 그리기</button>
        <button onclick="vars.add()" class="btn bg-purple-100 text-purple-700">➕ 변수 만들기</button>
    </div>
</header>

<div class="main-container">
    <div class="sidebar-area">
        <div class="stage-box">
            <div id="var-layer" class="var-display"></div>
            <div id="render-layer" class="w-full h-full"></div>
        </div>
        
        <div class="status-panel">
            <div class="status-grid">
                <div class="col-span-2">이름 <input id="st-name" class="status-input" oninput="obj.sync()"></div>
                <div>X <input id="st-x" type="number" class="status-input" oninput="obj.sync()"></div>
                <div>Y <input id="st-y" type="number" class="status-input" oninput="obj.sync()"></div>
                <div>방향 <input id="st-rot" type="number" class="status-input" oninput="obj.sync()"></div>
                <div>크기 <input id="st-size" type="number" class="status-input" oninput="obj.sync()"></div>
            </div>
        </div>

        <div class="list-header">
            <span class="font-black text-slate-400 text-[10px] uppercase">Object List</span>
            <button onclick="obj.add()" class="text-blue-600 font-black text-xs hover:underline">+ 추가하기</button>
        </div>
        <div id="obj-list" class="obj-list-scroll"></div>
    </div>
    
    <div id="blocklyDiv"></div>
</div>

<div id="painter-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;">
    <div class="bg-white p-8 rounded-[32px]">
        <canvas id="draw-canvas" width="400" height="300" style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:16px;"></canvas>
        <div class="flex gap-3 mt-6">
            <button onclick="painter.save()" class="flex-1 btn btn-blue">저장</button>
            <button onclick="painter.close()" class="flex-1 btn btn-ghost">닫기</button>
        </div>
    </div>
</div>

<script>
const state = {
    variables: { "점수": 0 }, // 1. 점수 변수 기본 생성
    objects: [],
    selectedId: null,
    isRunning: false
};

const engine = {
    workspace: null,
    init: function() {
        this.defineBlocks();
        this.workspace = Blockly.inject('blocklyDiv', {
            toolbox: this.getToolbox(),
            renderer: 'zelos'
        });
        
        this.workspace.addChangeListener(e => {
            if (e.isUiEvent || !state.selectedId) return;
            const target = state.objects.find(o => o.id === state.selectedId);
            if (target) target.xml = Blockly.Xml.workspaceToDom(this.workspace);
        });

        // 2. 처음 시작 시 오브젝트 1개 자동 생성
        obj.add("엔트리봇");
        vars.update();
    },

    defineBlocks: function() {
        const B = Blockly.Blocks, JS = javascript.javascriptGenerator;
        B['e_start'] = { init: function() { this.appendDummyInput().appendField("🚩 시작했을 때"); this.setNextStatement(true); this.setColour("#33b233"); } };
        B['m_move'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField("이동 방향으로"); this.appendDummyInput().appendField("만큼 움직이기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); } };
        B['m_rot'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField("방향을"); this.appendDummyInput().appendField("도만큼 회전"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); } };
        B['m_bounce'] = { init: function() { this.appendDummyInput().appendField("화면에 닿으면 튕기기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); } };
        B['f_forever'] = { init: function() { this.appendDummyInput().appendField("계속 반복하기"); this.appendStatementInput("DO"); this.setPreviousStatement(true); this.setColour("#ccb233"); } };
        
        B['v_get'] = { init: function() {
            this.appendDummyInput().appendField(new Blockly.FieldDropdown(() => Object.keys(state.variables).map(v => [v, v])), "VAR");
            this.setOutput(true, "Number"); this.setColour("#cc33cc");
        }};
        B['v_set'] = { init: function() {
            this.appendValueInput("V").setCheck("Number").appendField(new Blockly.FieldDropdown(() => Object.keys(state.variables).map(v => [v, v])), "VAR").appendField("를");
            this.appendDummyInput().appendField("로 정하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#cc33cc");
        }};
        B['v_add'] = { init: function() {
            this.appendValueInput("V").setCheck("Number").appendField(new Blockly.FieldDropdown(() => Object.keys(state.variables).map(v => [v, v])), "VAR").appendField("에");
            this.appendDummyInput().appendField("만큼 더하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#cc33cc");
        }};

        JS.forBlock['e_start'] = () => "";
        JS.forBlock['m_move'] = (b, g) => `moveSteps(${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0});\n`;
        JS.forBlock['m_rot'] = (b, g) => `target.rot += ${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0}; obj.render();\n`;
        JS.forBlock['m_bounce'] = () => `bounce();\n`;
        JS.forBlock['f_forever'] = (b, g) => `while(active()){ ${g.statementToCode(b, 'DO')} await wait(0.01); }\n`;
        JS.forBlock['v_get'] = (b) => [`state.variables["${b.getFieldValue('VAR')}"]`, javascript.Order.ATOMIC];
        JS.forBlock['v_set'] = (b, g) => `state.variables["${b.getFieldValue('VAR')}"] = ${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0}; vars.update();\n`;
        JS.forBlock['v_add'] = (b, g) => `state.variables["${b.getFieldValue('VAR')}"] += ${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0}; vars.update();\n`;
    },

    getToolbox: () => `<xml>
        <category name="시작" colour="#33b233"><block type="e_start"></block></category>
        <category name="움직임" colour="#33b2cc">
            <block type="m_move"><value name="V"><block type="math_number"><field name="NUM">10</field></block></value></block>
            <block type="m_rot"><value name="V"><block type="math_number"><field name="NUM">15</field></block></value></block>
            <block type="m_bounce"></block>
        </category>
        <category name="흐름" colour="#ccb233"><block type="f_forever"></block><block type="controls_if"></block></category>
        <category name="변수" colour="#cc33cc"><block type="v_get"></block><block type="v_set"></block><block type="v_add"></block></category>
        <category name="계산" colour="#ee7d16"><block type="math_arithmetic"></block><block type="math_number"></block></category>
    </xml>`,

    toggle: function() {
        state.isRunning = !state.isRunning;
        document.getElementById('run-btn').innerText = state.isRunning ? "■ 정지하기" : "▶ 시작하기";
        if(state.isRunning) {
            state.objects.forEach(o => {
                const code = javascript.javascriptGenerator.workspaceToCode(Blockly.Xml.domToWorkspace(o.xml, new Blockly.Workspace()));
                this.run(o, code);
            });
        } else obj.reset();
    },

    run: async function(target, code) {
        const wait = s => new Promise(r => setTimeout(r, s * 1000));
        const active = () => state.isRunning;
        const moveSteps = s => {
            const rad = (target.rot * Math.PI) / 180;
            target.x += Math.cos(rad) * s;
            target.y += Math.sin(rad) * s;
            obj.render();
        };
        const bounce = () => {
            if(Math.abs(target.x) > 170) { target.x = target.x > 0 ? 170 : -170; target.rot = 180 - target.rot; }
            if(Math.abs(target.y) > 125) { target.y = target.y > 0 ? 125 : -125; target.rot = -target.rot; }
            obj.render();
        };
        const AsyncFn = Object.getPrototypeOf(async function(){}).constructor;
        try { await new AsyncFn('wait','active','target','state','vars','obj','moveSteps','bounce', code)(wait,active,target,state,vars,obj,moveSteps,bounce); } catch(e){}
    }
};

const obj = {
    add: function(name = null) {
        const id = "o_" + Date.now();
        state.objects.push({
            id, name: name || "오브젝트 " + (state.objects.length + 1),
            x: 0, y: 0, rot: 0, size: 100, img: null,
            xml: Blockly.Xml.textToDom('<xml xmlns="https://developers.google.com/blockly/xml"><block type="e_start" x="20" y="20"></block></xml>')
        });
        this.select(id);
    },
    select: function(id) {
        state.selectedId = id;
        const target = state.objects.find(o => o.id === id);
        engine.workspace.clear();
        Blockly.Xml.domToWorkspace(target.xml, engine.workspace);
        document.getElementById('st-name').value = target.name;
        document.getElementById('st-x').value = Math.round(target.x);
        document.getElementById('st-y').value = Math.round(target.y);
        document.getElementById('st-rot').value = target.rot;
        document.getElementById('st-size').value = target.size;
        this.updateList();
    },
    sync: function() {
        const target = state.objects.find(o => o.id === state.selectedId);
        if(!target) return;
        target.name = document.getElementById('st-name').value;
        target.x = Number(document.getElementById('st-x').value);
        target.y = Number(document.getElementById('st-y').value);
        target.rot = Number(document.getElementById('st-rot').value);
        target.size = Number(document.getElementById('st-size').value);
        this.updateList(); this.render();
    },
    updateList: () => {
        document.getElementById('obj-list').innerHTML = state.objects.map(o => `
            <div onclick="obj.select('${o.id}')" class="obj-card ${state.selectedId === o.id ? 'active' : ''}">
                <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center overflow-hidden border">
                    ${o.img ? `<img src="${o.img}" class="w-full h-full object-contain">` : '<span class="font-black text-blue-500">Z</span>'}
                </div>
                <div class="font-bold text-xs">${o.name}</div>
            </div>
        `).join('');
    },
    render: () => {
        document.getElementById('render-layer').innerHTML = state.objects.map(o => `
            <div style="position:absolute; left:${190+o.x}px; top:${142-o.y}px; transform:translate(-50%,-50%) rotate(${o.rot}deg); transition:0.05s; width:${50*(o.size/100)}px; height:${50*(o.size/100)}px;">
                ${o.img ? `<img src="${o.img}" class="w-full h-full object-contain">` : 
                `<div class="w-full h-full bg-slate-900 rounded-xl border-2 border-white shadow-xl flex items-center justify-center text-white text-[10px] font-black">Z</div>`}
            </div>
        `).join('');
    },
    reset: () => { state.objects.forEach(o => { o.x = 0; o.y = 0; o.rot = 0; }); obj.render(); }
};

const vars = {
    add: function() {
        const name = prompt("변수 이름을 입력하세요:");
        if(name && !state.variables[name]) {
            state.variables[name] = 0;
            this.update();
            engine.workspace.updateToolbox(engine.getToolbox());
        }
    },
    update: function() {
        document.getElementById('var-layer').innerHTML = Object.entries(state.variables).map(([name, val]) => `
            <div class="var-box"><span>${name}</span><span class="text-blue-600">${val}</span></div>
        `).join('');
    }
};

const painter = {
    canvas: null, ctx: null, drawing: false,
    open: function() {
        document.getElementById('painter-overlay').style.display = 'flex';
        if(!this.canvas) {
            this.canvas = document.getElementById('draw-canvas');
            this.ctx = this.canvas.getContext('2d');
            this.canvas.onmousedown = () => { this.drawing = true; this.ctx.beginPath(); };
            this.canvas.onmouseup = () => { this.drawing = false; };
            this.canvas.onmousemove = (e) => {
                if(!this.drawing) return;
                const r = this.canvas.getBoundingClientRect();
                this.ctx.lineWidth = 8; this.ctx.lineCap = 'round'; this.ctx.strokeStyle = '#4f80ff';
                this.ctx.lineTo(e.clientX - r.left, e.clientY - r.top); this.ctx.stroke();
            };
        }
        this.ctx.clearRect(0,0,400,300);
    },
    save: function() {
        const target = state.objects.find(o => o.id === state.selectedId);
        if(target) target.img = this.canvas.toDataURL();
        obj.updateList(); obj.render(); this.close();
    },
    close: () => document.getElementById('painter-overlay').style.display = 'none'
};

engine.init();
</script>
</body>
</html>
