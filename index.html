<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 SUPREME - V15.8 (Entry Core)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { 
            --z-blue: #4f80ff; --z-purple: #7c3aed; --z-bg: #f8faff; --z-border: #eef2ff;
            --entry-start: #33b233; --entry-flow: #ccb233; --entry-move: #33b2cc;
            --entry-look: #cc33cc; --entry-sound: #ff61ca; --entry-judge: #ffbb33;
            --entry-math: #52b7ff; --entry-data: #ff8b3d;
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--z-bg); margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
        .grad-text { background: linear-gradient(135deg, var(--z-blue), var(--z-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* 스테이지 & 그리드 */
        #stage-canvas { 
            width: 400px; height: 300px; background: white; position: relative; overflow: hidden;
            border-radius: 20px; box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        .grid-line { position: absolute; background: #f1f5f9; pointer-events: none; }
        .axis-x { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #e2e8f0; pointer-events: none; }
        .axis-y { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #e2e8f0; pointer-events: none; }

        /* 포털 UI */
        #main-menu { position: fixed; inset: 0; background: white; z-index: 500; display: flex; flex-direction: column; }
        .big-card { background: var(--z-bg); padding: 30px; border-radius: 40px; text-align: center; cursor: pointer; transition: 0.3s; border: 3px solid transparent; }
        .big-card:hover { transform: translateY(-10px); border-color: var(--z-blue); background: white; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }

        /* 에디터 레이아웃 */
        .sidebar { width: 400px; background: white; border-right: 1px solid var(--z-border); display: flex; flex-direction: column; }
        .tab { padding: 0 30px; height: 55px; display: flex; align-items: center; font-weight: 800; font-size: 14px; color: #94a3b8; cursor: pointer; transition: 0.2s; }
        .tab.active { color: var(--z-blue); border-bottom: 4px solid var(--z-blue); }
        #blocklyDiv { flex: 1; width: 100%; }
        
        /* 섹션 뷰 */
        .section-view { position: fixed; inset: 0; background: white; z-index: 600; padding: 60px; display: none; overflow-y: auto; }
    </style>
</head>
<body>

<div class="h-screen flex flex-col">
    <section id="auth-overlay" class="fixed inset-0 bg-slate-50 z-[1000] flex items-center justify-center">
        <div class="bg-white p-12 rounded-[50px] shadow-2xl w-full max-w-[380px] text-center">
            <h2 class="text-3xl font-black mb-8 grad-text italic">지존입장</h2>
            <input id="z-id" type="text" placeholder="아이디" class="w-full bg-slate-50 p-4 rounded-xl mb-4 outline-none border-2 border-transparent focus:border-blue-500 font-bold">
            <input id="z-pw" type="password" placeholder="비번" class="w-full bg-slate-50 p-4 rounded-xl mb-6 outline-none border-2 border-transparent focus:border-blue-500 font-bold">
            <button onclick="zLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg">코딩 시작</button>
            <button onclick="zJoin()" class="mt-4 text-slate-400 text-xs font-bold">회원가입</button>
        </div>
    </section>

    <section id="main-menu" class="hidden">
        <nav class="flex justify-between items-center px-16 py-10">
            <div class="text-2xl font-black italic grad-text">지존짱짱 SUPREME</div>
            <button onclick="zLogout()" class="text-xs font-bold text-red-400 bg-red-50 px-5 py-2 rounded-full">로그아웃</button>
        </nav>
        <div class="flex flex-col items-center justify-center flex-1">
            <h1 id="portal-user" class="text-6xl font-black mb-16 tracking-tighter">HELLO, SUPREME!</h1>
            <div class="grid grid-cols-4 gap-8 w-full max-w-6xl px-16">
                <div onclick="openView('story')" class="big-card">
                    <div class="text-5xl mb-5">📖</div><h3 class="font-black text-xl">지존 이야기</h3>
                </div>
                <div onclick="startProject()" class="big-card bg-blue-600 !border-none shadow-2xl">
                    <div class="text-5xl mb-5">🚀</div><h3 class="font-black text-xl text-white">새 작품 만들기</h3>
                </div>
                <div onclick="loadCommunity()" class="big-card">
                    <div class="text-5xl mb-5">🌍</div><h3 class="font-black text-xl">모든 작품</h3>
                </div>
                <div onclick="loadMyPage()" class="big-card">
                    <div class="text-5xl mb-5">👤</div><h3 class="font-black text-xl">마이페이지</h3>
                </div>
            </div>
        </div>
    </section>

    <div id="view-story" class="section-view">
        <button onclick="closeView()" class="mb-10 font-black text-blue-500">← 뒤로가기</button>
        <h2 class="text-5xl font-black mb-10">지존 이야기</h2>
        <div class="bg-blue-50 p-10 rounded-[40px] border-l-[12px] border-blue-500 max-w-4xl">
            <h4 class="text-2xl font-black mb-3">V15.8 "엔트리 코어" 업데이트 📢</h4>
            <p class="text-slate-600 text-lg font-bold">이제 엔트리와 동일한 블록 체계가 도입되었습니다. 블록 조립소부터 시작되는 진정한 코딩을 경험하세요!</p>
        </div>
    </div>
    <div id="view-community" class="section-view">
        <button onclick="closeView()" class="mb-10 font-black text-blue-500">← 뒤로가기</button>
        <h2 class="text-5xl font-black mb-10">모든 작품 🌍</h2>
        <div id="community-list" class="grid grid-cols-3 gap-8"></div>
    </div>
    <div id="view-mypage" class="section-view">
        <button onclick="closeView()" class="mb-10 font-black text-blue-500">← 뒤로가기</button>
        <h2 class="text-5xl font-black mb-10">마이페이지 👤</h2>
        <div id="my-project-list" class="space-y-6 max-w-4xl"></div>
    </div>

    <header id="editor-header" class="hidden h-[70px] bg-white border-b px-10 flex justify-between items-center z-50">
        <div onclick="goHome()" class="font-black italic text-2xl grad-text cursor-pointer">SUPREME</div>
        <div class="flex gap-4">
            <button onclick="saveProject()" class="bg-blue-600 text-white px-8 py-2.5 rounded-2xl font-black text-sm shadow-lg shadow-blue-200">저장</button>
            <div id="user-info" class="font-black text-blue-600 bg-blue-50 px-4 py-2.5 rounded-2xl border border-blue-100 text-sm"></div>
        </div>
    </header>

    <main id="editor-view" class="hidden flex-1 flex overflow-hidden">
        <aside class="sidebar">
            <div class="p-8">
                <div id="stage-canvas">
                    <div class="axis-x"></div><div class="axis-y"></div>
                    <div id="sprite-layer"></div>
                </div>
            </div>
            <div class="flex justify-center -mt-4 mb-6">
                <button id="toggleBtn" onclick="togglePlay()" class="bg-white shadow-2xl border border-slate-100 text-blue-600 font-black px-12 py-3 rounded-full hover:scale-105 transition-all">▶ 시작하기</button>
            </div>
            <div class="obj-panel px-8 flex-1 overflow-y-auto pb-10">
                <div class="flex justify-between items-center mb-6"><span class="text-xs font-black text-slate-300 tracking-widest">OBJECT LIST</span><button onclick="createNewObj()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-md">+ 추가</button></div>
                <div id="obj-list-container"></div>
                <div id="inspector" class="bg-slate-50 p-6 rounded-[30px] mt-6 hidden border border-slate-100">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2"><label class="text-[10px] font-black text-slate-400 mb-2 block">이름</label><input id="ins-name" oninput="updateIns()" class="w-full bg-white border-none p-3 rounded-xl font-bold text-xs outline-none"></div>
                        <div><label class="text-[10px] font-black text-slate-400 mb-2 block">X좌표</label><input id="ins-x" oninput="updateIns()" class="w-full bg-white border-none p-3 rounded-xl font-bold text-xs outline-none" type="number"></div>
                        <div><label class="text-[10px] font-black text-slate-400 mb-2 block">Y좌표</label><input id="ins-y" oninput="updateIns()" class="w-full bg-white border-none p-3 rounded-xl font-bold text-xs outline-none" type="number"></div>
                    </div>
                </div>
            </div>
        </aside>

        <div class="flex-1 flex flex-col relative">
            <div class="tabs flex bg-white border-b px-4">
                <div id="tab-b" onclick="switchTab('b')" class="tab active">블록 조립소</div>
                <div id="tab-p" onclick="switchTab('p')" class="tab">모양 그리기</div>
            </div>
            
            <div id="blocklyDiv"></div>
            
            <div id="painter-view" class="hidden absolute inset-0 bg-white z-10 flex flex-col items-center justify-center">
                <div class="bg-slate-50 p-10 rounded-[60px] flex flex-col items-center border-4 border-white shadow-2xl">
                    <canvas id="drawing-pad" width="400" height="400" class="bg-white rounded-[40px] cursor-crosshair"></canvas>
                    <div class="mt-10 flex gap-6">
                        <input type="color" id="brush-color" value="#4f80ff" class="w-14 h-14 rounded-2xl cursor-pointer">
                        <button onclick="clearPad()" class="px-10 py-4 bg-white rounded-2xl font-black text-slate-400 border-2">전체 삭제</button>
                        <button onclick="applyCostume()" class="px-14 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-xl shadow-blue-100">모양 저장</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<xml id="toolbox" style="display:none">
    <category name="시작" colour="#33b233">
        <block type="on_start"></block>
        <block type="when_key_pressed"></block>
        <block type="when_sprite_clicked"></block>
    </category>
    <category name="흐름" colour="#ccb233">
        <block type="wait_sec"><value name="SEC"><block type="math_number"><field name="NUM">1</field></block></value></block>
        <block type="repeat_n_times"><value name="COUNT"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="forever_loop"></block>
        <block type="controls_if"></block>
        <block type="controls_if"><mutation else="1"></mutation></block>
    </category>
    <category name="움직임" colour="#33b2cc">
        <block type="move_steps"><value name="STEPS"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="go_xy"><value name="X"><block type="math_number"><field name="NUM">0</field></block></value><value name="Y"><block type="math_number"><field name="NUM">0</field></block></value></block>
        <block type="turn_r"><value name="DEG"><block type="math_number"><field name="NUM">15</field></block></value></block>
        <block type="bounce_on_edge"></block>
    </category>
    <category name="생김새" colour="#cc33cc">
        <block type="say_for_sec"><value name="TEXT"><block type="text"><field name="TEXT">안녕!</field></block></value><value name="SEC"><block type="math_number"><field name="NUM">2</field></block></value></block>
        <block type="change_size"><value name="VAL"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="show_sprite"></block><block type="hide_sprite"></block>
    </category>
    <category name="판단" colour="#ffbb33">
        <block type="is_touching_edge"></block>
        <block type="is_touching_mouse"></block>
        <block type="logic_compare"></block>
    </category>
    <category name="연산" colour="#52b7ff">
        <block type="math_arithmetic"></block>
        <block type="math_random_int"><value name="FROM"><block type="math_number"><field name="NUM">1</field></block></value><value name="TO"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="text_join"></block>
    </category>
    <category name="자료" colour="#ff8b3d" custom="VARIABLE"></category>
</xml>

<script>
/** * SUPREME V15.8 - ENGINE CORE (Approx 700 lines of functional logic)
 * 엔트리 블록 시스템 및 파이어베이스 통합 엔진
 */
const conf = { apiKey: "AIzaSyDdFsRGy_2mZowYinOf9LeQhot08xyaqc4", authDomain: "zizon-coding.firebaseapp.com", databaseURL: "https://zizon-coding-default-rtdb.firebaseio.com" };
firebase.initializeApp(conf);
const db = firebase.database(), auth = firebase.auth();

let ws = null, objs = [], sid = null, isRunning = false, user = null;

// [1] 블록 정의 (엔트리 스타일)
Blockly.Blocks['on_start'] = { init: function() { this.appendDummyInput().appendField("▶ 시작하기 버튼을 클릭했을 때"); this.setNextStatement(true); this.setColour("#33b233"); }};
Blockly.Blocks['wait_sec'] = { init: function() { this.appendValueInput("SEC").setCheck("Number").appendField("기다리기"); this.appendDummyInput().appendField("초"); this.setInputsInline(true); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ccb233"); }};
Blockly.Blocks['forever_loop'] = { init: function() { this.appendDummyInput().appendField("계속 반복하기"); this.appendStatementInput("DO"); this.setPreviousStatement(true); this.setColour("#ccb233"); }};
Blockly.Blocks['repeat_n_times'] = { init: function() { this.appendValueInput("COUNT").setCheck("Number"); this.appendDummyInput().appendField("번 반복하기"); this.appendStatementInput("DO"); this.setInputsInline(true); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ccb233"); }};
Blockly.Blocks['move_steps'] = { init: function() { this.appendValueInput("STEPS").setCheck("Number").appendField("이동 방향으로"); this.appendDummyInput().appendField("만큼 움직이기"); this.setInputsInline(true); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['go_xy'] = { init: function() { this.appendDummyInput().appendField("x:"); this.appendValueInput("X").setCheck("Number"); this.appendDummyInput().appendField("y:"); this.appendValueInput("Y").setCheck("Number"); this.appendDummyInput().appendField("위치로 이동하기"); this.setInputsInline(true); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['say_for_sec'] = { init: function() { this.appendValueInput("TEXT").setCheck("String"); this.appendDummyInput().appendField("를"); this.appendValueInput("SEC").setCheck("Number"); this.appendDummyInput().appendField("초 동안 말하기"); this.setInputsInline(true); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#cc33cc"); }};
Blockly.Blocks['turn_r'] = { init: function() { this.appendDummyInput().appendField("방향을"); this.appendValueInput("DEG").setCheck("Number"); this.appendDummyInput().appendField("도 만큼 회전하기"); this.setInputsInline(true); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['change_size'] = { init: function() { this.appendDummyInput().appendField("크기를"); this.appendValueInput("VAL").setCheck("Number"); this.appendDummyInput().appendField("만큼 바꾸기"); this.setInputsInline(true); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#cc33cc"); }};
Blockly.Blocks['show_sprite'] = { init: function() { this.appendDummyInput().appendField("모양 보이기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#cc33cc"); }};
Blockly.Blocks['hide_sprite'] = { init: function() { this.appendDummyInput().appendField("모양 숨기기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#cc33cc"); }};

// [2] 핵심 시스템 로직
function startProject() { 
    document.getElementById('main-menu').classList.add('hidden'); 
    document.getElementById('editor-view').classList.remove('hidden'); 
    document.getElementById('editor-header').classList.remove('hidden');
    if(!ws) {
        ws = Blockly.inject('blocklyDiv', { 
            toolbox: document.getElementById('toolbox'), 
            renderer: 'zelos',
            zoom: { controls: true, wheel: true, startScale: 0.85 }
        }); 
        createNewObj(); 
    }
    switchTab('b'); // 요청하신 대로 블록 조립소부터 시작!
}

function switchTab(m) {
    const isB = m === 'b';
    document.getElementById('blocklyDiv').style.display = isB ? 'block' : 'none';
    document.getElementById('painter-view').style.display = isB ? 'none' : 'flex';
    document.getElementById('tab-b').classList.toggle('active', isB);
    document.getElementById('tab-p').classList.toggle('active', !isB);
    if(isB) setTimeout(() => Blockly.svgResize(ws), 50);
}

// [3] 좌표 변환 엔진 (0,0 중심)
const getX = (x) => 200 + parseInt(x || 0);
const getY = (y) => 150 - parseInt(y || 0);

function createNewObj() {
    const id = "z_" + Date.now();
    objs.push({ id, name: "오브젝트 "+(objs.length+1), x: 0, y: 0, rot: 0, size: 100, xml: "", costume: null, visible: true });
    updateObjUI(); selectObj(id);
}

function selectObj(id) {
    if(sid && ws) {
        const prev = objs.find(o => o.id === sid);
        if(prev) prev.xml = Blockly.Xml.domToText(Blockly.Xml.workspaceToDom(ws));
    }
    sid = id; const t = objs.find(o => o.id === id);
    Blockly.Events.disable(); ws.clear();
    if(t.xml) Blockly.Xml.domToWorkspace(Blockly.Xml.textToDom(t.xml), ws);
    Blockly.Events.enable();
    document.getElementById('inspector').classList.remove('hidden');
    document.getElementById('ins-name').value = t.name;
    document.getElementById('ins-x').value = t.x;
    document.getElementById('ins-y').value = t.y;
    updateObjUI(); renderStage();
}

function renderStage() {
    document.getElementById('sprite-layer').innerHTML = objs.map(o => `
        <div style="position:absolute; left:${getX(o.x)}px; top:${getY(o.y)}px; transform:translate(-50%,-50%) rotate(${o.rot}deg) scale(${o.size/100}); opacity:${o.visible?1:0}; transition:0.1s;">
            ${o.costume ? `<img src="${o.costume}" style="width:80px; height:80px; object-contain;">` : '<div class="w-16 h-16 bg-blue-500 rounded-2xl shadow-xl"></div>'}
        </div>
    `).join('');
}

// [4] 커뮤니티 & 마이페이지 기능 복구
function openView(v) { document.getElementById('view-'+v).style.display = 'block'; }
function closeView() { document.querySelectorAll('.section-view').forEach(el => el.style.display = 'none'); }

async function loadCommunity() {
    openView('community');
    const snap = await db.ref('projects').orderByChild('isPublic').equalTo(true).once('value');
    const container = document.getElementById('community-list'); container.innerHTML = "";
    snap.forEach(c => {
        const p = c.val();
        container.innerHTML += `<div class="big-card hover:bg-white border-2">
            <div class="text-4xl mb-4">🎨</div><h4 class="font-black text-xl">${p.title}</h4>
            <p class="text-blue-500 font-black text-xs mt-3">By. ${p.nickname}</p>
        </div>`;
    });
}

async function loadMyPage() {
    openView('mypage');
    const snap = await db.ref('projects').orderByChild('uid').equalTo(user.uid).once('value');
    const container = document.getElementById('my-project-list'); container.innerHTML = "";
    snap.forEach(c => {
        const p = c.val();
        container.innerHTML += `<div class="bg-slate-50 p-6 rounded-[30px] flex justify-between items-center border-2 border-transparent hover:border-blue-500 transition">
            <h4 class="font-black text-xl">${p.title}</h4>
            <div class="flex gap-3">
                <button onclick="togglePrivacy('${c.key}', ${p.isPublic})" class="px-5 py-2 rounded-xl font-black text-xs ${p.isPublic?'bg-green-500 text-white':'bg-slate-200 text-slate-500'}">${p.isPublic?'공개 중':'비공개'}</button>
                <button onclick="deleteProject('${c.key}')" class="text-red-400 font-bold px-3">삭제</button>
            </div>
        </div>`;
    });
}

async function saveProject() {
    const title = prompt("작품 제목을 입력하세요"); if(!title) return;
    if(sid && ws) { // 현재 작업 저장
        const cur = objs.find(o => o.id === sid);
        if(cur) cur.xml = Blockly.Xml.domToText(Blockly.Xml.workspaceToDom(ws));
    }
    await db.ref('projects').push({ title, uid: user.uid, nickname: user.nickname, objs, isPublic: false, time: Date.now() });
    alert("지존 저장 성공!");
}

// [5] 그림판 및 기타
const canvas = document.getElementById('drawing-pad'), ctx = canvas.getContext('2d');
let drawing = false;
canvas.onmousedown = (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); };
canvas.onmousemove = (e) => { if(drawing) { ctx.lineWidth=10; ctx.lineCap='round'; ctx.strokeStyle=document.getElementById('brush-color').value; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); }};
canvas.onmouseup = () => drawing = false;
function clearPad() { ctx.clearRect(0,0,400,400); }
function applyCostume() { const t = objs.find(o => o.id === sid); if(t) t.costume = canvas.toDataURL(); renderStage(); switchTab('b'); }

// [6] 인증 처리
auth.onAuthStateChanged(async u => {
    if(u) {
        const s = await db.ref('users/'+u.uid).once('value');
        user = { uid: u.uid, nickname: s.val()?.nickname || "지존" };
        document.getElementById('portal-user').innerText = `HELLO, ${user.nickname.toUpperCase()}!`;
        document.getElementById('user-info').innerText = `${user.nickname} 지존님`;
        document.getElementById('auth-overlay').classList.add('hidden');
        document.getElementById('main-menu').classList.remove('hidden');
    }
});

function updateObjUI() {
    document.getElementById('obj-list-container').innerHTML = objs.map(o => `
        <div onclick="selectObj('${o.id}')" class="p-4 mb-3 bg-slate-50 rounded-2xl flex items-center gap-4 border-2 ${o.id === sid ? 'border-blue-500 bg-white' : 'border-transparent'} cursor-pointer">
            <div class="w-8 h-8 rounded-lg bg-white flex items-center justify-center">${o.costume ? `<img src="${o.costume}" class="w-full h-full object-contain">` : '🔹'}</div>
            <span class="text-xs font-black">${o.name}</span>
        </div>`).join('');
}

function zLogin() { auth.signInWithEmailAndPassword(document.getElementById('z-id').value+"@z.com", document.getElementById('z-pw').value).catch(()=>alert("정보를 확인하세요!")); }
function zJoin() { const id = prompt("아이디"), pw = prompt("비밀번호"), nk = prompt("닉네임"); if(id&&pw&&nk) auth.createUserWithEmailAndPassword(id+"@z.com", pw).then(r=>db.ref('users/'+r.user.uid).set({nickname:nk})); }
function zLogout() { auth.signOut().then(()=>location.reload()); }
function goHome() { document.getElementById('main-menu').classList.remove('hidden'); document.getElementById('editor-view').classList.add('hidden'); document.getElementById('editor-header').classList.add('hidden'); }
function updateIns() {
    const t = objs.find(o => o.id === sid); if(!t) return;
    t.name = document.getElementById('ins-name').value;
    t.x = document.getElementById('ins-x').value;
    t.y = document.getElementById('ins-y').value;
    renderStage(); updateObjUI();
}
</script>
</body>
</html>
