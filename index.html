<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 코딩사이트 - 얼티밋 마스터 v11.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        /* [1. 전역 스타일 및 애니메이션] */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --zizon-primary: #4f80ff;
            --zizon-secondary: #7c3aed;
            --zizon-accent: #ff4757;
            --zizon-bg: #f4f7ff;
            --zizon-white: #ffffff;
            --zizon-border: #e2e8f0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--zizon-bg);
            margin: 0;
            overflow: hidden;
            color: #1e293b;
        }

        .hidden { display: none !important; }

        /* 부드러운 그라데이션 및 버튼 효과 */
        .grad-bg { background: linear-gradient(135deg, var(--zizon-primary), var(--zizon-secondary)); }
        .zizon-shadow { box-shadow: 0 20px 40px -10px rgba(79, 128, 255, 0.25); }
        .btn-active { transform: scale(0.95); }
        .transition-zizon { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* [2. 헤더 및 네비게이션] */
        .zizon-header {
            height: 70px;
            background: var(--zizon-white);
            border-bottom: 1px solid var(--zizon-border);
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            position: relative;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #4f80ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* [3. 메인 레이아웃 구조] */
        .main-container {
            display: flex;
            height: calc(100vh - 70px);
            width: 100vw;
        }

        /* 왼쪽 사이드바: 스테이지 + 오브젝트 리스트 */
        .sidebar {
            width: 420px;
            background: var(--zizon-white);
            border-right: 1px solid var(--zizon-border);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.02);
        }

        /* 스테이지 영역 */
        #stage-wrap {
            height: 340px;
            background: #fff;
            border-bottom: 4px solid var(--zizon-bg);
            position: relative;
            overflow: hidden;
        }

        #stage-canvas {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            background-image: 
                linear-gradient(var(--zizon-bg) 1.5px, transparent 1.5px),
                linear-gradient(90deg, var(--zizon-bg) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            position: relative;
        }

        /* 실행 컨트롤러 */
        .control-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.9);
            padding: 10px 20px;
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(79, 128, 255, 0.2);
        }

        /* 오브젝트 리스트 디자인 */
        .object-manager {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--zizon-bg);
        }

        .obj-header {
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .obj-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px 20px;
        }

        .obj-item {
            background: var(--zizon-white);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border: 2.5px solid transparent;
            transition: all 0.25s;
        }

        .obj-item:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .obj-item.active { border-color: var(--zizon-primary); background: #f0f6ff; }

        /* [4. 에디터 영역] */
        .editor-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .editor-tabs {
            height: 65px;
            background: var(--zizon-white);
            display: flex;
            padding: 0 20px;
            border-bottom: 1px solid var(--zizon-border);
        }

        .tab-item {
            padding: 0 35px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: 800;
            color: #94a3b8;
            cursor: pointer;
            border-bottom: 4px solid transparent;
            transition: 0.2s;
        }

        .tab-item.active {
            color: var(--zizon-primary);
            border-bottom-color: var(--zizon-primary);
        }

        #blockly-area {
            flex: 1;
            position: relative;
        }

        #blocklyDiv {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }

        /* [5. 그림판(화방) 오버레이] */
        #painter {
            position: absolute;
            inset: 0;
            background: #fff;
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #paint-canvas {
            background: var(--zizon-bg);
            border-radius: 40px;
            cursor: crosshair;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.05);
            border: 3px solid var(--zizon-border);
        }

        /* [6. 채팅 및 팝업] */
        #zizon-chat {
            position: fixed;
            right: 40px;
            bottom: 40px;
            width: 420px;
            height: 650px;
            background: white;
            border-radius: 45px;
            box-shadow: 0 30px 80px -15px rgba(0,0,0,0.3);
            border: 1px solid var(--zizon-border);
            display: none;
            flex-direction: column;
            z-index: 2000;
            overflow: hidden;
        }

        #zizon-chat.open { display: flex; animation: popUp 0.5s cubic-bezier(0.19, 1, 0.22, 1); }

        @keyframes popUp {
            from { transform: scale(0.9) translateY(100px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .chat-header {
            padding: 30px;
            background: var(--zizon-white);
            border-bottom: 1.5px solid var(--zizon-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-body { flex: 1; overflow-y: auto; padding: 30px; background: #fbfcfe; }
        .chat-input-wrap { padding: 30px; border-top: 1.5px solid var(--zizon-bg); }

        /* 말풍선 스타일 */
        .bubble {
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 12px 24px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            font-weight: 800;
            font-size: 14px;
            color: #334155;
            white-space: nowrap;
            z-index: 1000;
            border: 2px solid var(--zizon-primary);
        }

        .bubble::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -10px;
            border-width: 10px;
            border-style: solid;
            border-color: var(--zizon-primary) transparent transparent transparent;
        }

    </style>
</head>
<body>

<div class="h-screen flex flex-col">
    
    <header id="main-header" class="zizon-header hidden">
        <div class="flex items-center gap-16">
            <h1 class="logo-text cursor-pointer" onclick="location.reload()">지존짱짱</h1>
            <nav class="flex gap-10">
                <button onclick="changePage('gallery')" class="text-sm font-black text-slate-400 hover:text-blue-500 transition-zizon">지존 갤러리</button>
                <button onclick="changePage('editor')" class="text-sm font-black text-slate-400 hover:text-blue-500 transition-zizon">워크스페이스</button>
            </nav>
        </div>
        <div class="flex items-center gap-6">
            <button onclick="toggleZizonChat()" class="bg-slate-100 px-6 py-2.5 rounded-2xl text-[12px] font-black text-slate-600 hover:bg-slate-200 transition-zizon">💬 지존 네트워크</button>
            <div id="user-profile" class="flex items-center gap-3 bg-blue-50 px-5 py-2 rounded-2xl border border-blue-100">
                <div class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></div>
                <span id="display-nick" class="text-xs font-black text-blue-600 italic">User Loading...</span>
            </div>
            <button onclick="zizonLogout()" class="text-[10px] font-bold text-slate-300 hover:text-red-500">LOGOUT</button>
        </div>
    </header>

    <main class="flex-grow relative">
        
        <section id="view-auth" class="absolute inset-0 flex items-center justify-center bg-slate-50">
            <div class="bg-white p-24 rounded-[80px] shadow-2xl w-full max-w-[500px] text-center border-b-[20px] border-blue-600">
                <div class="mb-16">
                    <h2 class="text-6xl font-black italic mb-2 tracking-tighter text-slate-800">지존짱짱</h2>
                    <p class="text-[10px] font-black tracking-[0.6em] text-blue-500 uppercase">Coding Playground</p>
                </div>
                <div class="space-y-5">
                    <input id="auth-email" type="text" placeholder="지존 아이디" class="w-full bg-slate-50 p-6 rounded-3xl border-2 border-transparent focus:border-blue-400 outline-none font-bold text-lg transition-zizon">
                    <input id="auth-pw" type="password" placeholder="비밀번호" class="w-full bg-slate-50 p-6 rounded-3xl border-2 border-transparent focus:border-blue-400 outline-none font-bold text-lg transition-zizon">
                    <button onclick="zizonLogin()" class="w-full grad-bg text-white py-7 rounded-[35px] font-black text-2xl shadow-xl hover:scale-[1.02] active:scale-95 transition-zizon mt-8">입장하기</button>
                    <button onclick="zizonSignUp()" class="w-full text-slate-400 text-xs font-bold mt-4 hover:underline">아직 회원이 아니신가요? 회원가입</button>
                </div>
            </div>
        </section>

        <section id="view-editor" class="hidden absolute inset-0 main-container">
            <aside class="sidebar">
                <div id="stage-wrap">
                    <div id="stage-canvas">
                        <div id="actor-layer"></div>
                    </div>
                    <div class="control-bar">
                        <button onclick="runZizonEngine()" class="text-blue-600 font-black text-sm px-6 py-2 rounded-full hover:bg-blue-50 transition-zizon">▶ 시작</button>
                        <div class="w-[1px] h-4 bg-slate-200 mt-2"></div>
                        <button onclick="stopZizonEngine()" class="text-red-500 font-black text-sm px-6 py-2 rounded-full hover:bg-red-50 transition-zizon">■ 정지</button>
                    </div>
                </div>

                <div class="object-manager">
                    <div class="obj-header">
                        <h3 class="text-xs font-black text-slate-400 tracking-widest uppercase">Object Layer</h3>
                        <button onclick="addZizonObject()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black hover:shadow-lg transition-zizon">+ 오브젝트 추가</button>
                    </div>
                    <div id="obj-list-scroll" class="obj-scroll"></div>
                </div>
            </aside>

            <div class="editor-wrap">
                <div class="editor-tabs">
                    <div id="tab-block" onclick="setEditorMode('block')" class="tab-item active">블록 조립소</div>
                    <div id="tab-paint" onclick="setEditorMode('paint')" class="tab-item">지존 화방</div>
                </div>
                
                <div id="blockly-area">
                    <div id="blocklyDiv"></div>
                </div>

                <div id="painter">
                    <div class="mb-10">
                        <h3 class="text-3xl font-black italic">지존 화방</h3>
                    </div>
                    <canvas id="paint-canvas" width="450" height="450"></canvas>
                    <div class="mt-12 flex gap-6 items-center">
                        <input type="color" id="brush-color" value="#4f80ff" class="w-16 h-16 rounded-2xl cursor-pointer border-none p-0">
                        <button onclick="clearCanvas()" class="px-10 py-5 bg-slate-100 rounded-3xl font-black text-slate-500 hover:bg-slate-200 transition-zizon">지우기</button>
                        <button onclick="saveCanvas()" class="px-16 py-5 grad-bg text-white rounded-[30px] font-black shadow-lg hover:scale-105 transition-zizon">모양 적용</button>
                    </div>
                    <button onclick="setEditorMode('block')" class="mt-10 text-slate-300 font-bold hover:text-slate-500 underline">에디터로 돌아가기</button>
                </div>
            </div>
        </section>

        <section id="view-gallery" class="hidden absolute inset-0 p-20 bg-white overflow-y-auto">
            <div class="max-w-[1200px] mx-auto">
                <div class="flex justify-between items-end mb-20">
                    <div>
                        <h2 class="text-5xl font-black italic">지존 갤러리</h2>
                        <p class="text-slate-400 font-bold mt-4 text-lg">대표님, 모든 지존들의 작품이 이곳에 모입니다.</p>
                    </div>
                </div>
                <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
                <div id="gallery-empty" class="py-48 bg-slate-50 rounded-[60px] border-4 border-dashed border-slate-100 text-center">
                    <p class="text-8xl mb-8">💎</p>
                    <h4 class="text-2xl font-black text-slate-800">아직 공개된 작품이 없습니다.</h4>
                </div>
            </div>
        </section>

    </main>

    <div id="zizon-chat">
        <div class="chat-header">
            <div>
                <h3 class="text-2xl font-black italic">지존 네트워크</h3>
                <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest">Global Connection</p>
            </div>
            <button onclick="toggleZizonChat()" class="text-slate-300 hover:text-red-500 text-3xl font-black">×</button>
        </div>
        <div id="chat-messages" class="chat-body space-y-6"></div>
        <div class="chat-input-wrap">
            <div class="relative">
                <input id="chat-input-field" type="text" placeholder="메시지를 입력하세요..." class="w-full bg-slate-50 p-6 pr-24 rounded-3xl border-2 border-transparent focus:border-blue-400 outline-none font-bold text-sm shadow-inner transition-zizon">
                <button onclick="sendZizonMsg()" class="absolute right-3 top-3 bottom-3 grad-bg text-white px-6 rounded-2xl font-black text-xs">전송</button>
            </div>
        </div>
    </div>

</div>

<xml id="zizonToolbox" style="display:none">
    <category name="시작" colour="#33b233">
        <block type="event_flag_clicked"></block>
        <block type="event_click_object"></block>
    </category>
    <category name="흐름" colour="#ccb233">
        <block type="controls_forever"></block>
        <block type="wait_seconds"><value name="SEC"><block type="math_number"><field name="NUM">1</field></block></value></block>
        <block type="controls_repeat_ext"><value name="TIMES"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="controls_if"></block>
        <block type="controls_if"><mutation else="1"></mutation></block>
    </category>
    <category name="움직임" colour="#33b2cc">
        <block type="move_steps"><value name="STEPS"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="turn_right"><value name="DEG"><block type="math_number"><field name="NUM">15</field></block></value></block>
        <block type="goto_xy"><value name="X"><block type="math_number"><field name="NUM">0</field></block></value><value name="Y"><block type="math_number"><field name="NUM">0</field></block></value></block>
        <block type="change_x_by"><value name="VAL"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="change_y_by"><value name="VAL"><block type="math_number"><field name="NUM">10</field></block></value></block>
    </category>
    <category name="모양/소리" colour="#cc33cc">
        <block type="say_for_sec"><value name="TEXT"><block type="text"><field name="TEXT">안녕!</field></block></value></block>
        <block type="set_visible"><field name="VAL">TRUE</field></block>
        <block type="play_sound"></block>
    </category>
    <category name="판단" colour="#3366cc">
        <block type="logic_compare"></block>
        <block type="logic_operation"></block>
        <block type="logic_boolean"></block>
        <block type="touching_mouse"></block>
    </category>
    <category name="계산" colour="#33cccc">
        <block type="math_number"></block>
        <block type="math_arithmetic"></block>
        <block type="math_random_int"><value name="FROM"><block type="math_number"><field name="NUM">1</field></block></value><value name="TO"><block type="math_number"><field name="NUM">10</field></block></value></block>
    </category>
    <category name="자료" colour="#cc3333" custom="VARIABLE"></category>
</xml>

<script>
/** * [지존짱짱 CORE 엔진 v11.0 - 750+ Lines 마스터 빌드]
 * ---------------------------------------------------------------------------------------------------
 */

// [1. 블록 커스텀 정의]
Blockly.Blocks['event_flag_clicked'] = { init: function() { this.appendDummyInput().appendField("▶ 시작하기를 클릭했을 때"); this.setNextStatement(true); this.setColour("#33b233"); }};
Blockly.Blocks['event_click_object'] = { init: function() { this.appendDummyInput().appendField("🖱️ 이 오브젝트를 클릭했을 때"); this.setNextStatement(true); this.setColour("#33b233"); }};
Blockly.Blocks['controls_forever'] = { init: function() { this.appendDummyInput().appendField("계속 반복하기"); this.appendStatementInput("DO"); this.setPreviousStatement(true); this.setColour("#ccb233"); }};
Blockly.Blocks['wait_seconds'] = { init: function() { this.appendValueInput("SEC").setCheck("Number").appendField(""); this.appendDummyInput().appendField("초 기다리기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ccb233"); }};
Blockly.Blocks['move_steps'] = { init: function() { this.appendValueInput("STEPS").setCheck("Number").appendField("앞으로"); this.appendDummyInput().appendField("만큼 이동"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['turn_right'] = { init: function() { this.appendValueInput("DEG").setCheck("Number").appendField("오른쪽으로"); this.appendDummyInput().appendField("도 회전"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['goto_xy'] = { init: function() { this.appendValueInput("X").setCheck("Number").appendField("x:"); this.appendValueInput("Y").setCheck("Number").appendField("y:"); this.appendDummyInput().appendField("(으)로 이동"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['change_x_by'] = { init: function() { this.appendValueInput("VAL").setCheck("Number").appendField("x를"); this.appendDummyInput().appendField("만큼 바꾸기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['change_y_by'] = { init: function() { this.appendValueInput("VAL").setCheck("Number").appendField("y를"); this.appendDummyInput().appendField("만큼 바꾸기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['say_for_sec'] = { init: function() { this.appendValueInput("TEXT").setCheck("String").appendField(""); this.appendDummyInput().appendField("말하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#cc33cc"); }};
Blockly.Blocks['set_visible'] = { init: function() { this.appendDummyInput().appendField(new Blockly.FieldDropdown([["보이기","TRUE"], ["숨기기","FALSE"]]), "VAL"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#cc33cc"); }};
Blockly.Blocks['play_sound'] = { init: function() { this.appendDummyInput().appendField("띵 소리 재생"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#cc33cc"); }};
Blockly.Blocks['touching_mouse'] = { init: function() { this.appendDummyInput().appendField("마우스에 닿았는가?"); this.setOutput(true, "Boolean"); this.setColour("#3366cc"); }};

// [2. 코드 생성기 로직 (JavaScript Generator)]
const ZG = javascript.javascriptGenerator;
ZG.forBlock['event_flag_clicked'] = () => '// Start\n';
ZG.forBlock['controls_forever'] = (b, g) => `while(isRunning) { ${g.statementToCode(b, 'DO')} await wait(0.01); }\n`;
ZG.forBlock['wait_seconds'] = (b, g) => `await wait(${g.valueToCode(b, 'SEC', ZG.Order.ATOMIC) || 0});\n`;
ZG.forBlock['move_steps'] = (b, g) => `move(${g.valueToCode(b, 'STEPS', ZG.Order.ATOMIC) || 0});\n`;
ZG.forBlock['turn_right'] = (b, g) => `rotate(${g.valueToCode(b, 'DEG', ZG.Order.ATOMIC) || 0});\n`;
ZG.forBlock['goto_xy'] = (b, g) => `setPos(${g.valueToCode(b, 'X', ZG.Order.ATOMIC) || 0}, ${g.valueToCode(b, 'Y', ZG.Order.ATOMIC) || 0});\n`;
ZG.forBlock['change_x_by'] = (b, g) => `changeX(${g.valueToCode(b, 'VAL', ZG.Order.ATOMIC) || 0});\n`;
ZG.forBlock['change_y_by'] = (b, g) => `changeY(${g.valueToCode(b, 'VAL', ZG.Order.ATOMIC) || 0});\n`;
ZG.forBlock['say_for_sec'] = (b, g) => `say(${g.valueToCode(b, 'TEXT', ZG.Order.ATOMIC) || "''"});\n`;
ZG.forBlock['set_visible'] = (b) => `toggleVis(${b.getFieldValue('VAL') === 'TRUE'});\n`;
ZG.forBlock['play_sound'] = () => `playSound();\n`;
ZG.forBlock['touching_mouse'] = () => [`isMouseOver()`, ZG.Order.ATOMIC];

// [3. 시스템 초기화 및 전역 변수]
const firebaseConfig = { 
    apiKey: "AIzaSyDdFsRGy_2mZowYinOf9LeQhot08xyaqc4", 
    authDomain: "zizon-coding.firebaseapp.com", 
    projectId: "zizon-coding", 
    databaseURL: "https://zizon-coding-default-rtdb.firebaseio.com" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database(), auth = firebase.auth();

let workspace = null, objects = [], selectedId = null, userNick = "", isRunning = false;
let mouseX = 0, mouseY = 0;

// [4. 워크스페이스 엔진 로직]
function initZizonEditor() {
    if(workspace) return;
    workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('zizonToolbox'),
        zoom: { controls: true, wheel: true, startScale: 1.0, maxScale: 3, minScale: 0.3, scaleSpeed: 1.1 },
        trashcan: true, renderer: 'zelos', media: 'https://unpkg.com/blockly/media/'
    });

    // 윈도우 리사이즈 핸들러
    window.addEventListener('resize', () => { if(workspace) Blockly.svgResize(workspace); });
    
    // 마우스 좌표 추적
    document.getElementById('stage-canvas').onmousemove = (e) => {
        const rect = e.target.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
        mouseY = e.clientY - rect.top;
    };

    addZizonObject();
}

function addZizonObject() {
    const id = "z_" + Date.now();
    const newObj = {
        id: id, name: "오브젝트 " + (objects.length + 1),
        x: 200, y: 170, rot: 0, xml: "", costume: null,
        visible: true, say: ""
    };
    objects.push(newObj);
    updateObjUI();
    selectZizonObject(id);
}

/** 🚨 대표님 솔루션: 안정화된 선택 로직 */
function selectZizonObject(id) {
    if(selectedId && workspace) {
        const prev = objects.find(o => o.id === selectedId);
        if(prev) prev.xml = Blockly.Xml.domToText(Blockly.Xml.workspaceToDom(workspace));
    }

    selectedId = id;
    const target = objects.find(o => o.id === id);

    // [대표님 안정화 공식]
    Blockly.Events.disable();
    workspace.clear();
    if(target.xml) {
        try { Blockly.Xml.domToWorkspace(Blockly.Xml.textToDom(target.xml), workspace); } catch(e){}
    }
    Blockly.Events.enable();

    // 툴박스 갱신 및 UI 업데이트
    workspace.updateToolbox(document.getElementById('zizonToolbox'));
    updateObjUI();
    renderZizonStage();
    setTimeout(() => Blockly.svgResize(workspace), 50);
}

function updateObjUI() {
    const scroll = document.getElementById('obj-list-scroll');
    scroll.innerHTML = objects.map(o => `
        <div onclick="selectZizonObject('${o.id}')" class="obj-item ${o.id === selectedId ? 'active' : ''}">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-slate-50 border rounded-3xl flex items-center justify-center overflow-hidden">
                    ${o.costume ? `<img src="${o.costume}" class="w-full h-full object-contain">` : '💎'}
                </div>
                <div class="flex flex-col">
                    <span class="text-[13px] font-black text-slate-700">${o.name}</span>
                    <span class="text-[10px] font-bold text-slate-400">X:${Math.round(o.x)} Y:${Math.round(o.y)}</span>
                </div>
            </div>
            <button onclick="event.stopPropagation(); removeObj('${o.id}')" class="text-slate-200 hover:text-red-500 font-black text-2xl transition-zizon px-2">×</button>
        </div>
    `).join('');
}

function removeObj(id) {
    if(objects.length <= 1) return;
    objects = objects.filter(o => o.id !== id);
    selectZizonObject(objects[0].id);
}

// [5. 스테이지 렌더링 및 실행 엔진]
function renderZizonStage() {
    const layer = document.getElementById('actor-layer');
    layer.innerHTML = objects.map(o => `
        <div id="view_${o.id}" style="position:absolute; left:${o.x}px; top:${o.y}px; transform:translate(-50%,-50%) rotate(${o.rot}deg); display:${o.visible?'block':'none'}; transition:0.1s;">
            ${o.say ? `<div class="bubble">${o.say}</div>` : ''}
            ${o.costume ? `<img src="${o.costume}" style="width:90px; height:90px; object-fit:contain;">` : 
            `<div class="w-16 h-16 grad-bg rounded-3xl shadow-xl border-4 border-white/20"></div>`}
        </div>
    `).join('');
}

async function runZizonEngine() {
    if(isRunning) return;
    isRunning = true;
    
    for(const obj of objects) {
        selectZizonObject(obj.id); // 현재 선택 상태 동기화
        const code = ZG.workspaceToCode(workspace);
        
        // 실행 컨텍스트 생성
        const engine = new Function('wait', 'move', 'rotate', 'setPos', 'changeX', 'changeY', 'say', 'toggleVis', 'playSound', 'isMouseOver', 'isRunning',
            `(async () => { ${code} })()`);
        
        engine(
            (s) => new Promise(r => setTimeout(r, s * 1000)), // wait
            (s) => { 
                const rad = obj.rot * Math.PI / 180;
                obj.x += s * Math.cos(rad); obj.y += s * Math.sin(rad);
                renderZizonStage();
            }, // move
            (d) => { obj.rot += d; renderZizonStage(); }, // rotate
            (x, y) => { obj.x = x + 200; obj.y = y + 170; renderZizonStage(); }, // setPos
            (v) => { obj.x += v; renderZizonStage(); }, // changeX
            (v) => { obj.y += v; renderZizonStage(); }, // changeY
            (t) => { obj.say = t; renderZizonStage(); setTimeout(() => {obj.say=""; renderStage();}, 2000); }, // say
            (v) => { obj.visible = v; renderZizonStage(); }, // toggleVis
            () => { const a = new AudioContext(); const o = a.createOscillator(); o.connect(a.destination); o.start(); o.stop(0.1); }, // playSound
            () => {
                const dx = mouseX - obj.x, dy = mouseY - obj.y;
                return Math.sqrt(dx*dx + dy*dy) < 50;
            }, // isMouseOver
            isRunning
        );
    }
}

function stopZizonEngine() {
    isRunning = false;
    objects.forEach(o => { o.x = 200; o.y = 170; o.rot = 0; o.say = ""; o.visible = true; });
    renderZizonStage();
}

// [6. 네비게이션 및 UI 제어]
function changePage(p) {
    ['view-auth', 'view-editor', 'view-gallery'].forEach(v => document.getElementById(v).classList.add('hidden'));
    document.getElementById('view-' + p).classList.remove('hidden');
    if(p === 'editor') initZizonEditor();
}

function setEditorMode(m) {
    const isBlock = m === 'block';
    document.getElementById('blockly-area').classList.toggle('hidden', !isBlock);
    document.getElementById('painter').classList.toggle('hidden', isBlock);
    document.getElementById('tab-block').classList.toggle('active', isBlock);
    document.getElementById('tab-paint').classList.toggle('active', !isBlock);
    if(isBlock) setTimeout(() => Blockly.svgResize(workspace), 50);
}

function toggleZizonChat() { document.getElementById('zizon-chat').classList.toggle('open'); }

// [7. 인증 및 데이터 통신]
async function zizonLogin() {
    const id = document.getElementById('auth-email').value, pw = document.getElementById('auth-pw').value;
    if(!id || !pw) return alert("입력 정보를 확인하세요.");
    auth.signInWithEmailAndPassword(id + "@zizon.com", pw).catch(e => alert("로그인 실패!"));
}

function zizonSignUp() {
    const id = prompt("아이디:"), pw = prompt("비밀번호:"), nk = prompt("닉네임:");
    if(id && pw && nk) {
        auth.createUserWithEmailAndPassword(id + "@zizon.com", pw).then(res => {
            db.ref('users/' + res.user.uid).set({ nickname: nk });
        });
    }
}

function zizonLogout() { auth.signOut().then(() => location.reload()); }

auth.onAuthStateChanged(async user => {
    if(user) {
        const snap = await db.ref('users/' + user.uid).once('value');
        userNick = snap.val()?.nickname || "지존";
        document.getElementById('display-nick').innerText = userNick + " 님";
        document.getElementById('main-header').classList.remove('hidden');
        changePage('editor');
    } else {
        document.getElementById('main-header').classList.add('hidden');
        changePage('auth');
    }
});

function sendZizonMsg() {
    const input = document.getElementById('chat-input-field');
    if(!input.value.trim()) return;
    db.ref('zizon_v11_chat').push({ sender: userNick, msg: input.value, time: Date.now() });
    input.value = '';
}

db.ref('zizon_v11_chat').limitToLast(40).on('child_added', snap => {
    const d = snap.val(), box = document.getElementById('chat-messages'), isMe = d.sender === userNick;
    const item = document.createElement('div');
    item.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
    item.innerHTML = `
        <span class="text-[10px] font-black text-slate-300 mb-1.5">${d.sender}</span>
        <div class="${isMe ? 'grad-bg text-white' : 'bg-slate-100 text-slate-700'} p-4 px-6 rounded-[25px] rounded-${isMe?'tr':'tl'}-none text-sm font-bold shadow-sm max-w-[85%]">
            ${d.msg}
        </div>`;
    box.appendChild(item);
    box.scrollTop = box.scrollHeight;
});

// [8. 그림판 로직]
const canv = document.getElementById('paint-canvas'), ctx = canv.getContext('2d');
let drawing = false;
canv.onmousedown = (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); };
canv.onmousemove = (e) => { 
    if(drawing) { 
        ctx.lineWidth = 15; ctx.lineCap = 'round'; 
        ctx.strokeStyle = document.getElementById('brush-color').value; 
        ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); 
    } 
};
canv.onmouseup = () => drawing = false;
function clearCanvas() { ctx.clearRect(0,0,canv.width,canv.height); }
function saveCanvas() {
    const target = objects.find(o => o.id === selectedId);
    target.costume = canv.toDataURL();
    updateObjUI(); renderZizonStage();
    alert("모양이 저장되었습니다!");
}

</script>
