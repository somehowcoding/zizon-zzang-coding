<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 코딩사이트 - 공식 마스터 에디션</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root { --main-blue: #4f80ff; --admin-gold: #fbbf24; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; margin: 0; overflow: hidden; }
        
        /* 유틸리티 클래스 */
        .hidden { display: none !important; }
        .zizon-gradient { background: linear-gradient(135deg, #4f80ff 0%, #7c3aed 100%); }
        .glass-morphism { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        
        /* 애니메이션 */
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .ani-slide-up { animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .ani-fade-in { animation: fadeIn 0.3s ease-out; }

        /* 지존짱짱 이야기 (채팅창) 팝업 */
        #chatPopup {
            position: fixed; right: 30px; bottom: 90px; width: 380px; height: 550px;
            z-index: 9999; display: none; flex-direction: column;
            border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            background: white; border: 2px solid var(--main-blue);
        }
        #chatPopup.active { display: flex; animation: slideUp 0.3s ease-out; }

        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* 에디터 레이아웃 */
        .editor-wrapper { display: flex; flex: 1; height: calc(100vh - 65px); }
        .sidebar { width: 380px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        #stageArea { height: 280px; background: #fff; border-bottom: 1px solid #e2e8f0; position: relative; overflow: hidden; }
        #gameScreen { width: 100%; height: 100%; background: #fff; position: relative; }
        .blockly-area { flex: 1; position: relative; }
        #blocklyDiv { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

        /* 탭 디자인 */
        .tab-btn { flex: 1; padding: 14px; font-weight: 800; text-align: center; color: #94a3b8; border-bottom: 3px solid transparent; transition: all 0.2s; }
        .tab-btn.active { color: var(--main-blue); border-bottom-color: var(--main-blue); background: #f0f7ff; }

        /* 오브젝트 아이템 */
        .obj-card { padding: 12px 16px; margin: 8px; border-radius: 15px; border: 2px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .obj-card.selected { border-color: var(--main-blue); background: #f0f7ff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>

<div class="flex flex-col h-screen">
    
    <nav id="mainNav" class="zizon-gradient h-[65px] px-8 flex justify-between items-center text-white shadow-xl z-50 hidden">
        <div class="flex items-center gap-12">
            <div class="text-3xl font-black italic tracking-tighter cursor-pointer select-none" onclick="location.reload()">지존짱짱</div>
            <div class="flex gap-8 text-sm font-black">
                <button onclick="navigate('gallery')" class="hover:text-blue-200 transition">지존 갤러리</button>
                <button onclick="navigate('editor')" class="hover:text-blue-200 transition">작품 만들기</button>
                <button onclick="toggleChatPopup()" class="bg-white/20 px-4 py-2 rounded-xl hover:bg-white/30 transition flex items-center gap-2">
                    💬 지존짱짱 이야기
                    <span id="chatBadge" class="hidden w-2 h-2 bg-yellow-400 rounded-full"></span>
                </button>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div id="userBadge" class="flex items-center gap-2 bg-black/20 px-4 py-2 rounded-2xl border border-white/10">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                <span id="userNickLabel" class="text-[11px] font-black">지존 유저</span>
            </div>
            <button onclick="handleLogout()" class="text-xs font-bold opacity-70 hover:opacity-100 transition underline">로그아웃</button>
        </div>
    </nav>

    <div class="flex-grow relative">
        
        <section id="viewAuth" class="absolute inset-0 flex items-center justify-center bg-slate-100 ani-fade-in">
            <div class="bg-white p-14 rounded-[50px] shadow-2xl w-full max-w-[420px] text-center border-b-[15px] border-blue-600">
                <h2 class="text-5xl font-black text-slate-800 italic tracking-tighter mb-2">지존짱짱</h2>
                <p class="text-blue-500 font-black text-xs tracking-widest uppercase mb-10">Creative Coding Platform</p>
                <div class="space-y-4 text-left">
                    <div class="px-2 text-[10px] font-black text-slate-400 uppercase">ID Access</div>
                    <input id="inputEmail" type="text" placeholder="아이디" class="w-full bg-slate-50 p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-400 font-bold transition-all">
                    <input id="inputPw" type="password" placeholder="비밀번호" class="w-full bg-slate-50 p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-400 font-bold transition-all">
                    <button onclick="handleLogin()" class="w-full zizon-gradient text-white py-5 rounded-3xl font-black text-xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all mt-6">코드 세계 입장</button>
                    <button onclick="handleSignup()" class="w-full text-slate-400 text-sm font-bold py-2 hover:text-blue-500 transition">회원가입이 필요하신가요?</button>
                </div>
            </div>
        </section>

        <section id="viewGallery" class="hidden absolute inset-0 p-12 bg-slate-50 overflow-y-auto ani-fade-in">
            <div class="max-w-[1100px] mx-auto">
                <div class="flex justify-between items-end mb-12">
                    <div>
                        <h2 class="text-4xl font-black text-slate-900 italic mb-2">지존 갤러리</h2>
                        <p class="text-slate-500 font-bold">오직 지존들이 검증한 실제 작품들만 전시됩니다.</p>
                    </div>
                    <div id="ceoPanel" class="hidden bg-slate-900 p-4 rounded-2xl text-white shadow-xl">
                        <p class="text-[9px] font-black text-blue-400 mb-2">MASTER CEO PANEL</p>
                        <button onclick="awardZizonEdition()" class="bg-blue-600 text-[10px] px-4 py-2 rounded-lg font-black hover:bg-blue-500 transition">공식 에디션 하사</button>
                    </div>
                </div>
                <div id="galleryGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    </div>
                <div id="noWorkMsg" class="text-center py-20">
                    <div class="text-6xl mb-4">💎</div>
                    <p class="text-slate-400 font-black">아직 등록된 공식 작품이 없습니다.<br>첫 번째 지존이 되어보세요!</p>
                </div>
            </div>
        </section>

        <section id="viewEditor" class="hidden absolute inset-0 flex editor-wrapper ani-fade-in">
            <aside class="sidebar">
                <div id="stageArea">
                    <div id="gameScreen"></div>
                    <div class="absolute bottom-4 left-4 right-4 flex gap-2">
                        <button onclick="createNewObject()" class="flex-1 bg-white border-2 border-blue-500 text-blue-500 py-3 rounded-2xl font-black text-xs hover:bg-blue-50 transition">+ 오브젝트</button>
                        <button onclick="runZizonEngine()" class="flex-1 zizon-blue text-white py-3 rounded-2xl font-black text-xs shadow-lg hover:brightness-110 transition">▶ 실행</button>
                    </div>
                </div>
                <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">오브젝트 목록</span>
                    <span id="objCounter" class="bg-blue-500 text-white text-[9px] px-2 py-0.5 rounded-full font-black">0</span>
                </div>
                <div id="objScrollArea" class="flex-grow overflow-y-auto p-2">
                    </div>
            </aside>

            <main class="blockly-area flex flex-col">
                <div class="flex h-[55px] bg-white border-b z-10">
                    <button id="btnTabBlock" onclick="switchEditorTab('block')" class="tab-btn active">블록 조립창</button>
                    <button id="btnTabShape" onclick="switchEditorTab('shape')" class="tab-btn">지존 모양판</button>
                </div>
                <div id="blocklyDiv"></div>
                <div id="shapeEditor" class="hidden flex-grow bg-slate-100 flex items-center justify-center">
                    <div class="bg-white p-10 rounded-[40px] shadow-2xl border-4 border-white text-center">
                        <canvas id="zizonCanvas" width="300" height="300" class="bg-slate-50 rounded-3xl border-2 border-slate-100 mb-6 cursor-crosshair"></canvas>
                        <div class="flex gap-3 justify-center">
                            <input type="color" id="brushColor" value="#4f80ff" class="w-12 h-12 rounded-xl cursor-pointer">
                            <button onclick="clearZizonCanvas()" class="px-6 py-3 bg-slate-100 rounded-2xl font-black text-sm text-slate-500">싹 지우기</button>
                            <button onclick="saveZizonShape()" class="px-10 py-3 zizon-blue text-white rounded-2xl font-black text-sm shadow-md">모양 저장</button>
                        </div>
                    </div>
                </div>
            </main>
        </section>

    </div>

    <div id="chatPopup">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50 rounded-t-[30px]">
            <div>
                <h3 class="font-black text-slate-800 italic flex items-center gap-2">
                    지존짱짱 이야기 
                    <span class="flex h-2 w-2 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                </h3>
                <p class="text-[9px] font-bold text-slate-400">실시간 지존 대화방</p>
            </div>
            <button onclick="toggleChatPopup()" class="text-slate-300 hover:text-red-500 transition-colors text-2xl font-black">×</button>
        </div>
        <div id="chatDisplay" class="flex-grow overflow-y-auto p-5 space-y-4 bg-white">
            </div>
        <div class="p-5 border-t bg-slate-50 rounded-b-[30px]">
            <div class="relative">
                <input id="chatMsgInput" type="text" placeholder="메시지를 입력하세요..." class="w-full bg-white p-4 pr-16 rounded-2xl border-2 border-slate-200 outline-none focus:border-blue-400 font-bold text-sm shadow-inner transition-all">
                <button onclick="sendChatMessage()" class="absolute right-2 top-2 bottom-2 zizon-blue text-white px-5 rounded-xl font-black text-xs hover:brightness-110 transition-all">보내기</button>
            </div>
        </div>
    </div>

</div>

<xml id="zizonToolbox" style="display: none">
    <category name="시작" colour="#33b233">
        <block type="event_whenflagclicked"></block>
    </category>
    <category name="흐름" colour="#ccb233">
        <block type="controls_repeat_ext">
            <value name="TIMES"><block type="math_number"><field name="NUM">10</field></block></value>
        </block>
        <block type="controls_forever"></block>
        <block type="wait_seconds">
            <value name="SEC"><block type="math_number"><field name="NUM">1</field></block></value>
        </block>
        <block type="controls_if"></block>
    </category>
    <category name="움직임" colour="#33b2cc">
        <block type="move_steps"><value name="STEPS"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="turn_right"><value name="DEGREE"><block type="math_number"><field name="NUM">15</field></block></value></block>
        <block type="change_x"><value name="VAL"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="change_y"><value name="VAL"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="set_x"><value name="VAL"><block type="math_number"><field name="NUM">0</field></block></value></block>
        <block type="set_y"><value name="VAL"><block type="math_number"><field name="NUM">0</field></block></value></block>
    </category>
    <category name="계산" colour="#3366cc">
        <block type="math_arithmetic"></block>
        <block type="math_random_int">
            <value name="FROM"><block type="math_number"><field name="NUM">1</field></block></value>
            <value name="TO"><block type="math_number"><field name="NUM">10</field></block></value>
        </block>
        <block type="logic_compare"></block>
    </category>
    <category name="자료" colour="#cc3333" custom="VARIABLE"></category>
</xml>

<script>
/**
 * [지존짱짱 시스템 스크립트]
 * -------------------------------------------------------------------------
 */

// 1. 초기 환경 설정 (Firebase)
const firebaseConfig = { 
    apiKey: "AIzaSyDdFsRGy_2mZowYinOf9LeQhot08xyaqc4", 
    authDomain: "zizon-coding.firebaseapp.com", 
    projectId: "zizon-coding", 
    databaseURL: "https://zizon-coding-default-rtdb.firebaseio.com" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database(), auth = firebase.auth();

// 글로벌 상태 관리
let currentView = 'auth';
let userNick = "", isCeo = false;
let workspace = null;
let objects = [], activeId = null;

/**
 * 2. 블록 정의 & 커스터마이징 (흐름 블록 포함)
 * -------------------------------------------------------------------------
 */
Blockly.Msg["EVENT_WHENFLAGCLICKED"] = "▶ 시작하기를 클릭했을 때";
Blockly.Msg["NEW_VARIABLE"] = "변수 만들기...";
Blockly.Msg["NEW_VARIABLE_TITLE"] = "새 변수 이름:";

// 시작 블록
Blockly.Blocks['event_whenflagclicked'] = {
    init: function() {
        this.appendDummyInput().appendField(Blockly.Msg["EVENT_WHENFLAGCLICKED"]);
        this.setNextStatement(true);
        this.setColour("#33b233");
    }
};

// 흐름 블록 (무한반복)
Blockly.Blocks['controls_forever'] = {
    init: function() {
        this.appendDummyInput().appendField("계속 반복하기");
        this.appendStatementInput("DO").appendField("실행");
        this.setPreviousStatement(true);
        this.setColour("#ccb233");
    }
};

// 흐름 블록 (기다리기)
Blockly.Blocks['wait_seconds'] = {
    init: function() {
        this.appendValueInput("SEC").setCheck("Number").appendField("");
        this.appendDummyInput().appendField("초 기다리기");
        this.setPreviousStatement(true);
        this.setNextStatement(true);
        this.setColour("#ccb233");
    }
};

// 움직임 블록
Blockly.Blocks['move_steps'] = { init: function() { this.appendValueInput("STEPS").setCheck("Number").appendField("앞으로"); this.appendDummyInput().appendField("만큼 이동하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['turn_right'] = { init: function() { this.appendValueInput("DEGREE").setCheck("Number").appendField("오른쪽으로"); this.appendDummyInput().appendField("도 회전하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['change_x'] = { init: function() { this.appendValueInput("VAL").setCheck("Number").appendField("x 좌표를"); this.appendDummyInput().appendField("만큼 바꾸기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['change_y'] = { init: function() { this.appendValueInput("VAL").setCheck("Number").appendField("y 좌표를"); this.appendDummyInput().appendField("만큼 바꾸기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['set_x'] = { init: function() { this.appendValueInput("VAL").setCheck("Number").appendField("x 위치를"); this.appendDummyInput().appendField("(으)로 정하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['set_y'] = { init: function() { this.appendValueInput("VAL").setCheck("Number").appendField("y 위치를"); this.appendDummyInput().appendField("(으)로 정하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};


/**
 * 3. 지존짱짱 이야기 (실시간 채팅 팝업) 로직
 * -------------------------------------------------------------------------
 */
function toggleChatPopup() {
    const pop = document.getElementById('chatPopup');
    const badge = document.getElementById('chatBadge');
    pop.classList.toggle('active');
    if(pop.classList.contains('active')) badge.classList.add('hidden');
}

function sendChatMessage() {
    const input = document.getElementById('chatMsgInput');
    const msg = input.value.trim();
    if(!msg) return;

    db.ref('zizon_chats').push({
        sender: userNick,
        text: msg,
        time: Date.now(),
        isCeo: isCeo
    });
    input.value = '';
}

db.ref('zizon_chats').limitToLast(50).on('child_added', (snap) => {
    const data = snap.val();
    const display = document.getElementById('chatDisplay');
    const div = document.createElement('div');
    
    const isMe = data.sender === userNick;
    const nameColor = data.isCeo ? 'text-blue-600' : 'text-slate-400';
    const crown = data.isCeo ? '<span class="text-[9px] bg-blue-100 text-blue-600 px-1 rounded ml-1 font-black">👑CEO</span>' : '';

    div.className = `ani-fade-in flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
    div.innerHTML = `
        <div class="flex items-center gap-1 mb-1">
            ${isMe ? '' : `<span class="text-[10px] font-black ${nameColor}">${data.sender}</span>${crown}`}
        </div>
        <div class="${isMe ? 'bg-blue-500 text-white rounded-tr-none' : 'bg-slate-100 text-slate-700 rounded-tl-none'} p-3 rounded-2xl text-sm font-bold shadow-sm max-w-[80%]">
            ${data.text}
        </div>
    `;
    display.appendChild(div);
    display.scrollTop = display.scrollHeight;
    
    if(!document.getElementById('chatPopup').classList.contains('active')) {
        document.getElementById('chatBadge').classList.remove('hidden');
    }
});

document.getElementById('chatMsgInput')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChatMessage(); });


/**
 * 4. 에디터 및 오브젝트 엔진
 * -------------------------------------------------------------------------
 */
function initZizonBlockly() {
    if(workspace) return;
    workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('zizonToolbox'),
        zoom: { controls: true, wheel: true },
        trashcan: true
    });
    // 변수 생성 시 멈춤 방지 (순정 리스너)
    workspace.addChangeListener(Blockly.Events.disableOrphans);
    createNewObject();
}

function createNewObject() {
    const id = "obj_" + Date.now();
    const newObj = {
        id: id,
        name: "지존 오브젝트 " + (objects.length + 1),
        x: 150, y: 150, rotation: 0,
        xml: "",
        costume: null
    };
    objects.push(newObj);
    updateObjectUI();
    focusObject(id);
}

function focusObject(id) {
    if(activeId && workspace) {
        const current = objects.find(o => o.id === activeId);
        if(current) current.xml = Blockly.Xml.domToText(Blockly.Xml.workspaceToDom(workspace));
    }
    activeId = id;
    const target = objects.find(o => o.id === id);
    workspace.clear();
    if(target.xml) {
        try { Blockly.Xml.domToWorkspace(Blockly.Xml.textToDom(target.xml), workspace); } catch(e) {}
    }
    updateObjectUI();
    renderGameStage();
    setTimeout(() => Blockly.svgResize(workspace), 50);
}

function updateObjectUI() {
    const list = document.getElementById('objScrollArea');
    document.getElementById('objCounter').innerText = objects.length;
    list.innerHTML = '';
    objects.forEach(o => {
        const card = document.createElement('div');
        card.className = `obj-card ${o.id === activeId ? 'selected' : ''}`;
        card.onclick = () => focusObject(o.id);
        card.innerHTML = `
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-slate-100 rounded-xl overflow-hidden flex items-center justify-center border">
                    ${o.costume ? `<img src="${o.costume}" class="w-full h-full object-contain">` : '<span class="text-xs">💎</span>'}
                </div>
                <span class="text-xs font-black text-slate-700">${o.name}</span>
            </div>
            <button onclick="event.stopPropagation(); deleteObject('${o.id}')" class="text-slate-300 hover:text-red-500 font-black text-xl">×</button>
        `;
        list.appendChild(card);
    });
}

function deleteObject(id) {
    if(objects.length <= 1) return alert("오브젝트는 최소 1개가 필요합니다!");
    objects = objects.filter(o => o.id !== id);
    focusObject(objects[0].id);
}

function renderGameStage() {
    const screen = document.getElementById('gameScreen');
    screen.innerHTML = '';
    objects.forEach(o => {
        const div = document.createElement('div');
        div.style.cssText = `position:absolute; left:${o.x}px; top:${o.y}px; transform:translate(-50%, -50%) rotate(${o.rotation}deg);`;
        if(o.costume) {
            div.innerHTML = `<img src="${o.costume}" style="width:80px; height:80px; object-fit:contain;">`;
        } else {
            div.innerHTML = `<div class="w-20 h-20 bg-blue-100 border-4 border-blue-400 rounded-2xl shadow-sm"></div>`;
        }
        screen.appendChild(div);
    });
}


/**
 * 5. UI 제어 및 기타 기능
 * -------------------------------------------------------------------------
 */
function navigate(viewName) {
    ['viewAuth', 'viewGallery', 'viewEditor'].forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById('view' + viewName.charAt(0).toUpperCase() + viewName.slice(1)).classList.remove('hidden');
    
    if(viewName === 'editor') initZizonBlockly();
    if(viewName === 'gallery') renderZizonGallery();
}

function switchEditorTab(tab) {
    const isBlock = tab === 'block';
    document.getElementById('blocklyDiv').classList.toggle('hidden', !isBlock);
    document.getElementById('shapeEditor').classList.toggle('hidden', isBlock);
    document.getElementById('btnTabBlock').classList.toggle('active', isBlock);
    document.getElementById('btnTabShape').classList.toggle('active', !isBlock);
    if(isBlock) setTimeout(() => Blockly.svgResize(workspace), 50);
}

function renderZizonGallery() {
    const grid = document.getElementById('galleryGrid');
    const emptyMsg = document.getElementById('noWorkMsg');
    grid.innerHTML = ''; // 유령 작품 완전 삭제
    
    // 실제 저장된 데이터가 없을 경우 메시지 표시
    emptyMsg.classList.remove('hidden');
    
    // (예시) 대표님 공식 작품 하나만 렌더링
    const sample = document.createElement('div');
    sample.className = "ani-slide-up bg-white p-8 rounded-[40px] shadow-sm border border-slate-100 hover:border-blue-400 transition cursor-pointer group";
    sample.innerHTML = `
        <div class="h-40 bg-slate-50 rounded-3xl mb-6 flex items-center justify-center text-6xl group-hover:scale-110 transition">🚀</div>
        <h3 class="text-xl font-black text-slate-800">지존짱짱 공식 예제 <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-xl text-[10px] ml-2">공식 에디션</span></h3>
        <p class="text-xs font-bold text-slate-400 mt-2 italic">Creator: 어쩌다코딩</p>
    `;
    grid.appendChild(sample);
    emptyMsg.classList.add('hidden');
}

/**
 * 6. 인증 및 로그인 시스템
 * -------------------------------------------------------------------------
 */
function handleLogin() {
    const email = document.getElementById('inputEmail').value.trim();
    const pw = document.getElementById('inputPw').value.trim();
    if(!email || !pw) return alert("아이디와 비밀번호를 입력하세요!");
    auth.signInWithEmailAndPassword(email + "@zizon.com", pw).catch(() => alert("지존 인증 실패! 다시 확인하세요."));
}

function handleSignup() {
    const id = prompt("아이디 (영어/숫자):");
    const pw = prompt("비밀번호 (6자 이상):");
    const nick = prompt("닉네임:");
    if(id && pw && nick) {
        auth.createUserWithEmailAndPassword(id+"@zizon.com", pw).then(res => {
            db.ref('users/' + res.user.uid).set({ nickname: nick });
        }).catch(e => alert(e.message));
    }
}

function handleLogout() { auth.signOut().then(() => location.reload()); }

auth.onAuthStateChanged(async user => {
    if(user) {
        const snap = await db.ref('users/' + user.uid).once('value');
        userNick = snap.val()?.nickname || "익명지존";
        isCeo = (userNick === "어쩌다코딩");
        
        document.getElementById('userNickLabel').innerText = userNick + " 님";
        document.getElementById('mainNav').classList.remove('hidden');
        if(isCeo) document.getElementById('ceoPanel').classList.remove('hidden');
        
        navigate('gallery');
    } else {
        document.getElementById('mainNav').classList.add('hidden');
        navigate('auth');
    }
});

// 그림판 로직
const canvas = document.getElementById('zizonCanvas'), ctx = canvas.getContext('2d');
let drawing = false;
canvas.onmousedown = (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); };
canvas.onmousemove = (e) => { if(drawing) { ctx.lineWidth = 10; ctx.lineCap='round'; ctx.strokeStyle=document.getElementById('brushColor').value; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } };
canvas.onmouseup = () => drawing = false;
function clearZizonCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); }
function saveZizonShape() {
    const target = objects.find(o => o.id === activeId);
    target.costume = canvas.toDataURL();
    renderGameStage(); updateObjectUI();
    alert("모양이 지존하게 저장되었습니다.");
}
function runZizonEngine() { alert("지존 엔진 가동! 블록 코딩이 실행됩니다."); }
function awardZizonEdition() {
    const title = prompt("에디션을 하사할 작품 제목:");
    if(title) alert(`'${title}' 작품에 지존짱짱 공식 에디션을 하사했습니다!`);
}
