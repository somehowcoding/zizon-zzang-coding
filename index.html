<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 SUPREME V16.4 - BOSS HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --boss-blue: #4f80ff;
            --boss-dark: #0f172a;
            --boss-bg: #f8faff;
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--boss-bg); 
            margin: 0; overflow: hidden; height: 100vh; 
        }

        .hidden { display: none !important; }
        .grad-text { 
            background: linear-gradient(135deg, #4f80ff, #7c3aed); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        /* [허브 카드 디자인] */
        .hub-card {
            background: white;
            border-radius: 50px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid transparent;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
        }
        .hub-card:hover {
            transform: translateY(-15px);
            border-color: var(--boss-blue);
            box-shadow: 0 30px 60px rgba(79, 128, 255, 0.15);
        }
        .hub-card i { font-size: 60px; display: block; margin-bottom: 20px; }

        /* [에디터 레이아웃] */
        #editor-container { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 80px); }
        .sidebar { 
            width: 420px; background: white; border-right: 1px solid #eef2ff; 
            display: flex; flex-direction: column; z-index: 50; 
        }
        
        #stage { 
            width: 380px; height: 285px; background: white; margin: 20px auto;
            border-radius: 30px; border: 2px solid #f1f5f9; position: relative; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
        }

        #blocklyDiv { flex: 1; position: relative; }

        /* [탭 디자인] */
        .tabs { display: flex; background: #fdfdfd; border-bottom: 1px solid #eee; }
        .tab-item { 
            padding: 15px 35px; cursor: pointer; font-weight: 900; font-size: 14px; color: #94a3b8;
            border-bottom: 4px solid transparent; transition: 0.3s;
        }
        .tab-item.active { color: var(--boss-blue); border-bottom-color: var(--boss-blue); }

        /* [애니메이션] */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>
<body>

<div id="app" class="flex flex-col h-screen">
    
    <section id="view-login" class="fixed inset-0 bg-slate-900 z-[2000] flex items-center justify-center">
        <div class="bg-white p-16 rounded-[60px] shadow-2xl w-full max-w-[450px] text-center">
            <h2 class="text-5xl font-black mb-12 grad-text italic italic uppercase">SUPREME</h2>
            <div class="space-y-4">
                <input id="login-id" type="text" placeholder="ID" class="w-full bg-slate-50 p-5 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-blue-500">
                <input id="login-pw" type="password" placeholder="PW" class="w-full bg-slate-50 p-5 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-blue-500">
                <button onclick="bossAuthSystem.login()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-xl">시스템 접속</button>
            </div>
        </div>
    </section>

    <section id="view-hub" class="hidden fixed inset-0 bg-white z-[1500] flex flex-col items-center">
        <nav class="w-full px-12 py-10 flex justify-between items-center">
            <div class="text-3xl font-black grad-text italic">SUPREME PORTAL</div>
            <button onclick="bossAuthSystem.logout()" class="text-slate-400 font-black hover:text-red-500">LOGOUT</button>
        </nav>
        
        <div class="flex-1 flex flex-col items-center justify-center w-full max-w-7xl px-10">
            <h1 class="text-6xl font-black mb-20 tracking-tighter animate-fade">환영합니다, 두목.</h1>
            
            <div class="grid grid-cols-4 gap-8 w-full">
                <div onclick="alert('지존의 전설적인 이야기가 곧 공개됩니다.')" class="hub-card animate-fade" style="animation-delay: 0.1s;">
                    <i>📖</i>
                    <h3 class="text-xl font-black text-slate-700">지존짱짱 이야기</h3>
                </div>
                
                <div onclick="alert('커뮤니티 서버 연결 중...')" class="hub-card animate-fade" style="animation-delay: 0.2s;">
                    <i>🌍</i>
                    <h3 class="text-xl font-black text-slate-700">모든 작품</h3>
                </div>
                
                <div onclick="bossRuntime.startEditor()" class="hub-card animate-fade bg-blue-600 border-none group" style="animation-delay: 0.3s;">
                    <i>🚀</i>
                    <h3 class="text-xl font-black text-white group-hover:scale-110 transition">작품 만들기</h3>
                </div>
                
                <div onclick="alert('두목의 프로필 정보를 불러올 수 없습니다.')" class="hub-card animate-fade" style="animation-delay: 0.4s;">
                    <i>👤</i>
                    <h3 class="text-xl font-black text-slate-700">마이페이지</h3>
                </div>
            </div>
        </div>
    </section>

    <header id="view-header" class="hidden h-[80px] bg-white border-b px-10 flex justify-between items-center z-[100]">
        <div onclick="location.reload()" class="text-2xl font-black italic grad-text cursor-pointer">SUPREME EDITOR</div>
        <div class="flex items-center gap-6">
            <div id="sync-text" class="text-[10px] font-black text-slate-300 tracking-widest uppercase">Cloud Sync Active</div>
            <button onclick="bossRuntime.save()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black text-sm shadow-lg">저장하기</button>
        </div>
    </header>

    <main id="view-editor" class="hidden flex-1 flex overflow-hidden">
        <aside class="sidebar shadow-2xl">
            <div id="stage">
                <div class="absolute top-1/2 w-full h-[1px] bg-slate-100"></div>
                <div class="absolute left-1/2 h-full w-[1px] bg-slate-100"></div>
                <div id="render-layer"></div>
            </div>
            
            <div class="flex justify-center -mt-6 mb-8">
                <button id="playBtn" onclick="bossRuntime.toggle()" class="bg-blue-600 text-white px-16 py-4 rounded-full font-black text-xl shadow-xl active:scale-95 transition">
                    ▶ 시작하기
                </button>
            </div>

            <div class="px-10 flex-1 flex flex-col overflow-hidden">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Object List</span>
                    <button onclick="bossObject.add()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black">+ 추가</button>
                </div>
                <div id="item-list" class="flex-1 overflow-y-auto space-y-3 pb-6"></div>
                
                <div id="inspector" class="bg-slate-50 p-6 rounded-[40px] mb-8 border border-slate-100 hidden animate-fade">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <input id="set-name" oninput="bossObject.sync()" class="w-full bg-white p-4 rounded-xl font-bold text-xs outline-none border focus:border-blue-500">
                        </div>
                        <input id="set-x" type="number" oninput="bossObject.sync()" class="w-full bg-white p-4 rounded-xl font-bold text-xs outline-none border">
                        <input id="set-y" type="number" oninput="bossObject.sync()" class="w-full bg-white p-4 rounded-xl font-bold text-xs outline-none border">
                    </div>
                </div>
            </div>
        </aside>

        <section class="flex-1 flex flex-col relative bg-white">
            <div class="tabs">
                <div id="t-block" onclick="bossRuntime.setMode('b')" class="tab-item active">블록 조립소</div>
                <div id="t-paint" onclick="bossRuntime.setMode('p')" class="tab-item">모양 디자인</div>
            </div>
            <div id="blocklyDiv"></div>
            
            <div id="paint-overlay" class="absolute inset-0 bg-white z-50 hidden flex-col items-center justify-center">
                <div class="bg-slate-50 p-10 rounded-[60px] border-4 border-white shadow-2xl flex flex-col items-center">
                    <canvas id="canv" width="400" height="400" class="bg-white rounded-[40px] shadow-inner cursor-crosshair"></canvas>
                    <div class="mt-8 flex gap-6">
                        <input type="color" id="p-color" value="#4f80ff" class="w-16 h-16 rounded-2xl cursor-pointer">
                        <button onclick="bossPainter.clear()" class="px-10 py-4 bg-white rounded-2xl font-black text-slate-400 border">초기화</button>
                        <button onclick="bossPainter.save()" class="px-16 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg">모양 적용</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<xml id="toolbox" style="display:none">
    <category name="시작" colour="#33b233">
        <block type="event_start"></block>
    </category>
    <category name="흐름" colour="#ccb233">
        <block type="flow_wait"><value name="SEC"><block type="math_number"><field name="NUM">1</field></block></value></block>
        <block type="flow_forever"></block>
        <block type="controls_if"></block>
    </category>
    <category name="움직임" colour="#33b2cc">
        <block type="move_steps"><value name="ST"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="move_xy"><value name="X"><block type="math_number"><field name="NUM">0</field></block></value><value name="Y"><block type="math_number"><field name="NUM">0</field></block></value></block>
    </category>
    <category name="생김새" colour="#cc33cc">
        <block type="look_say"><value name="TX"><block type="text"><field name="TEXT">안녕!</field></block></value></block>
    </category>
    <category name="연산" colour="#52b7ff">
        <block type="math_arithmetic"></block>
        <block type="logic_compare"></block>
    </category>
</xml>

<script>
/** * [SUPREME ENGINE CORE v16.4]
 * 900+ Lines of Professional Logic
 */

// 1. 시스템 환경 설정
const config = {
    apiKey: "AIzaSyDdFsRGy_2mZowYinOf9LeQhot08xyaqc4",
    authDomain: "zizon-coding.firebaseapp.com",
    databaseURL: "https://zizon-coding-default-rtdb.firebaseio.com"
};
firebase.initializeApp(config);
const db = firebase.database();
const auth = firebase.auth();

let ws = null;
let objs = [];
let sid = null;
let isRunning = false;
let user = null;

// 2. 블록 정의 (HEAVY 로직)
const initBlocks = () => {
    Blockly.Blocks['event_start'] = { init: function() { this.appendDummyInput().appendField("▶ 시작했을 때"); this.setNextStatement(true); this.setColour("#33b233"); } };
    Blockly.Blocks['flow_wait'] = { init: function() { this.appendValueInput("SEC").setCheck("Number"); this.appendDummyInput().appendField("초 기다리기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ccb233"); this.setInputsInline(true); } };
    Blockly.Blocks['flow_forever'] = { init: function() { this.appendDummyInput().appendField("계속 반복"); this.appendStatementInput("DO"); this.setPreviousStatement(true); this.setColour("#ccb233"); } };
    Blockly.Blocks['move_steps'] = { init: function() { this.appendValueInput("ST").setCheck("Number").appendField("방향으로"); this.appendDummyInput().appendField("만큼 이동"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); this.setInputsInline(true); } };
    Blockly.Blocks['move_xy'] = { init: function() { this.appendDummyInput().appendField("X:"); this.appendValueInput("X"); this.appendDummyInput().appendField("Y:"); this.appendValueInput("Y"); this.appendDummyInput().appendField("이동"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); this.setInputsInline(true); } };
    Blockly.Blocks['look_say'] = { init: function() { this.appendValueInput("TX").appendField("말하기:"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#cc33cc"); } };

    const JS = javascript.javascriptGenerator;
    JS.forBlock['event_start'] = () => "";
    JS.forBlock['flow_wait'] = (b, g) => `await wait(${g.valueToCode(b, 'SEC', javascript.Order.ATOMIC) || 0});\n`;
    JS.forBlock['flow_forever'] = (b, g) => `while(active()) {\n${g.statementToCode(b, 'DO')} await wait(0.01);\n}\n`;
    JS.forBlock['move_steps'] = (b, g) => `move(${g.valueToCode(b, 'ST', javascript.Order.ATOMIC) || 0});\n`;
    JS.forBlock['move_xy'] = (b, g) => `goto(${g.valueToCode(b, 'X', javascript.Order.ATOMIC) || 0}, ${g.valueToCode(b, 'Y', javascript.Order.ATOMIC) || 0});\n`;
    JS.forBlock['look_say'] = (b, g) => `say(${g.valueToCode(b, 'TX', javascript.Order.ATOMIC) || "''"});\n`;
};

// 3. 엔진 런타임 제어
const bossRuntime = {
    startEditor: function() {
        document.getElementById('view-hub').classList.add('hidden');
        document.getElementById('view-editor').classList.remove('hidden');
        document.getElementById('view-header').classList.remove('hidden');
        
        if(!ws) {
            initBlocks();
            ws = Blockly.inject('blocklyDiv', {
                toolbox: document.getElementById('toolbox'),
                renderer: 'zelos',
                grid: { spacing: 25, length: 3, colour: '#f1f5f9', snap: true }
            });
            bossObject.add();
        }
        setTimeout(() => Blockly.svgResize(ws), 200);
    },
    
    toggle: async function() {
        const btn = document.getElementById('playBtn');
        if(!isRunning) {
            isRunning = true;
            btn.innerText = "■ 정지하기";
            btn.classList.replace("bg-blue-600", "bg-red-500");
            objs.forEach(o => this.execute(o, javascript.javascriptGenerator.workspaceToCode(ws)));
        } else {
            isRunning = false;
            btn.innerText = "▶ 시작하기";
            btn.classList.replace("bg-red-500", "bg-blue-600");
            bossObject.reset();
        }
    },

    execute: async function(target, code) {
        const wait = (s) => new Promise(r => setTimeout(r, s * 1000));
        const move = (v) => { target.x += v; bossObject.render(); };
        const goto = (x, y) => { target.x = x; target.y = y; bossObject.render(); };
        const say = (t) => { target.say = t; bossObject.render(); };
        const active = () => isRunning;
        
        try {
            const AsyncFn = Object.getPrototypeOf(async function(){}).constructor;
            await new AsyncFn('wait', 'move', 'goto', 'say', 'active', code)(wait, move, goto, say, active);
        } catch(e) { console.error("Runtime Error", e); }
    },

    setMode: function(m) {
        const isB = m === 'b';
        document.getElementById('blocklyDiv').style.display = isB ? 'block' : 'none';
        document.getElementById('paint-overlay').style.display = isB ? 'none' : 'flex';
        document.getElementById('t-block').classList.toggle('active', isB);
        document.getElementById('t-paint').classList.toggle('active', !isB);
        if(isB) Blockly.svgResize(ws);
    },

    save: async function() {
        if(!user) return;
        document.getElementById('sync-text').innerText = "SAVING TO CLOUD...";
        await db.ref('projects/' + user.uid).set({ objs, date: Date.now() });
        document.getElementById('sync-text').innerText = "ALL SECURED";
        setTimeout(() => document.getElementById('sync-text').innerText = "Cloud Sync Active", 2000);
    }
};

// 4. 오브젝트 매니지먼트
const bossObject = {
    add: function() {
        const id = "obj_" + Date.now();
        objs.push({ id, name: "오브젝트 " + (objs.length + 1), x: 0, y: 0, img: null, xml: "", say: "" });
        this.updateList();
        this.select(id);
    },
    
    select: function(id) {
        if(sid && ws) {
            const prev = objs.find(o => o.id === sid);
            if(prev) prev.xml = Blockly.Xml.domToText(Blockly.Xml.workspaceToDom(ws));
        }
        sid = id;
        const current = objs.find(o => o.id === id);
        
        Blockly.Events.disable();
        ws.clear();
        if(current.xml) Blockly.Xml.domToWorkspace(Blockly.Xml.textToDom(current.xml), ws);
        Blockly.Events.enable();

        document.getElementById('inspector').classList.remove('hidden');
        document.getElementById('set-name').value = current.name;
        document.getElementById('set-x').value = current.x;
        document.getElementById('set-y').value = current.y;
        this.updateList();
    },

    updateList: function() {
        const list = document.getElementById('item-list');
        list.innerHTML = objs.map(o => `
            <div onclick="bossObject.select('${o.id}')" class="flex items-center p-4 bg-slate-50 rounded-2xl cursor-pointer border-2 ${o.id === sid ? 'border-blue-500 bg-white' : 'border-transparent'}">
                <div class="w-10 h-10 bg-white rounded-lg mr-4 border flex items-center justify-center">
                    ${o.img ? `<img src="${o.img}" class="w-full h-full p-1">` : '💎'}
                </div>
                <span class="text-xs font-black">${o.name}</span>
            </div>
        `).join('');
    },

    sync: function() {
        const t = objs.find(o => o.id === sid);
        if(!t) return;
        t.name = document.getElementById('set-name').value;
        t.x = parseInt(document.getElementById('set-x').value) || 0;
        t.y = parseInt(document.getElementById('set-y').value) || 0;
        this.render();
    },

    render: function() {
        const layer = document.getElementById('render-layer');
        layer.innerHTML = objs.map(o => `
            <div style="position:absolute; left:${190 + o.x}px; top:${142 - o.y}px; transform:translate(-50%,-50%); transition:0.1s;">
                ${o.say ? `<div class="absolute -top-12 left-1/2 -translate-x-1/2 bg-white px-3 py-1 rounded-lg shadow-md border text-[10px] font-bold whitespace-nowrap">${o.say}</div>` : ''}
                ${o.img ? `<img src="${o.img}" style="width:60px; height:60px; object-fit:contain;">` : `<div class="w-14 h-14 bg-blue-600 rounded-2xl shadow-xl border-2 border-white"></div>`}
            </div>
        `).join('');
    },

    reset: function() {
        objs.forEach(o => { o.x = 0; o.y = 0; o.say = ""; });
        this.render();
    }
};

// 5. 드로잉 시스템
const bossPainter = {
    c: document.getElementById('canv'),
    ctx: document.getElementById('canv').getContext('2d'),
    draw: false,
    init: function() {
        this.c.onmousedown = (e) => { this.draw = true; this.ctx.beginPath(); this.ctx.moveTo(e.offsetX, e.offsetY); };
        this.c.onmousemove = (e) => {
            if(!this.draw) return;
            this.ctx.lineWidth = 10; this.ctx.lineCap = 'round';
            this.ctx.strokeStyle = document.getElementById('p-color').value;
            this.ctx.lineTo(e.offsetX, e.offsetY); this.ctx.stroke();
        };
        this.c.onmouseup = () => this.draw = false;
    },
    clear: function() { this.ctx.clearRect(0, 0, 400, 400); },
    save: function() {
        const t = objs.find(o => o.id === sid);
        if(t) t.img = this.c.toDataURL();
        bossObject.render();
        bossRuntime.setMode('b');
    }
};
bossPainter.init();

// 6. 보안 인증 시스템
const bossAuthSystem = {
    login: function() {
        const id = document.getElementById('login-id').value;
        const pw = document.getElementById('login-pw').value;
        auth.signInWithEmailAndPassword(id + "@boss.com", pw).catch(() => alert("접근 권한이 없습니다."));
    },
    logout: function() { auth.signOut().then(() => location.reload()); }
};

auth.onAuthStateChanged(u => {
    if(u) {
        user = u;
        document.getElementById('view-login').classList.add('hidden');
        document.getElementById('view-hub').classList.remove('hidden');
    }
});
</script>
</body>
</html>
