<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 - Made by 어쩌다코딩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fbff; margin: 0; }
        .hidden { display: none !important; }
        .login-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border: 1px solid #f1f5f9; }
        .input-box { width: 100%; background: #f8fafc; border: 2px solid #f1f5f9; padding: 14px; border-radius: 16px; outline: none; font-weight: 600; margin-bottom: 12px; display: block; }
        #blocklyDiv { width: 100%; height: 600px; border-radius: 20px; border: 2px solid #e2e8f0; margin-top: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-slate-50">

<nav id="topNav" class="bg-white border-b px-6 py-4 flex justify-between items-center hidden sticky top-0 z-50">
    <div class="text-xl font-black text-blue-600 italic cursor-pointer" onclick="showSection('main')">지존짱짱 🚀</div>
    <div class="flex items-center gap-4">
        <button class="font-bold text-slate-600 hover:text-blue-600" onclick="showSection('main')">갤러리</button>
        <button class="font-bold text-slate-600 hover:text-blue-600" onclick="showSection('create')">만들기</button>
        <button class="font-bold text-slate-600 hover:text-blue-600" onclick="showSection('story')">이야기</button>
        <div class="flex items-center gap-2 ml-4">
            <span id="userNick" class="text-sm font-bold text-slate-700 border-r pr-3"></span>
            <button id="logoutBtn" class="text-xs text-red-500 font-bold underline">로그아웃</button>
        </div>
    </div>
</nav>

<div id="authBox" class="flex-grow flex items-center justify-center p-6">
    <div class="login-card">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-slate-800">지존짱짱 👋</h2>
            <p class="text-xs text-blue-500 font-bold mt-1 uppercase tracking-widest">Made by 어쩌다코딩</p>
        </div>
        <div id="loginView">
            <input id="loginId" type="text" placeholder="아이디" class="input-box">
            <input id="loginPw" type="password" placeholder="비밀번호" class="input-box">
            <button id="doLoginBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black mb-4">로그인</button>
            <button id="goSignupBtn" class="w-full text-slate-400 text-sm font-bold underline">회원가입 하기</button>
        </div>
        <div id="signupView" class="hidden">
            <input id="regId" type="text" placeholder="아이디 정하기" class="input-box">
            <input id="regNick" type="text" placeholder="닉네임 정하기" class="input-box">
            <input id="regPw" type="password" placeholder="비밀번호 (6자 이상)" class="input-box">
            <button id="doSignupBtn" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black mb-4">가입 완료</button>
            <button id="goLoginBtn" class="w-full text-slate-400 text-sm font-bold underline">이미 계정이 있어요</button>
        </div>
    </div>
</div>

<main id="mainView" class="hidden p-8 max-w-5xl mx-auto w-full">
    <h1 class="text-3xl font-black mb-10 text-slate-800">모두의 작품 🌍</h1>
    <div id="workList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
</main>

<section id="createView" class="hidden p-8 max-w-6xl mx-auto w-full">
    <div class="bg-white p-6 rounded-3xl shadow-lg border border-slate-100">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-black text-slate-800">코딩 스튜디오 🛠️</h2>
            <button id="saveWorkBtn" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-black">작품 저장</button>
        </div>
        <input id="workTitle" type="text" placeholder="작품 이름을 입력하세요" class="input-box">
        <div id="blocklyDiv"></div>
    </div>
</section>

<section id="storyView" class="hidden p-8 max-w-3xl mx-auto w-full">
    <h1 class="text-3xl font-black mb-8 text-slate-800">이야기 게시판 💬</h1>
    <div class="bg-white p-6 rounded-3xl shadow-sm mb-8 border border-slate-100">
        <textarea id="storyInput" placeholder="무슨 소식이 있나요?" class="input-box h-24 resize-none mb-4"></textarea>
        <button id="postStoryBtn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black">글쓰기</button>
    </div>
    <div id="storyList" class="space-y-4"></div>
</section>

<xml id="toolbox" style="display: none">
    <category name="시작" colour="#33b233">
        <block type="when_run"></block>
    </category>
    <category name="움직임" colour="#33b2cc">
        <block type="move_x"><value name="VAL"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="move_y"><value name="VAL"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="move_dir"><value name="VAL"><block type="math_number"><field name="NUM">10</field></block></value></block>
    </category>
    <category name="흐름" colour="#ccb233">
        <block type="controls_repeat_ext"></block>
        <block type="controls_if"></block>
    </category>
    <category name="변수" colour="#cc3333" custom="VARIABLE"></category>
    <category name="계산" colour="#3333cc">
        <block type="math_number"></block>
        <block type="math_arithmetic"></block>
    </category>
</xml>

<script>
// Firebase 설정
const firebaseConfig = {
    apiKey: "AIzaSyDdFsRGy_2mZowYinOf9LeQhot08xyaqc4",
    authDomain: "zizon-coding.firebaseapp.com",
    projectId: "zizon-coding",
    databaseURL: "https://zizon-coding-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
let currentUser = null;
let workspace = null;

// 엔트리 스타일 블록 정의
Blockly.Blocks['when_run'] = {
  init: function() {
    this.appendDummyInput().appendField("▶ 시작하기를 클릭했을 때");
    this.setNextStatement(true, null);
    this.setColour("#33b233");
  }
};

Blockly.Blocks['move_x'] = {
  init: function() {
    this.appendValueInput("VAL").setCheck("Number").appendField("x좌표를");
    this.appendDummyInput().appendField("만큼 이동하기");
    this.setPreviousStatement(true, null);
    this.setNextStatement(true, null);
    this.setColour("#33b2cc");
  }
};

Blockly.Blocks['move_y'] = {
  init: function() {
    this.appendValueInput("VAL").setCheck("Number").appendField("y좌표를");
    this.appendDummyInput().appendField("만큼 이동하기");
    this.setPreviousStatement(true, null);
    this.setNextStatement(true, null);
    this.setColour("#33b2cc");
  }
};

Blockly.Blocks['move_dir'] = {
  init: function() {
    this.appendValueInput("VAL").setCheck("Number").appendField("이동방향으로");
    this.appendDummyInput().appendField("만큼 이동하기");
    this.setPreviousStatement(true, null);
    this.setNextStatement(true, null);
    this.setColour("#33b2cc");
  }
};

function showSection(name) {
    ['mainView', 'createView', 'storyView'].forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById(name + 'View').classList.remove('hidden');
    if(name === 'create' && !workspace) {
        workspace = Blockly.inject('blocklyDiv', { 
            toolbox: document.getElementById('toolbox'),
            zoom: { controls: true, wheel: true } 
        });
    }
    if(name === 'main') loadWorks();
    if(name === 'story') loadStories();
}

// 데이터 로드/저장/로그인 로직
function loadStories() {
    db.ref('stories').off();
    db.ref('stories').on('value', snap => {
        const list = document.getElementById('storyList');
        list.innerHTML = '';
        if(!snap.val()) return;
        Object.entries(snap.val()).reverse().forEach(([key, s]) => {
            const isManager = currentUser && currentUser.nickname === '어쩌다코딩';
            const delBtn = isManager ? `<button onclick="db.ref('stories/${key}').remove()" class="text-red-400 text-xs ml-2">[삭제]</button>` : '';
            list.innerHTML += `<div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm"><p class="text-xs font-black text-blue-600 mb-1">${s.nickname}${delBtn}</p><p class="text-slate-700">${s.text}</p></div>`;
        });
    });
}

function loadWorks() {
    db.ref('works').off();
    db.ref('works').on('value', snap => {
        const list = document.getElementById('workList');
        list.innerHTML = '';
        if(!snap.val()) return;
        Object.values(snap.val()).reverse().forEach(w => {
            list.innerHTML += `<div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm"><h3 class="font-black text-xl mb-2">${w.title}</h3><p class="text-xs font-bold text-blue-500">By ${w.nickname}</p></div>`;
        });
    });
}

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("goSignupBtn").onclick = () => {
        document.getElementById("loginView").classList.add("hidden");
        document.getElementById("signupView").classList.remove("hidden");
    };
    document.getElementById("goLoginBtn").onclick = () => {
        document.getElementById("signupView").classList.add("hidden");
        document.getElementById("loginView").classList.remove("hidden");
    };
    document.getElementById("doSignupBtn").onclick = async () => {
        const id = document.getElementById('regId').value.trim();
        const nick = document.getElementById('regNick').value.trim();
        const pw = document.getElementById('regPw').value.trim();
        if(!id || !nick || pw.length < 6) return alert("똑바로 입력해줘!");
        try {
            const res = await auth.createUserWithEmailAndPassword(id + "@zizon.com", pw);
            await db.ref('users/' + res.user.uid).set({ id, nickname: nick });
            location.reload();
        } catch(e) { alert("가입 실패!"); }
    };
    document.getElementById("doLoginBtn").onclick = () => {
        const id = document.getElementById('loginId').value.trim();
        const pw = document.getElementById('loginPw').value.trim();
        auth.signInWithEmailAndPassword(id + "@zizon.com", pw).catch(() => alert("실패!"));
    };
    document.getElementById("logoutBtn").onclick = () => auth.signOut().then(() => location.reload());
    document.getElementById("postStoryBtn").onclick = async () => {
        const text = document.getElementById('storyInput').value.trim();
        if(!text || !currentUser) return;
        await db.ref('stories').push({ text, nickname: currentUser.nickname, time: Date.now() });
        document.getElementById('storyInput').value = '';
    };
    document.getElementById("saveWorkBtn").onclick = async () => {
        const title = document.getElementById('workTitle').value.trim();
        if(!title || !currentUser) return alert("제목을 입력해줘!");
        const xml = Blockly.Xml.workspaceToDom(workspace);
        const xmlText = Blockly.Xml.domToText(xml);
        await db.ref('works').push({ title, code: xmlText, nickname: currentUser.nickname });
        alert("작품이 갤러리에 올라갔어!");
        showSection('main');
    };
});

auth.onAuthStateChanged(async user => {
    if(user) {
        const snap = await db.ref('users/' + user.uid).once('value');
        currentUser = snap.val();
        if(currentUser) {
            document.getElementById('authBox').classList.add('hidden');
            document.getElementById('topNav').classList.remove('hidden');
            document.getElementById('userNick').innerText = currentUser.nickname;
            if(currentUser.nickname === '어쩌다코딩') document.getElementById('userNick').classList.add('text-blue-600');
            showSection('main');
        }
    } else {
        document.getElementById('authBox').classList.remove('hidden');
        document.getElementById('topNav').classList.add('hidden');
    }
});
</script>
</body>
</html>
