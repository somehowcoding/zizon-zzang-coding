<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 - 모두의 작품</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fbff; }
        .hidden { display: none !important; }
        .nav-item { font-weight: 700; color: #475569; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .nav-item:hover { color: #4f46e5; }
        .active-tab { background-color: #4f46e5; color: white !important; padding: 8px 20px; border-radius: 12px; }
        .project-card { background: white; border: 2px solid #ffeb3b; border-radius: 24px; padding: 24px; transition: 0.3s; width: 260px; }
        .project-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .btn-create { background: #2563eb; color: white; padding: 12px 24px; border-radius: 16px; font-weight: 800; transition: 0.2s; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4); }
        .btn-create:hover { background: #1d4ed8; transform: scale(1.05); }
    </style>
</head>
<body>

<nav class="bg-white border-b px-12 py-4 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-2">
        <span class="text-2xl font-black text-blue-600 italic">지존짱짱 🚀</span>
    </div>
    <div class="flex items-center gap-10">
        <div class="flex gap-8 items-center">
            <button class="nav-item">🏠 홈</button>
            <button class="nav-item">📦 마이페이지</button>
            <button class="nav-item active-tab">💬 이야기</button>
        </div>
        <div class="h-6 w-[1px] bg-slate-200"></div>
        <div class="flex items-center gap-3">
            <span class="text-[10px] bg-yellow-400 px-2 py-0.5 rounded font-black shadow-sm">👑 관리자</span>
            <span class="text-sm font-bold text-slate-700">어쩌다코딩님</span>
            <button onclick="handleLogout()" class="text-xs text-red-500 font-bold hover:underline">로그아웃</button>
        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto mt-16 px-6">
    <div class="flex justify-between items-end mb-12">
        <div>
            <h1 class="text-4xl font-black text-slate-800 mb-3">모두의 작품 🌍</h1>
            <p class="text-slate-500 font-bold text-lg text-blue-500">전 세계 친구들의 코드를 구경해보세요.</p>
        </div>
        <button onclick="addProject()" class="btn-create text-lg">+ 새 작품 만들기</button>
    </div>

    <div id="projectList" class="flex flex-wrap gap-8">
        <div class="project-card text-center">
            <div class="text-5xl mb-4">🤖</div>
            <h3 class="text-xl font-black text-slate-800 mb-1">테스트</h3>
            <span class="inline-block bg-yellow-300 text-[10px] font-black px-2 py-0.5 rounded mb-3">⚙️ 스션</span>
            <p class="text-xs text-slate-400 font-bold mb-6">By 어쩌다코딩</p>
            <button class="w-full bg-slate-800 text-white py-2 rounded-xl text-xs font-bold hover:bg-slate-700">스션 해제 ✨</button>
        </div>
    </div>
</main>

<script>
// Firebase 설정 (기존 정보 그대로 사용)
const firebaseConfig = {
    apiKey: "AIzaSyDdFsRGy_2mZowYinOf9LeQhot08xyaqc4",
    authDomain: "zizon-coding.firebaseapp.com",
    projectId: "zizon-coding",
    storageBucket: "zizon-coding.firebasestorage.app",
    messagingSenderId: "146850583672",
    appId: "1:146850583672:web:243e71867880c00ffdc98d",
    databaseURL: "https://zizon-coding-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 작품 만들기 버튼 기능
function addProject() {
    const title = prompt("작품 제목을 입력해주세요!");
    if(title) {
        alert("'" + title + "' 작품이 성공적으로 생성되었습니다! (서버 저장 로직 연결 중)");
    }
}

function handleLogout() {
    alert("로그아웃 되었습니다.");
    location.reload();
}
</script>
</body>
</html>
