<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ZIZON v21 FIREBASE</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
<script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
<script src="https://unpkg.com/blockly/blocks_compressed.js"></script>

<!-- 🔥 Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

<style>
body { margin:0; font-family:sans-serif; }
#blocklyDiv { height:60vh; }
#render { height:200px; background:#eee; position:relative; }
.obj { position:absolute; width:50px; height:50px; background:black; color:white; display:flex; align-items:center; justify-content:center; }
</style>
</head>

<body>

<!-- 🔥 컨트롤 -->
<div style="padding:10px; display:flex; gap:10px;">
<button onclick="engine.run()">▶ 실행</button>
<button onclick="engine.stop()">■ 정지</button>

<button onclick="project.save()">💾 저장</button>
<button onclick="project.loadList()">📂 불러오기</button>
<button onclick="project.publish()">🌍 공개</button>
<button onclick="project.loadPublic()">🌐 공개작품</button>
</div>

<div id="blocklyDiv"></div>
<div id="render"></div>

<xml id="toolbox" style="display:none">
<block type="move"></block>
<block type="wait"></block>
</xml>

<script>
/* =========================
   🔥 Firebase 설정 (여기 수정)
========================= */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH",
  projectId: "YOUR_PROJECT_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* =========================
   🔧 Blockly 블록
========================= */
Blockly.Blocks['move'] = {
init(){ this.appendDummyInput().appendField("오른쪽 이동"); this.setPreviousStatement(true); this.setNextStatement(true); }
};
Blockly.JavaScript['move'] = ()=>"move();\n";

Blockly.Blocks['wait'] = {
init(){ this.appendDummyInput().appendField("0.5초 대기"); this.setPreviousStatement(true); this.setNextStatement(true); }
};
Blockly.JavaScript['wait'] = ()=>"await wait(0.5);\n";

/* =========================
   ⚙️ 엔진
========================= */
const engine = {
running:false,
x:0,

run(){
this.running = true;
this.x = 0;

const code = Blockly.JavaScript.workspaceToCode(ws);

const move = ()=>{ this.x+=10; render(); }
const wait = s => new Promise(r=>setTimeout(r,s*1000));

const Async = Object.getPrototypeOf(async function(){}).constructor;
new Async("move","wait","active",`
while(active()){
${code}
}
`)(move,wait,()=>this.running);
},

stop(){ this.running=false; }
};

/* =========================
   🎨 렌더
========================= */
function render(){
document.getElementById('render').innerHTML =
`<div class="obj" style="left:${engine.x}px">Z</div>`;
}

/* =========================
   🚀 프로젝트 시스템 (Firebase)
========================= */
const project = {

async save(){
const name = prompt("작품 이름?");
if(!name) return;

const xml = Blockly.Xml.domToText(
Blockly.Xml.workspaceToDom(ws)
);

await db.collection("projects").add({
name,
xml,
owner:"user1",
isPublic:false,
createdAt:Date.now()
});

alert("🔥 저장 완료");
},

async loadList(){
const snap = await db.collection("projects")
.where("owner","==","user1")
.get();

const list = [];
snap.forEach(doc=>list.push({id:doc.id,...doc.data()}));

if(!list.length) return alert("작품 없음");

const pick = prompt(list.map((p,i)=>i+":"+p.name).join("\n"));
const data = list[pick];
if(!data) return;

ws.clear();
Blockly.Xml.domToWorkspace(
Blockly.Xml.textToDom(data.xml), ws
);
},

async publish(){
const snap = await db.collection("projects")
.where("owner","==","user1")
.get();

const list = [];
snap.forEach(doc=>list.push({id:doc.id,...doc.data()}));

const pick = prompt(list.map((p,i)=>i+":"+p.name).join("\n"));
const data = list[pick];
if(!data) return;

await db.collection("projects").doc(data.id).update({
isPublic:true
});

alert("🌍 공개됨");
},

async loadPublic(){
const snap = await db.collection("projects")
.where("isPublic","==",true)
.get();

const list = [];
snap.forEach(doc=>list.push({id:doc.id,...doc.data()}));

if(!list.length) return alert("공개 작품 없음");

const pick = prompt(list.map((p,i)=>i+":"+p.name).join("\n"));
const data = list[pick];
if(!data) return;

ws.clear();
Blockly.Xml.domToWorkspace(
Blockly.Xml.textToDom(data.xml), ws
);
}

};

/* =========================
   🧩 Blockly INIT
========================= */
const ws = Blockly.inject('blocklyDiv',{
toolbox:document.getElementById('toolbox')
});

</script>

</body>
</html>
