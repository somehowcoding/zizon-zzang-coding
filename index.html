<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 SUPREME - 어쩌다코딩 전용</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --z-blue: #4f80ff; --z-purple: #7c3aed; --z-green: #00c73c; }
        body { font-family: 'Pretendard', sans-serif; background: #f8fafc; margin: 0; overflow: hidden; height: 100vh; }
        
        /* [NAV] */
        .zizon-nav { height: 64px; background: white; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; padding: 0 40px; position: fixed; top: 0; width: 100%; z-index: 2000; }
        .logo-group { display: flex; gap: 4px; margin-right: 50px; cursor: pointer; }
        .l-block { width: 32px; height: 32px; border-radius: 8px; color: white; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; }
        .nav-item { font-weight: 700; color: #333; cursor: pointer; padding: 10px 20px; border-radius: 12px; transition: 0.2s; font-size: 15px; }
        .nav-item:hover { color: var(--z-blue); background: #f0f4ff; }
        .nav-item.active { color: var(--z-blue); background: #eef2ff; }

        /* [SECTIONS] */
        .content-section { margin-top: 64px; height: calc(100vh - 64px); display: none; padding: 30px; overflow-y: auto; }
        .content-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* [EDITOR] */
        #editor-container { display: none; height: calc(100vh - 64px); margin-top: 64px; background: white; }
        #editor-container.active { display: flex; }
        .sidebar { width: 400px; border-right: 1px solid #eee; display: flex; flex-direction: column; background: #fff; }
        #stage { width: 360px; height: 270px; background: #fff; margin: 20px auto; border: 1px solid #eee; border-radius: 12px; position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        #blocklyDiv { flex: 1; }

        /* [COMMUNITY - CHAT] */
        .chat-wrap { max-width: 800px; margin: 0 auto; background: white; height: 100%; border-radius: 20px; display: flex; flex-direction: column; shadow: 0 10px 40px rgba(0,0,0,0.05); }
        #chat-window { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 70%; font-size: 14px; line-height: 1.5; }
        .msg.me { align-self: flex-end; background: var(--z-blue); color: white; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #f1f5f9; color: #334155; border-bottom-left-radius: 4px; }

        /* [MYPAGE DRAWER] */
        #mypage-drawer { position: fixed; right: -450px; top: 64px; width: 400px; height: calc(100vh - 64px); background: white; box-shadow: -10px 0 50px rgba(0,0,0,0.1); z-index: 2500; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); padding: 40px; display: flex; flex-direction: column; }
        #mypage-drawer.open { right: 0; }
        .work-card { background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #eee; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .work-card:hover { transform: scale(1.02); background: #fff; border-color: var(--z-blue); }

        .z-btn { padding: 12px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; border: none; transition: 0.2s; }
        .z-primary { background: var(--z-blue); color: white; }
    </style>
</head>
<body>

    <nav class="zizon-nav">
        <div class="logo-group" onclick="core.go('main')">
            <div class="l-block" style="background:var(--z-blue)">지</div>
            <div class="l-block" style="background:var(--z-purple)">존</div>
        </div>
        <div class="flex gap-2">
            <div id="m-make" class="nav-item" onclick="core.go('make')">만들기</div>
            <div id="m-comm" class="nav-item" onclick="core.go('comm')">커뮤니티</div>
        </div>
        <div class="ml-auto">
            <div onclick="core.toggleMypage()" class="flex items-center gap-3 cursor-pointer group">
                <span class="font-black text-slate-700 group-hover:text-blue-500 transition">마이페이지</span>
                <div class="w-10 h-10 rounded-xl bg-slate-900 overflow-hidden border-2 border-white shadow-md">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=EojjeodaCoding" alt="User">
                </div>
            </div>
        </div>
    </nav>

    <section id="sec-main" class="content-section active">
        <div class="max-w-4xl mx-auto text-center mt-20">
            <h1 class="text-5xl font-black mb-6">반갑습니다, 어쩌다코딩 두목님!</h1>
            <p class="text-slate-400 text-xl">오늘도 지존급 작품을 만드실 준비가 되셨나요?</p>
            <button onclick="core.go('make')" class="mt-10 z-btn z-primary px-20 py-5 text-xl rounded-2xl shadow-xl">창작 시작하기</button>
        </div>
    </section>

    <section id="editor-container">
        <aside class="sidebar">
            <div id="stage"><div id="render-layer" class="w-full h-full relative"></div></div>
            <div class="px-8 flex flex-col gap-3 mb-6">
                <button id="run-btn" onclick="engine.toggle()" class="z-btn z-primary text-xl shadow-lg">▶ 엔진 가동</button>
            </div>
            <div class="px-8 flex-1 flex flex-col overflow-hidden">
                <div class="flex justify-between items-center mb-4 text-[11px] font-black text-slate-400 tracking-tighter">OBJECT INVENTORY <button onclick="obj.add()" class="text-blue-500">+ ADD</button></div>
                <div id="obj-list" class="flex-1 overflow-y-auto pb-4"></div>
            </div>
        </aside>
        <main class="flex-1 flex flex-col">
            <div id="blocklyDiv"></div>
        </main>
    </section>

    <section id="sec-comm" class="content-section bg-slate-50">
        <div class="chat-wrap shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center bg-white rounded-t-2xl">
                <span class="font-black text-xl">지존 실시간 채팅방 💬</span>
                <span class="text-xs text-green-500 font-bold">● 4,281명 접속 중</span>
            </div>
            <div id="chat-window">
                <div class="msg other"><b>운영자:</b> 어쩌다코딩 두목님, 환영합니다!</div>
                <div class="msg other"><b>코딩천재:</b> 와.. 진짜 어쩌다코딩님이 나타났다!!</div>
            </div>
            <div class="p-5 border-t bg-white rounded-b-2xl flex gap-3">
                <input id="chat-input" type="text" placeholder="메시지를 입력하세요..." class="flex-1 bg-slate-100 border-none rounded-xl px-5 outline-none focus:ring-2 ring-blue-400 transition">
                <button onclick="chat.send()" class="z-btn z-primary">전송</button>
            </div>
        </div>
    </section>

    <div id="mypage-drawer">
        <div class="text-center mb-10">
            <div class="w-24 h-24 bg-blue-600 rounded-3xl mx-auto mb-5 flex items-center justify-center text-white text-4xl font-black shadow-xl">OC</div>
            <h2 class="text-2xl font-black">어쩌다코딩</h2>
            <p class="text-blue-500 font-bold">지존 마스터 계정</p>
        </div>
        <div class="flex-1 overflow-y-auto">
            <h4 class="font-black text-slate-400 text-xs mb-4 uppercase">나의 지존 작품들</h4>
            <div id="my-works">
                <div class="work-card"><span>🎮</span> <b>어쩌다 만든 미로 게임</b></div>
                <div class="work-card"><span>🚀</span> <b>지존 좌표 물리 엔진</b></div>
                <div class="work-card"><span>💎</span> <b>코딩 황제의 복수 v2.1</b></div>
                <div class="work-card"><span>🔥</span> <b>실시간 랭킹 시스템</b></div>
            </div>
        </div>
        <button onclick="core.toggleMypage()" class="mt-10 py-4 bg-slate-100 text-slate-500 rounded-2xl font-black hover:bg-slate-200 transition">닫기</button>
    </div>

<xml id="toolbox" style="display:none">
    <category name="시작" colour="#33b233"><block type="e_start"></block></category>
    <category name="움직임" colour="#33b2cc">
        <block type="m_x_by"><value name="V"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="m_y_by"><value name="V"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="m_x_set"><value name="V"><block type="math_number"><field name="NUM">0</field></block></value></block>
        <block type="m_y_set"><value name="V"><block type="math_number"><field name="NUM">0</field></block></value></block>
        <block type="m_rotate"><value name="V"><block type="math_number"><field name="NUM">90</field></block></value></block>
        <block type="m_bounce"></block>
    </category>
    <category name="흐름" colour="#ccb233">
        <block type="f_wait"><value name="S"><block type="math_number"><field name="NUM">1</field></block></value></block>
        <block type="f_forever"></block>
        <block type="f_repeat"><value name="T"><block type="math_number"><field name="NUM">10</field></block></value></block>
    </category>
    <category name="생김새" colour="#cc33cc">
        <block type="l_say"><value name="T"><block type="text"><field name="TEXT">두목!</field></block></value></block>
    </category>
    <category name="자료(변수)" colour="#ff8b3d" custom="VARIABLE"></category>
</xml>

<script>
/** [ZIZON CORE v18.0 - MASTER: EOJJEO DA CODING] **/

const core = {
    go: function(dest) {
        document.querySelectorAll('.content-section, #editor-container').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        if(dest === 'make') {
            document.getElementById('editor-container').classList.add('active');
            document.getElementById('m-make').classList.add('active');
            if(!engine.workspace) engine.init();
        } else if(dest === 'comm') {
            document.getElementById('sec-comm').classList.add('active');
            document.getElementById('m-comm').classList.add('active');
        } else {
            document.getElementById('sec-main').classList.add('active');
        }
        document.getElementById('mypage-drawer').classList.remove('open');
    },
    toggleMypage: () => document.getElementById('mypage-drawer').classList.toggle('open')
};

const engine = {
    workspace: null, isRunning: false, objects: [],
    init: function() {
        this.define();
        this.workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox'), renderer: 'zelos' });
        obj.add();
        window.addEventListener('resize', () => Blockly.svgResize(this.workspace));
    },
    define: function() {
        // [움직임 블록 엔진 복구]
        Blockly.Blocks['e_start'] = { init: function() { this.appendDummyInput().appendField("🚩 시작했을 때"); this.setNextStatement(true); this.setColour("#33b233"); } };
        Blockly.Blocks['m_x_by'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField("X 좌표를"); this.appendDummyInput().appendField("만큼 바꾸기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); this.setInputsInline(true); } };
        Blockly.Blocks['m_y_by'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField("Y 좌표를"); this.appendDummyInput().appendField("만큼 바꾸기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); this.setInputsInline(true); } };
        Blockly.Blocks['m_x_set'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField("X 좌표를"); this.appendDummyInput().appendField("(으)로 정하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); this.setInputsInline(true); } };
        Blockly.Blocks['m_y_set'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField("Y 좌표를"); this.appendDummyInput().appendField("(으)로 정하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); this.setInputsInline(true); } };
        Blockly.Blocks['m_rotate'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField("방향을"); this.appendDummyInput().appendField("만큼 회전하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); this.setInputsInline(true); } };
        Blockly.Blocks['m_bounce'] = { init: function() { this.appendDummyInput().appendField("화면에 닿으면 튕기기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); } };
        Blockly.Blocks['f_wait'] = { init: function() { this.appendValueInput("S").appendField("기다리기:"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ccb233"); } };
        Blockly.Blocks['f_forever'] = { init: function() { this.appendDummyInput().appendField("계속 반복하기"); this.appendStatementInput("DO"); this.setPreviousStatement(true); this.setColour("#ccb233"); } };
        Blockly.Blocks['l_say'] = { init: function() { this.appendValueInput("T").appendField("말하기:"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#cc33cc"); } };

        const JS = javascript.javascriptGenerator;
        JS.forBlock['e_start'] = () => "";
        JS.forBlock['m_x_by'] = (b, g) => `moveX(${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0});\n`;
        JS.forBlock['m_y_by'] = (b, g) => `moveY(${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0});\n`;
        JS.forBlock['m_x_set'] = (b, g) => `setX(${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0});\n`;
        JS.forBlock['m_y_set'] = (b, g) => `setY(${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0});\n`;
        JS.forBlock['m_rotate'] = (b, g) => `rotate(${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0});\n`;
        JS.forBlock['m_bounce'] = () => `bounce();\n`;
        JS.forBlock['f_wait'] = (b, g) => `await wait(${g.valueToCode(b, 'S', javascript.Order.ATOMIC) || 0});\n`;
        JS.forBlock['f_forever'] = (b, g) => `while(active()){ ${g.statementToCode(b, 'DO')} await wait(0.01); }\n`;
        JS.forBlock['l_say'] = (b, g) => `say(${g.valueToCode(b, 'T', javascript.Order.ATOMIC) || "''"});\n`;
    },
    toggle: function() {
        if(!this.isRunning) {
            this.isRunning = true; document.getElementById('run-btn').innerText = "■ 정지하기";
            const code = javascript.javascriptGenerator.workspaceToCode(this.workspace);
            this.objects.forEach(o => this.run(o, code));
        } else {
            this.isRunning = false; document.getElementById('run-btn').innerText = "▶ 엔진 가동";
            obj.reset();
        }
    },
    run: async function(target, code) {
        const moveX = v => { target.x += v; obj.render(); };
        const moveY = v => { target.y += v; obj.render(); };
        const setX = v => { target.x = v; obj.render(); };
        const setY = v => { target.y = v; obj.render(); };
        const rotate = v => { target.rot += v; obj.render(); };
        const bounce = () => { if(Math.abs(target.x) > 170) target.x = target.x > 0 ? 170 : -170; if(Math.abs(target.y) > 130) target.y = target.y > 0 ? 130 : -130; obj.render(); };
        const say = t => { target.say = t; obj.render(); };
        const wait = s => new Promise(r => setTimeout(r, s * 1000));
        const active = () => this.isRunning;
        const AsyncFn = Object.getPrototypeOf(async function(){}).constructor;
        try { await new AsyncFn('moveX','moveY','setX','setY','rotate','bounce','say','wait','active', code)(moveX,moveY,setX,setY,rotate,bounce,say,wait,active); } catch(e){}
    }
};

const obj = {
    add: function() {
        const id = "o_" + Date.now();
        engine.objects.push({ id, name: "오브젝트 " + (engine.objects.length+1), x: 0, y: 0, rot: 0, say: "" });
        this.update();
    },
    update: () => {
        document.getElementById('obj-list').innerHTML = engine.objects.map(o => `
            <div class="work-card !mb-2 !p-3">
                <div class="w-8 h-8 bg-blue-500 rounded-lg"></div>
                <div class="text-xs font-black">${o.name}</div>
            </div>
        `).join('');
    },
    render: () => {
        document.getElementById('render-layer').innerHTML = engine.objects.map(o => `
            <div style="position:absolute; left:${180+o.x}px; top:${135-o.y}px; transform:translate(-50%,-50%) rotate(${o.rot}deg); transition:0.1s;">
                ${o.say ? `<div class="absolute -top-10 bg-white px-2 py-1 border rounded shadow text-[10px] font-bold whitespace-nowrap">${o.say}</div>` : ''}
                <div class="w-12 h-12 bg-slate-900 rounded-xl border-2 border-white shadow-lg"></div>
            </div>
        `).join('');
    },
    reset: () => { engine.objects.forEach(o => { o.x = 0; o.y = 0; o.rot = 0; o.say = ""; }); obj.render(); }
};

const chat = {
    send: function() {
        const inp = document.getElementById('chat-input');
        if(!inp.value) return;
        const win = document.getElementById('chat-window');
        win.innerHTML += `<div class="msg me"><b>어쩌다코딩:</b> ${inp.value}</div>`;
        inp.value = ""; win.scrollTop = win.scrollHeight;
    }
};

// 엔터 키 채팅 지원
document.getElementById('chat-input')?.addEventListener('keypress', e => { if(e.key === 'Enter') chat.send(); });

obj.render();
</script>
</body>
</html>
