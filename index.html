<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 - 어쩌다코딩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/ko.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
        .entry-blue { background-color: #4f80ff; }
        
        .main-container { display: flex; height: calc(100vh - 50px); }
        .left-area { width: 380px; display: flex; flex-direction: column; background: #fff; border-right: 1px solid #dbe2ef; z-index: 10; }
        .right-area { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; }
        
        #canvasArea { height: 320px; background: #fff; position: relative; border-bottom: 1px solid #dbe2ef; }
        #blocklyDiv { flex: 1; width: 100%; }
        
        /* 쫀득한 UI 탭 */
        .tab-btn { flex: 1; padding: 12px; font-weight: 900; color: #94a3b8; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #4f80ff; border-bottom: 3px solid #4f80ff; background: #f8faff; }

        .obj-item { border: 2px solid #f1f5f9; border-radius: 12px; padding: 10px; margin-bottom: 8px; cursor: pointer; background: white; transition: 0.2s; }
        .obj-item.active { border-color: #4f80ff; background: #f0f4ff; transform: translateX(4px); }
        
        /* 모양 리스트 */
        .costume-card { width: 70px; height: 85px; border: 2px solid #e2e8f0; border-radius: 8px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: white; }
        .costume-card.active { border-color: #4f80ff; background: #f0f4ff; }
        
        .game-obj { position: absolute; transform: translate(-50%, -50%); pointer-events: none; transition: opacity 0.2s; }
        
        /* 로비 중앙 정렬 */
        #workList { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); justify-content: center; }
    </style>
</head>
<body>

<nav id="topNav" class="entry-blue h-[50px] px-6 flex justify-between items-center hidden text-white shadow-md z-50">
    <div class="flex items-center gap-4">
        <div class="font-black italic text-xl tracking-tighter" onclick="showSection('main')">지존짱짱 <span class="font-light text-xs opacity-70">by 어쩌다코딩</span></div>
    </div>
    <div class="flex items-center gap-6 text-sm font-bold">
        <button onclick="showSection('main')">갤러리</button>
        <button onclick="showSection('create')">만들기</button>
        <span id="userNick" class="bg-white text-blue-600 px-4 py-1 rounded-full text-xs font-black shadow-inner"></span>
        <button id="logoutBtn" class="opacity-80 hover:opacity-100">로그아웃</button>
    </div>
</nav>

<div id="authBox" class="min-h-screen flex items-center justify-center bg-slate-100">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-[400px]">
        <h2 class="text-3xl font-black text-center mb-8 text-slate-800">지존짱짱 👋</h2>
        <div id="loginView">
            <input id="loginId" type="text" placeholder="아이디" class="w-full border-2 p-4 rounded-xl mb-3 outline-none focus:border-blue-500 font-bold">
            <input id="loginPw" type="password" placeholder="비밀번호" class="w-full border-2 p-4 rounded-xl mb-6 outline-none focus:border-blue-500 font-bold">
            <button id="doLoginBtn" class="w-full entry-blue text-white py-4 rounded-xl font-black text-lg shadow-lg">로그인</button>
            <button id="goSignupBtn" class="w-full text-slate-400 text-sm font-bold mt-4">회원가입</button>
        </div>
        <div id="signupView" class="hidden">
            <input id="regId" type="text" placeholder="아이디" class="w-full border-2 p-4 rounded-xl mb-3">
            <input id="regNick" type="text" placeholder="닉네임" class="w-full border-2 p-4 rounded-xl mb-3">
            <input id="regPw" type="password" placeholder="비밀번호" class="w-full border-2 p-4 rounded-xl mb-6">
            <button id="doSignupBtn" class="w-full bg-emerald-500 text-white py-4 rounded-xl font-black text-lg">가입 완료</button>
        </div>
    </div>
</div>

<section id="createView" class="hidden main-container">
    <div class="left-area">
        <div id="canvasArea">
            <div id="screen" class="w-full h-full relative bg-white overflow-hidden"></div>
            <div class="absolute bottom-4 w-full px-4 flex gap-2">
                <button onclick="addObj()" class="flex-1 bg-white border-2 border-blue-500 text-blue-500 py-2 rounded-xl font-black text-sm">+ 오브젝트</button>
                <button id="playBtn" onclick="playProject()" class="flex-1 entry-blue text-white py-2 rounded-xl font-black text-sm shadow-md">▶ 시작하기</button>
                <button id="stopBtn" onclick="stopProject()" class="flex-1 bg-rose-500 text-white py-2 rounded-xl font-black text-sm shadow-md hidden">■ 정지하기</button>
            </div>
        </div>
        <div class="flex-grow flex flex-col overflow-hidden">
            <div class="bg-slate-50 px-4 py-2 text-[11px] font-black text-slate-400">오브젝트 목록</div>
            <div id="objList" class="flex-grow overflow-y-auto p-4 space-y-2"></div>
        </div>
    </div>

    <div class="right-area">
        <div class="flex bg-slate-50 border-b">
            <button onclick="switchTab('block')" id="tabBlock" class="tab-btn active">블록 조립소</button>
            <button onclick="switchTab('costume')" id="tabCostume" class="tab-btn">모양 그리기</button>
            <div class="flex items-center px-4 gap-2">
                <input id="workTitle" type="text" placeholder="작품 제목" class="bg-white border rounded-full px-4 py-1 text-xs font-bold outline-none">
                <button id="saveWorkBtn" class="bg-indigo-600 text-white px-4 py-1 rounded-full text-xs font-black">저장</button>
            </div>
        </div>

        <div id="blocklyDiv"></div>

        <div id="costumeDiv" class="hidden flex-grow flex flex-col p-6 bg-slate-50 overflow-hidden">
            <div class="flex gap-3 overflow-x-auto pb-4 mb-4 border-b" id="costumeList"></div>
            <div class="flex-grow flex flex-col items-center justify-center">
                <canvas id="drawCanvas" width="220" height="220" class="bg-white border-4 border-white shadow-xl rounded-xl"></canvas>
                <div class="flex gap-2 mt-6">
                    <button onclick="clearCanvas()" class="bg-slate-300 text-slate-700 px-5 py-2 rounded-lg font-black text-sm">지우기</button>
                    <button onclick="saveCurrentCostume()" class="entry-blue text-white px-8 py-2 rounded-lg font-black shadow-md text-sm">모양 저장</button>
                    <button onclick="addNewCostumeSlot()" class="bg-emerald-500 text-white px-5 py-2 rounded-lg font-black text-sm">+ 새 모양</button>
                </div>
            </div>
        </div>
    </div>
</section>

<main id="mainView" class="hidden p-8 h-screen overflow-y-auto bg-slate-50">
    <h1 class="text-3xl font-black text-center mb-12">지존짱짱 갤러리 🌍</h1>
    <div id="workList" class="grid gap-8 max-w-[1200px] mx-auto justify-items-center"></div>
</main>

<xml id="toolbox" style="display: none">
    <category name="시작" colour="#33b233"><block type="event_whenflagclicked"></block></category>
    <category name="흐름" colour="#ccb233">
        <block type="controls_repeat_ext"><value name="TIMES"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="controls_if"></block> <block type="controls_forever"></block>
    </category>
    <category name="움직임" colour="#33b2cc">
        <block type="move_steps"><value name="STEPS"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="turn_right"><value name="DEGREE"><block type="math_number"><field name="NUM">15</field></block></value></block>
    </category>
    <category name="모양" colour="#ff66cc"> <block type="next_costume"></block>
        <block type="set_size"><value name="SIZE"><block type="math_number"><field name="NUM">100</field></block></value></block>
        <block type="change_size"><value name="SIZE"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="set_opacity"><value name="OPACITY"><block type="math_number"><field name="NUM">50</field></block></value></block>
    </category>
    <category name="판단/계산" colour="#3333cc">
        <block type="logic_compare"></block>
        <block type="logic_boolean"></block>
        <block type="math_arithmetic"></block>
    </category>
    <category name="자료" colour="#cc3333" custom="VARIABLE"></category>
</xml>

<script>
const firebaseConfig = { apiKey: "AIzaSyDdFsRGy_2mZowYinOf9LeQhot08xyaqc4", authDomain: "zizon-coding.firebaseapp.com", projectId: "zizon-coding", databaseURL: "https://zizon-coding-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database(), auth = firebase.auth();

// 블록 한글 텍스트 정의
Blockly.Msg["EVENT_WHENFLAGCLICKED"] = "▶ 시작하기를 클릭했을 때";
Blockly.Msg["CONTROLS_REPEAT_TITLE"] = "%1번 반복하기";
Blockly.Msg["CONTROLS_FOREVER_TITLE"] = "계속 반복하기";
Blockly.Msg["CONTROLS_IF_MSG_IF"] = "만일";
Blockly.Msg["CONTROLS_IF_MSG_THEN"] = "이라면";
Blockly.Msg["NEXT_COSTUME_TITLE"] = "다음 모양으로 바꾸기";
Blockly.Msg["SET_SIZE_TITLE"] = "크기를 %1 (으)로 정하기";
Blockly.Msg["CHANGE_SIZE_TITLE"] = "크기를 %1 만큼 바꾸기";
Blockly.Msg["SET_OPACITY_TITLE"] = "투명도 효과를 %1 만큼 주기";

// 커스텀 블록 구현
Blockly.Blocks['event_whenflagclicked'] = { init: function() { this.appendDummyInput().appendField(Blockly.Msg["EVENT_WHENFLAGCLICKED"]); this.setNextStatement(true); this.setColour("#33b233"); }};
Blockly.Blocks['controls_forever'] = { init: function() { this.appendDummyInput().appendField(Blockly.Msg["CONTROLS_FOREVER_TITLE"]); this.appendStatementInput("DO"); this.setPreviousStatement(true); this.setColour("#ccb233"); }};
Blockly.Blocks['next_costume'] = { init: function() { this.appendDummyInput().appendField(Blockly.Msg["NEXT_COSTUME_TITLE"]); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ff66cc"); }};
Blockly.Blocks['set_size'] = { init: function() { this.appendValueInput("SIZE").setCheck("Number").appendField("크기를"); this.appendDummyInput().appendField("(으)로 정하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ff66cc"); }};
Blockly.Blocks['change_size'] = { init: function() { this.appendValueInput("SIZE").setCheck("Number").appendField("크기를"); this.appendDummyInput().appendField("만큼 바꾸기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ff66cc"); }};
Blockly.Blocks['set_opacity'] = { init: function() { this.appendValueInput("OPACITY").setCheck("Number").appendField("투명도 효과를"); this.appendDummyInput().appendField("만큼 주기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ff66cc"); }};

// 움직임 기초
Blockly.Blocks['move_steps'] = { init: function() { this.appendValueInput("STEPS").setCheck("Number").appendField("앞으로"); this.appendDummyInput().appendField("만큼 움직이기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['turn_right'] = { init: function() { this.appendValueInput("DEGREE").setCheck("Number").appendField("방향을"); this.appendDummyInput().appendField("도 회전하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};

let workspace, objects = [], selectedId = null, currentCostumeIdx = 0;

function showSection(name) {
    ['mainView', 'createView'].forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById(name + 'View').classList.remove('hidden');
    if(name === 'create' && !workspace) {
        workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox') });
        addObj();
    }
}

function switchTab(tab) {
    document.getElementById('blocklyDiv').classList.toggle('hidden', tab !== 'block');
    document.getElementById('costumeDiv').classList.toggle('hidden', tab !== 'costume');
    document.getElementById('tabBlock').classList.toggle('active', tab === 'block');
    document.getElementById('tabCostume').classList.toggle('active', tab === 'costume');
    if(tab === 'block') Blockly.svgResize(workspace);
    else renderCostumeTabs();
}

function addObj() {
    const id = Date.now();
    objects.push({ 
        id, name: "오브젝트 "+(objects.length+1), x: 190, y: 160, size: 80, dir: 90, opacity: 100,
        costumes: [null], currentIdx: 0, xml: "" 
    });
    selectObj(id);
}

function selectObj(id) {
    if(selectedId && workspace) {
        const prev = objects.find(o => o.id === selectedId);
        if(prev) prev.xml = Blockly.Xml.domToText(Blockly.Xml.workspaceToDom(workspace));
    }
    selectedId = id;
    const o = objects.find(o => o.id === id);
    workspace.clear();
    if(o.xml) Blockly.Xml.domToWorkspace(Blockly.Xml.textToDom(o.xml), workspace);
    currentCostumeIdx = o.currentIdx;
    render();
}

function renderCostumeTabs() {
    const o = objects.find(o => o.id === selectedId);
    const list = document.getElementById('costumeList');
    list.innerHTML = '';
    o.costumes.forEach((c, i) => {
        const div = document.createElement('div');
        div.className = `costume-card ${i === currentCostumeIdx ? 'active' : ''}`;
        div.onclick = () => { currentCostumeIdx = i; o.currentIdx = i; renderCostumeTabs(); loadCostumeToCanvas(); };
        div.innerHTML = c ? `<img src="${c}" class="w-full h-full object-contain p-1">` : `<div class="text-slate-300 text-[10px]">비었음</div>`;
        div.innerHTML += `<div class="text-[8px] font-bold mt-1">${i+1}번</div>`;
        list.appendChild(div);
    });
}

function addNewCostumeSlot() {
    const o = objects.find(o => o.id === selectedId);
    o.costumes.push(null);
    currentCostumeIdx = o.costumes.length - 1;
    o.currentIdx = currentCostumeIdx;
    clearCanvas();
    renderCostumeTabs();
}

const canvas = document.getElementById('drawCanvas'), ctx = canvas.getContext('2d');
let drawing = false;
canvas.onmousedown = () => drawing = true;
canvas.onmouseup = () => { drawing = false; ctx.beginPath(); };
canvas.onmousemove = (e) => {
    if(!drawing) return;
    ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.strokeStyle = '#333';
    ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY);
};

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
function saveCurrentCostume() {
    const o = objects.find(o => o.id === selectedId);
    o.costumes[currentCostumeIdx] = canvas.toDataURL();
    renderCostumeTabs();
    render();
}
function loadCostumeToCanvas() {
    clearCanvas();
    const o = objects.find(o => o.id === selectedId);
    if(o.costumes[currentCostumeIdx]) {
        const img = new Image(); img.src = o.costumes[currentCostumeIdx];
        img.onload = () => ctx.drawImage(img, 0, 0);
    }
}

function render() {
    const screen = document.getElementById('screen'), list = document.getElementById('objList');
    screen.innerHTML = ''; list.innerHTML = '';
    objects.forEach(o => {
        const div = document.createElement('div');
        div.className = 'game-obj';
        div.style.cssText = `left:${o.x}px; top:${o.y}px; width:${o.size}px; height:${o.size}px; opacity:${o.opacity/100}; transform:translate(-50%,-50%) rotate(${o.dir-90}deg);`;
        const img = o.costumes[o.currentIdx];
        div.innerHTML = img ? `<img src="${img}" class="w-full h-full">` : `<div class="w-full h-full bg-blue-500 rounded-2xl border-4 border-white shadow-lg"></div>`;
        screen.appendChild(div);

        const card = document.createElement('div');
        card.className = `obj-item flex justify-between items-center ${o.id === selectedId ? 'active' : ''}`;
        card.onclick = () => selectObj(o.id);
        card.innerHTML = `<span class="font-black text-xs text-slate-700">${o.name}</span><button onclick="deleteObj(${o.id})" class="text-slate-300">×</button>`;
        list.appendChild(card);
    });
}

function playProject() {
    document.getElementById('playBtn').classList.add('hidden');
    document.getElementById('stopBtn').classList.remove('hidden');
}
function stopProject() {
    document.getElementById('stopBtn').classList.add('hidden');
    document.getElementById('playBtn').classList.remove('hidden');
}

// 인증 시스템 유지
document.getElementById("doLoginBtn").onclick = () => auth.signInWithEmailAndPassword(document.getElementById('loginId').value.trim() + "@zizon.com", document.getElementById('loginPw').value.trim());
document.getElementById("doSignupBtn").onclick = async () => {
    const res = await auth.createUserWithEmailAndPassword(document.getElementById('regId').value.trim() + "@zizon.com", document.getElementById('regPw').value.trim());
    await db.ref('users/'+res.user.uid).set({ nickname: document.getElementById('regNick').value }); location.reload();
};
auth.onAuthStateChanged(async user => {
    if(user) {
        const snap = await db.ref('users/'+user.uid).once('value');
        if(snap.val()) {
            document.getElementById('userNick').innerText = snap.val().nickname;
            document.getElementById('authBox').classList.add('hidden');
            document.getElementById('topNav').classList.remove('hidden');
            showSection('main');
        }
    }
});
</script>
</body>
</html>
