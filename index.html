<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 코딩사이트 - 공식 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root { --entry-blue: #4f80ff; --zizon-purple: #8b5cf6; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; margin: 0; overflow: hidden; }
        
        /* 스크롤바 디자인 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .hidden { display: none !important; }
        .zizon-gradient { background: linear-gradient(135deg, #4f80ff 0%, #8b5cf6 100%); }
        
        /* 레이아웃 구성 */
        .main-container { display: flex; flex-direction: column; height: 100vh; }
        .content-area { display: flex; flex: 1; overflow: hidden; }

        /* 에디터 사이드바 */
        .editor-sidebar { width: 360px; display: flex; flex-direction: column; background: white; border-right: 1px solid #e2e8f0; }
        #stage { height: 260px; background: white; border-bottom: 1px solid #e2e8f0; position: relative; }
        #screen { width: 100%; height: 100%; position: relative; background: #fff; overflow: hidden; }
        
        /* 블록 조립소 */
        .workspace-area { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; }
        #blocklyDiv { width: 100%; height: 100%; position: absolute; }

        /* 채팅창 UI */
        .chat-section { width: 380px; background: white; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .chat-msg-bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; margin-bottom: 4px; position: relative; }
        .msg-other { background: #f1f5f9; color: #334155; border-top-left-radius: 2px; }
        .msg-me { background: #4f80ff; color: white; border-top-right-radius: 2px; align-self: flex-end; }
        .msg-admin { background: #1e293b; color: #fbbf24; border: 2px solid #fbbf24; }

        /* 버튼 및 뱃지 */
        .zizon-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .zizon-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(79, 128, 255, 0.3); }
        .edition-badge { background: linear-gradient(45deg, #f472b6, #6366f1); color: white; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="main-container">
    <header id="topBar" class="zizon-gradient h-[60px] px-6 flex justify-between items-center text-white z-50 shadow-lg hidden">
        <div class="flex items-center gap-10">
            <h1 class="text-2xl font-black italic tracking-tighter cursor-pointer" onclick="location.reload()">지존짱짱 CODES</h1>
            <nav class="flex gap-6 font-bold text-sm">
                <button onclick="changeView('gallery')" class="hover:text-blue-200 transition">지존 갤러리</button>
                <button onclick="changeView('editor')" class="hover:text-blue-200 transition">작품 만들기</button>
                <button onclick="changeView('mypage')" class="text-yellow-300 hover:text-white transition">마이페이지</button>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <div id="userDisplay" class="bg-black/20 px-4 py-1.5 rounded-full text-xs font-black border border-white/10"></div>
            <button onclick="logout()" class="text-xs font-bold opacity-70 hover:opacity-100 underline">로그아웃</button>
        </div>
    </header>

    <main class="content-area">
        
        <section id="authView" class="w-full flex items-center justify-center bg-slate-50">
            <div class="bg-white p-12 rounded-[50px] shadow-2xl w-full max-w-[420px] border-b-[12px] border-blue-600">
                <div class="text-center mb-10">
                    <h2 class="text-5xl font-black text-slate-800 italic tracking-tighter mb-2">지존짱짱</h2>
                    <p class="text-blue-500 font-black text-xs tracking-widest uppercase">The Ultimate Platform by 어쩌다코딩</p>
                </div>
                <div class="space-y-4">
                    <input id="authId" type="text" placeholder="아이디를 입력하세요" class="w-full bg-slate-50 p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-400 font-bold transition-all">
                    <input id="authPw" type="password" placeholder="비밀번호" class="w-full bg-slate-50 p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-400 font-bold transition-all">
                    <button onclick="login()" class="w-full zizon-gradient text-white py-5 rounded-2xl font-black text-xl zizon-btn shadow-xl mt-4">코딩 세계 입장</button>
                    <div class="flex justify-center gap-4 mt-6">
                        <button onclick="signup()" class="text-slate-400 text-sm font-bold hover:text-blue-500 transition">처음이신가요? 회원가입</button>
                    </div>
                </div>
                <div class="mt-10 p-4 bg-red-50 rounded-2xl border border-red-100">
                    <p class="text-[11px] text-red-500 font-bold leading-relaxed text-center">
                        ⚠️ 경고: 게스트는 작품 제작 권한이 없습니다.<br>모든 창작물은 계정에 안전하게 저장됩니다.
                    </p>
                </div>
            </div>
        </section>

        <section id="galleryView" class="hidden flex-grow p-10 overflow-y-auto bg-slate-50">
            <div class="max-w-[1000px] mx-auto">
                <div class="flex justify-between items-end mb-12">
                    <div>
                        <h2 class="text-4xl font-black text-slate-900 mb-2 italic">지존 갤러리</h2>
                        <p class="text-slate-500 font-bold text-sm">지존 유저들이 창조한 놀라운 작품들을 만나보세요.</p>
                    </div>
                    <div id="adminControls" class="hidden bg-blue-600 px-5 py-3 rounded-2xl text-white shadow-lg">
                        <p class="text-[10px] font-black opacity-70 mb-1">👑 대표 전용 컨트롤러</p>
                        <button onclick="awardEdition()" class="bg-white text-blue-600 px-4 py-1.5 rounded-xl text-xs font-black hover:bg-blue-50 transition">에디션 하사</button>
                    </div>
                </div>
                <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-8">
                    </div>
            </div>
        </section>

        <section id="editorView" class="hidden flex-grow flex overflow-hidden">
            <aside class="editor-sidebar">
                <div id="stage">
                    <div id="screen"></div>
                    <div class="absolute bottom-4 w-full px-4 flex gap-2">
                        <button onclick="addObj()" class="flex-1 bg-white border-2 border-blue-500 text-blue-500 py-2.5 rounded-xl font-black text-xs hover:bg-blue-50 transition">+ 오브젝트</button>
                        <button onclick="playEngine()" class="flex-1 entry-blue text-white py-2.5 rounded-xl font-black text-xs shadow-md zizon-btn">▶ 실행하기</button>
                    </div>
                </div>
                <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                    <span class="text-xs font-black text-slate-400 uppercase tracking-widest">오브젝트 레이어</span>
                    <span id="objCount" class="text-[10px] bg-slate-200 px-2 py-0.5 rounded text-slate-500 font-bold">0</span>
                </div>
                <div id="objContainer" class="flex-grow overflow-y-auto p-2 space-y-2">
                    </div>
            </aside>
            <div class="workspace-area">
                <div class="flex h-[50px] bg-white border-b shadow-sm">
                    <button id="tab-block" onclick="toggleEditorTab('block')" class="flex-1 font-black text-sm border-b-4 border-blue-500 text-blue-600 bg-blue-50/30">블록 코딩</button>
                    <button id="tab-costume" onclick="toggleEditorTab('costume')" class="flex-1 font-black text-sm text-slate-400 border-b-4 border-transparent hover:bg-slate-50">지존 모양새</button>
                </div>
                <div id="blocklyArea" class="flex-grow relative">
                    <div id="blocklyDiv"></div>
                </div>
                <div id="costumeArea" class="hidden flex-grow bg-slate-100 p-8 flex flex-col items-center justify-center">
                    <div class="bg-white p-8 rounded-[40px] shadow-xl border-4 border-white">
                        <canvas id="paintCanvas" width="320" height="320" class="bg-slate-50 rounded-[30px] border-2 border-slate-100 cursor-crosshair"></canvas>
                        <div class="flex gap-3 mt-8 justify-center">
                            <input type="color" id="paintColor" value="#4f80ff" class="w-12 h-12 rounded-xl cursor-pointer">
                            <button onclick="resetCanvas()" class="px-6 py-3 bg-slate-100 rounded-2xl font-black text-sm">지우기</button>
                            <button onclick="applyCostume()" class="px-10 py-3 entry-blue text-white rounded-2xl font-black text-sm shadow-lg">모양 적용</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <aside id="chatSection" class="chat-section hidden">
            <div class="p-5 border-b flex justify-between items-center bg-white shadow-sm relative z-10">
                <div>
                    <h3 class="font-black text-slate-800 italic">지존짱짱 이야기</h3>
                    <p class="text-[10px] font-bold text-green-500 flex items-center gap-1">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-ping"></span> 실시간 연결됨
                    </p>
                </div>
                <button onclick="clearChat()" class="text-[10px] font-bold text-slate-300 hover:text-red-400">내역 삭제</button>
            </div>
            <div id="msgContainer" class="flex-grow overflow-y-auto p-5 flex flex-col gap-4">
                </div>
            <div class="p-5 border-t bg-slate-50/50">
                <div class="relative">
                    <input id="msgInput" type="text" placeholder="지존들과 대화하기..." class="w-full bg-white p-4 pr-16 rounded-2xl border-2 border-slate-200 outline-none focus:border-blue-400 font-bold text-sm shadow-inner transition-all">
                    <button onclick="sendMsg()" class="absolute right-2 top-2 bottom-2 bg-blue-500 text-white px-4 rounded-xl font-black text-xs hover:bg-blue-600 transition-colors">전송</button>
                </div>
            </div>
        </aside>

        <section id="mypageView" class="hidden flex-grow p-12 bg-slate-50">
            <div class="max-w-[500px] mx-auto bg-white p-12 rounded-[60px] shadow-2xl border-t-[15px] border-yellow-400 text-center">
                <div class="w-32 h-32 bg-gradient-to-br from-yellow-300 to-orange-400 rounded-full mx-auto mb-6 flex items-center justify-center text-5xl shadow-inner border-8 border-white">👑</div>
                <h2 id="myNick" class="text-4xl font-black text-slate-800 mb-2">지존 크리에이터</h2>
                <p id="myId" class="text-slate-400 font-bold text-sm mb-8 tracking-widest"></p>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-50 p-6 rounded-3xl">
                        <p class="text-[10px] font-black text-slate-400 mb-1 uppercase">작품 수</p>
                        <p class="text-2xl font-black text-blue-600">0</p>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-3xl">
                        <p class="text-[10px] font-black text-slate-400 mb-1 uppercase">획득 뱃지</p>
                        <p class="text-2xl font-black text-purple-600">지존</p>
                    </div>
                </div>
                <button onclick="logout()" class="mt-10 w-full py-4 bg-slate-100 text-slate-500 rounded-2xl font-black hover:bg-red-50 hover:text-red-500 transition">계정 로그아웃</button>
            </div>
        </section>

    </main>
</div>

<xml id="zizonToolbox" style="display: none">
    <category name="시작" colour="#33b233">
        <block type="event_whenflagclicked"></block>
    </category>
    <category name="흐름" colour="#ccb233">
        <block type="controls_repeat_ext"><value name="TIMES"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="controls_forever"></block>
        <block type="wait_seconds"><value name="SEC"><block type="math_number"><field name="NUM">1</field></block></value></block>
    </category>
    <category name="움직임" colour="#33b2cc">
        <block type="move_steps"><value name="STEPS"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="turn_right"><value name="DEGREE"><block type="math_number"><field name="NUM">15</field></block></value></block>
        <block type="change_x"><value name="VAL"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="change_y"><value name="VAL"><block type="math_number"><field name="NUM">10</field></block></value></block>
    </category>
    <category name="계산" colour="#3366cc">
        <block type="math_arithmetic"></block>
        <block type="math_random_int"><value name="FROM"><block type="math_number"><field name="NUM">1</field></block></value><value name="TO"><block type="math_number"><field name="NUM">10</field></block></value></block>
    </category>
    <category name="자료" colour="#cc3333" custom="VARIABLE"></category>
</xml>

<script>
/**
 * -------------------------------------------------------------------
 * 1. 초기화 및 환경 설정
 * -------------------------------------------------------------------
 */
const firebaseConfig = { 
    apiKey: "AIzaSyDdFsRGy_2mZowYinOf9LeQhot08xyaqc4", 
    authDomain: "zizon-coding.firebaseapp.com", 
    projectId: "zizon-coding", 
    databaseURL: "https://zizon-coding-default-rtdb.firebaseio.com" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// 글로벌 상태 변수
let currentWorkspace = null;
let currentObjects = [];
let activeObjId = null;
let myNickname = "";
let isRepresentative = false; // 대표님 여부

// Blockly 메시지 한글화 (변수 오류 해결을 위한 순정 정의)
Blockly.Msg["EVENT_WHENFLAGCLICKED"] = "▶ 시작하기를 클릭했을 때";
Blockly.Msg["NEW_VARIABLE"] = "변수 만들기...";
Blockly.Msg["NEW_VARIABLE_TITLE"] = "새 변수 이름:";
Blockly.Msg["VARIABLE_ALREADY_EXISTS"] = "'%1' 변수는 이미 존재합니다.";

Blockly.Blocks['event_whenflagclicked'] = { init: function() { this.appendDummyInput().appendField(Blockly.Msg["EVENT_WHENFLAGCLICKED"]); this.setNextStatement(true); this.setColour("#33b233"); }};
Blockly.Blocks['controls_forever'] = { init: function() { this.appendDummyInput().appendField("계속 반복하기"); this.appendStatementInput("DO").appendField("실행"); this.setPreviousStatement(true); this.setColour("#ccb233"); }};
Blockly.Blocks['move_steps'] = { init: function() { this.appendValueInput("STEPS").setCheck("Number").appendField("앞으로"); this.appendDummyInput().appendField("만큼 이동"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['turn_right'] = { init: function() { this.appendValueInput("DEGREE").setCheck("Number").appendField("오른쪽으로"); this.appendDummyInput().appendField("도 회전"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['change_x'] = { init: function() { this.appendValueInput("VAL").setCheck("Number").appendField("x 좌표를"); this.appendDummyInput().appendField("만큼 바꾸기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['change_y'] = { init: function() { this.appendValueInput("VAL").setCheck("Number").appendField("y 좌표를"); this.appendDummyInput().appendField("만큼 바꾸기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['wait_seconds'] = { init: function() { this.appendValueInput("SEC").setCheck("Number").appendField(""); this.appendDummyInput().appendField("초 기다리기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ccb233"); }};

/**
 * -------------------------------------------------------------------
 * 2. 실시간 대화방 (지존짱짱 이야기) 로직
 * -------------------------------------------------------------------
 */
function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if(!text) return;

    db.ref('zizon_talk').push({
        sender: myNickname,
        message: text,
        timestamp: Date.now(),
        isAdmin: isRepresentative
    });
    input.value = '';
}

db.ref('zizon_talk').limitToLast(100).on('child_added', (snap) => {
    const data = snap.val();
    const container = document.getElementById('msgContainer');
    const div = document.createElement('div');
    
    const isMe = data.sender === myNickname;
    const typeClass = isMe ? 'msg-me' : (data.isAdmin ? 'msg-admin' : 'msg-other');
    const adminTag = data.isAdmin ? '<span class="text-[9px] bg-yellow-400 text-black px-1.5 rounded-md font-black mr-1">👑대표</span>' : '';

    div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
    div.innerHTML = `
        <div class="flex items-center mb-1">
            ${isMe ? '' : adminTag}<span class="text-[11px] font-black text-slate-400">${data.sender}</span>
        </div>
        <div class="chat-msg-bubble ${typeClass} shadow-sm font-bold">
            ${data.message}
        </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
});

document.getElementById('msgInput')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });

/**
 * -------------------------------------------------------------------
 * 3. 에디터 및 오브젝트 관리
 * -------------------------------------------------------------------
 */
function initEditor() {
    if (currentWorkspace) return;
    currentWorkspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('zizonToolbox'),
        zoom: { controls: true, wheel: true },
        trashcan: true
    });
    addObj();
}

function addObj() {
    const id = "zizon_" + Date.now();
    const newObj = {
        id: id,
        name: "오브젝트 " + (currentObjects.length + 1),
        x: 180,
        y: 130,
        xml: "",
        costume: null
    };
    currentObjects.push(newObj);
    updateObjList();
    focusObj(id);
}

function focusObj(id) {
    if(activeObjId && currentWorkspace) {
        const current = currentObjects.find(o => o.id === activeObjId);
        if(current) current.xml = Blockly.Xml.domToText(Blockly.Xml.workspaceToDom(currentWorkspace));
    }
    activeObjId = id;
    const target = currentObjects.find(o => o.id === id);
    currentWorkspace.clear();
    if(target.xml) {
        try { Blockly.Xml.domToWorkspace(Blockly.Xml.textToDom(target.xml), currentWorkspace); } catch(e) { console.warn("XML 복구 실패", e); }
    }
    updateObjList();
    renderStage();
    setTimeout(() => Blockly.svgResize(currentWorkspace), 100);
}

function updateObjList() {
    const container = document.getElementById('objContainer');
    document.getElementById('objCount').innerText = currentObjects.length;
    container.innerHTML = '';
    currentObjects.forEach(o => {
        const div = document.createElement('div');
        div.className = `p-4 rounded-2xl border-2 cursor-pointer flex justify-between items-center transition-all ${o.id === activeObjId ? 'border-blue-500 bg-blue-50' : 'border-slate-100 bg-white hover:border-slate-200'}`;
        div.onclick = () => focusObj(o.id);
        div.innerHTML = `
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-slate-200 rounded-lg overflow-hidden">
                    ${o.costume ? `<img src="${o.costume}" class="w-full h-full">` : ''}
                </div>
                <span class="text-sm font-black text-slate-700">${o.name}</span>
            </div>
            <button onclick="event.stopPropagation(); removeObj('${o.id}')" class="text-slate-300 hover:text-red-500">×</button>
        `;
        container.appendChild(div);
    });
}

function removeObj(id) {
    if(currentObjects.length <= 1) return alert("최소 한 개의 오브젝트는 필요합니다.");
    currentObjects = currentObjects.filter(o => o.id !== id);
    focusObj(currentObjects[0].id);
}

function renderStage() {
    const screen = document.getElementById('screen');
    screen.innerHTML = '';
    currentObjects.forEach(o => {
        const el = document.createElement('div');
        el.style.cssText = `position:absolute; left:${o.x}px; top:${o.y}px; transform:translate(-50%,-50%);`;
        if(o.costume) {
            el.innerHTML = `<img src="${o.costume}" style="width:80px; height:80px; object-contain;">`;
        } else {
            el.innerHTML = `<div class="w-20 h-20 bg-blue-100 border-4 border-blue-400 rounded-2xl shadow-sm"></div>`;
        }
        screen.appendChild(el);
    });
}

/**
 * -------------------------------------------------------------------
 * 4. UI 뷰 전환 및 기능
 * -------------------------------------------------------------------
 */
function changeView(name) {
    ['authView', 'galleryView', 'editorView', 'mypageView'].forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById(name + 'View').classList.remove('hidden');
    
    // 채팅창은 에디터와 갤러리에서만 보이게 설정
    const chat = document.getElementById('chatSection');
    if(name === 'gallery' || name === 'editor') chat.classList.remove('hidden');
    else chat.classList.add('hidden');

    if(name === 'editor') initEditor();
    if(name === 'gallery') renderGallery();
}

function toggleEditorTab(tab) {
    const bArea = document.getElementById('blocklyArea');
    const cArea = document.getElementById('costumeArea');
    const bTab = document.getElementById('tab-block');
    const cTab = document.getElementById('tab-costume');

    if(tab === 'block') {
        bArea.classList.remove('hidden'); cArea.classList.add('hidden');
        bTab.className = "flex-1 font-black text-sm border-b-4 border-blue-500 text-blue-600 bg-blue-50/30";
        cTab.className = "flex-1 font-black text-sm text-slate-400 border-b-4 border-transparent hover:bg-slate-50";
        setTimeout(() => Blockly.svgResize(currentWorkspace), 50);
    } else {
        bArea.classList.add('hidden'); cArea.classList.remove('hidden');
        cTab.className = "flex-1 font-black text-sm border-b-4 border-blue-500 text-blue-600 bg-blue-50/30";
        bTab.className = "flex-1 font-black text-sm text-slate-400 border-b-4 border-transparent hover:bg-slate-50";
    }
}

/**
 * -------------------------------------------------------------------
 * 6. 인증 (Firebase Auth)
 * -------------------------------------------------------------------
 */
function login() {
    const id = document.getElementById('authId').value.trim();
    const pw = document.getElementById('authPw').value.trim();
    if(!id || !pw) return alert("모든 정보를 입력하세요.");
    auth.signInWithEmailAndPassword(id + "@zizon.com", pw).catch(e => alert("로그인 실패: 아이디나 비밀번호를 확인하세요."));
}

function signup() {
    const id = prompt("아이디 (영어/숫자):");
    const pw = prompt("비밀번호 (6자 이상):");
    const nick = prompt("사용할 닉네임:");
    if(id && pw && nick) {
        auth.createUserWithEmailAndPassword(id+"@zizon.com", pw)
            .then(res => db.ref('users/'+res.user.uid).set({ nickname: nick }))
            .catch(e => alert(e.message));
    }
}

function logout() { auth.signOut().then(() => location.reload()); }

auth.onAuthStateChanged(async user => {
    if(user) {
        const snap = await db.ref('users/'+user.uid).once('value');
        myNickname = snap.val().nickname;
        isRepresentative = (myNickname === "어쩌다코딩");
        
        document.getElementById('userDisplay').innerText = myNickname + " (지존)";
        document.getElementById('myNick').innerText = myNickname;
        document.getElementById('myId').innerText = "@" + user.email.split("@")[0];
        document.getElementById('topBar').classList.remove('hidden');
        
        if(isRepresentative) document.getElementById('adminControls').classList.remove('hidden');
        
        changeView('gallery');
    } else {
        document.getElementById('topBar').classList.add('hidden');
        ['galleryView', 'editorView', 'mypageView', 'chatSection'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById('authView').classList.remove('hidden');
    }
});

// 그림판 로직 (Paint)
const canvas = document.getElementById('paintCanvas'), ctx = canvas.getContext('2d');
let drawing = false;
canvas.onmousedown = (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); };
canvas.onmousemove = (e) => { if(drawing) { ctx.lineWidth = 10; ctx.lineCap='round'; ctx.strokeStyle=document.getElementById('paintColor').value; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } };
canvas.onmouseup = () => drawing = false;
function resetCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); }
function applyCostume() {
    const target = currentObjects.find(o => o.id === activeObjId);
    target.costume = canvas.toDataURL();
    renderStage(); updateObjList();
    alert("오브젝트 모양이 업데이트되었습니다.");
}
function playEngine() { alert("지존짱짱 엔진 1.0 가동 중..."); }
