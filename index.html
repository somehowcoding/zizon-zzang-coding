<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 - Made by 어쩌다코딩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
        .entry-blue { background-color: #4f80ff; }
        .main-container { display: flex; height: calc(100vh - 50px); }
        .left-area { width: 380px; display: flex; flex-direction: column; background: #fff; border-right: 1px solid #dbe2ef; }
        .right-area { flex: 1; background: #fff; position: relative; }
        #canvasArea { height: 320px; background: #fff; position: relative; border-bottom: 1px solid #dbe2ef; }
        #blocklyDiv { height: 100%; width: 100%; }
        .obj-item { border: 1px solid #dbe2ef; border-radius: 4px; padding: 8px; margin-bottom: 5px; cursor: pointer; transition: 0.2s; }
        .obj-item.active { border: 2px solid #4f80ff; background: #f0f4ff; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .game-obj { position: absolute; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; background: #4f80ff; color: white; border-radius: 10px; font-weight: 900; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); pointer-events: none; }
    </style>
</head>
<body>

<nav id="topNav" class="entry-blue h-[50px] px-4 flex justify-between items-center hidden text-white">
    <div class="flex items-center gap-4">
        <div class="font-black italic text-lg tracking-tighter cursor-pointer" onclick="showSection('main')">Entry <span class="font-light text-sm opacity-80">by 어쩌다코딩</span></div>
        <input id="workTitle" type="text" class="bg-[#3d6ce5] text-white px-3 py-1 rounded text-sm outline-none border-none w-64" placeholder="작품 제목">
    </div>
    <div class="flex items-center gap-4 text-sm font-bold">
        <button onclick="showSection('main')">갤러리</button>
        <button onclick="showSection('create')">만들기</button>
        <button onclick="showSection('story')">이야기</button>
        <span id="userNick" class="bg-[#3d6ce5] px-3 py-1 rounded-full text-xs"></span>
        <button id="logoutBtn" class="opacity-70 hover:opacity-100">로그아웃</button>
    </div>
</nav>

<div id="authBox" class="min-h-screen flex items-center justify-center bg-slate-50">
    <div class="auth-card">
        <div class="mb-8">
            <h2 class="text-2xl font-black text-slate-800">지존짱짱 👋</h2>
            <p class="text-sm text-slate-500 font-medium">Made by 어쩌다코딩</p>
        </div>
        <div id="loginView">
            <input id="loginId" type="text" placeholder="아이디" class="w-full border p-3 rounded-lg mb-3 outline-none">
            <input id="loginPw" type="password" placeholder="비밀번호" class="w-full border p-3 rounded-lg mb-4 outline-none">
            <button id="doLoginBtn" class="w-full entry-blue text-white py-3 rounded-lg font-bold mb-4">로그인</button>
            <button id="goSignupBtn" class="w-full text-slate-400 text-xs font-bold hover:underline">회원가입 하기</button>
        </div>
        <div id="signupView" class="hidden">
            <input id="regId" type="text" placeholder="아이디" class="w-full border p-3 rounded-lg mb-3 outline-none">
            <input id="regNick" type="text" placeholder="닉네임" class="w-full border p-3 rounded-lg mb-3 outline-none">
            <input id="regPw" type="password" placeholder="비밀번호 (6자 이상)" class="w-full border p-3 rounded-lg mb-4 outline-none">
            <button id="doSignupBtn" class="w-full bg-emerald-500 text-white py-3 rounded-lg font-bold mb-4">가입 완료</button>
            <button id="goLoginBtn" class="w-full text-slate-400 text-xs font-bold hover:underline">이미 계정이 있어요</button>
        </div>
    </div>
</div>

<section id="createView" class="hidden main-container">
    <div class="left-area">
        <div id="canvasArea">
            <div id="screen" class="w-full h-full relative bg-white overflow-hidden"></div>
            <div class="absolute bottom-4 left-0 w-full px-4 flex gap-2">
                <button onclick="addObj()" class="flex-1 bg-white border border-[#4f80ff] text-[#4f80ff] py-2 rounded font-bold text-sm shadow-sm hover:bg-blue-50">+ 오브젝트 추가</button>
                <div id="playStopContainer" class="flex-1 flex">
                    <button id="playBtn" onclick="playProject()" class="w-full entry-blue text-white py-2 rounded font-bold text-sm shadow-sm hover:bg-blue-600">▶ 시작하기</button>
                    <button id="stopBtn" onclick="stopProject()" class="w-full bg-rose-500 text-white py-2 rounded font-bold text-sm shadow-sm hover:bg-rose-600 hidden">■ 정지하기</button>
                </div>
            </div>
        </div>
        <div class="p-3 bg-[#f4f7f9] border-bottom text-[11px] font-black text-slate-500">오브젝트 목록</div>
        <div id="objList" class="flex-grow p-4 overflow-y-auto bg-[#f4f7f9]"></div>
        <div id="statusPanel" class="p-4 border-t bg-white hidden">
            <div class="grid grid-cols-2 gap-2 text-[11px] font-bold text-slate-500">
                <div class="flex items-center gap-1">X <input type="number" id="stX" class="w-full bg-slate-100 p-1 rounded" onchange="updateObjStatus()"></div>
                <div class="flex items-center gap-1">Y <input type="number" id="stY" class="w-full bg-slate-100 p-1 rounded" onchange="updateObjStatus()"></div>
                <div class="flex items-center gap-1">크기 <input type="number" id="stSize" class="w-full bg-slate-100 p-1 rounded" onchange="updateObjStatus()"></div>
                <div class="flex items-center gap-1">방향 <input type="number" id="stDir" class="w-full bg-slate-100 p-1 rounded" onchange="updateObjStatus()"></div>
            </div>
        </div>
    </div>
    <div class="right-area">
        <div id="blocklyDiv"></div>
        <button id="saveWorkBtn" class="absolute bottom-6 right-6 entry-blue text-white px-8 py-3 rounded-full font-black shadow-xl z-50">작품 저장</button>
    </div>
</section>

<main id="mainView" class="hidden p-8 overflow-y-auto h-screen bg-slate-50">
    <h1 class="text-2xl font-black mb-8">모두의 작품 🌍</h1>
    <div id="workList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 pb-20"></div>
</main>

<xml id="toolbox" style="display: none">
    <category name="시작" colour="#33b233"><block type="when_run"></block></category>
    <category name="흐름" colour="#ccb233"><block type="controls_repeat_ext"></block></category>
    <category name="움직임" colour="#33b2cc">
        <block type="move_x"><value name="VAL"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="move_y"><value name="VAL"><block type="math_number"><field name="NUM">10</field></block></value></block>
    </category>
</xml>

<script>
// Firebase 설정
const firebaseConfig = {
    apiKey: "AIzaSyDdFsRGy_2mZowYinOf9LeQhot08xyaqc4",
    authDomain: "zizon-coding.firebaseapp.com",
    projectId: "zizon-coding",
    databaseURL: "https://zizon-coding-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database(), auth = firebase.auth();

let currentUser = null, workspace = null, objects = [], selectedId = null;

// 한글 블록 정의
Blockly.Blocks['when_run'] = { init: function() { this.appendDummyInput().appendField("시작하기 버튼을 클릭했을 때"); this.setNextStatement(true); this.setColour("#33b233"); } };
Blockly.Blocks['move_x'] = { init: function() { this.appendValueInput("VAL").setCheck("Number").appendField("x좌표를"); this.appendDummyInput().appendField("만큼 이동하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); } };
Blockly.Blocks['move_y'] = { init: function() { this.appendValueInput("VAL").setCheck("Number").appendField("y좌표를"); this.appendDummyInput().appendField("만큼 이동하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); } };

function showSection(name) {
    ['mainView', 'createView'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.classList.add('hidden');
    });
    document.getElementById(name + 'View').classList.remove('hidden');
    if(name === 'create' && !workspace) {
        workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox') });
        if(objects.length === 0) addObj();
    }
    if(name === 'main') loadWorks();
}

function addObj() {
    const id = Date.now();
    objects.push({ id, name: "오브젝트_"+(objects.length+1), x: 190, y: 160, size: 70, dir: 90, defX: 190, defY: 160 });
    render(); selectObj(id);
}

function selectObj(id) {
    selectedId = id; const o = objects.find(obj => obj.id === id);
    document.getElementById('statusPanel').classList.remove('hidden');
    document.getElementById('stX').value = o.x; document.getElementById('stY').value = o.y;
    document.getElementById('stSize').value = o.size; document.getElementById('stDir').value = o.dir;
    render();
}

function updateObjStatus() {
    const o = objects.find(obj => obj.id === selectedId); if(!o) return;
    o.x = Number(document.getElementById('stX').value); o.y = Number(document.getElementById('stY').value);
    o.size = Number(document.getElementById('stSize').value); o.dir = Number(document.getElementById('stDir').value);
    o.defX = o.x; o.defY = o.y; render();
}

function render() {
    const screen = document.getElementById('screen'), list = document.getElementById('objList');
    screen.innerHTML = ''; list.innerHTML = '';
    objects.forEach(o => {
        const div = document.createElement('div');
        div.className = 'game-obj';
        div.style.cssText += `left:${o.x}px; top:${o.y}px; width:${o.size}px; height:${o.size}px; transform:translate(-50%,-50%) rotate(${o.dir-90}deg);`;
        div.innerText = o.name; screen.appendChild(div);

        const card = document.createElement('div');
        card.className = `obj-item flex justify-between items-center ${o.id === selectedId ? 'active' : ''}`;
        card.onclick = () => selectObj(o.id);
        card.innerHTML = `<span class="text-xs font-bold">🖼️ ${o.name}</span><button onclick="objects=objects.filter(obj=>obj.id!==${o.id});render();" class="text-slate-300 hover:text-red-500">×</button>`;
        list.appendChild(card);
    });
}

function playProject() {
    document.getElementById('playBtn').classList.add('hidden');
    document.getElementById('stopBtn').classList.remove('hidden');
}

function stopProject() {
    document.getElementById('stopBtn').classList.add('hidden');
    document.getElementById('playBtn').classList.remove('hidden');
    objects.forEach(o => { o.x = o.defX; o.y = o.defY; });
    render();
}

function loadWorks() {
    db.ref('works').on('value', snap => {
        const list = document.getElementById('workList'); list.innerHTML = ''; if(!snap.val()) return;
        Object.entries(snap.val()).reverse().forEach(([key, w]) => {
            const isStaff = w.isStaff ? `<span class="bg-yellow-400 text-white text-[10px] px-2 py-1 rounded-full ml-2">⭐ 스선</span>` : '';
            const staffBtn = (currentUser && currentUser.nickname === '어쩌다코딩') ? `<button onclick="db.ref('works/${key}/isStaff').set(${!w.isStaff})" class="text-[10px] text-blue-500 ml-2 font-bold">[스선전환]</button>` : '';
            list.innerHTML += `<div class="bg-white p-5 rounded-2xl border shadow-sm"><h3 class="font-black text-slate-800">${w.title}${isStaff}</h3><p class="text-xs text-slate-400">By ${w.nickname}${staffBtn}</p></div>`;
        });
    });
}

// 가입 및 로그인 로직
document.getElementById("goSignupBtn").onclick = () => { document.getElementById("loginView").classList.add("hidden"); document.getElementById("signupView").classList.remove("hidden"); };
document.getElementById("goLoginBtn").onclick = () => { document.getElementById("signupView").classList.add("hidden"); document.getElementById("loginView").classList.remove("hidden"); };
document.getElementById("doLoginBtn").onclick = () => auth.signInWithEmailAndPassword(document.getElementById('loginId').value.trim() + "@zizon.com", document.getElementById('loginPw').value.trim()).catch(()=>alert("로그인 실패"));
document.getElementById("doSignupBtn").onclick = async () => {
    const id = document.getElementById('regId').value.trim(), nick = document.getElementById('regNick').value.trim(), pw = document.getElementById('regPw').value.trim();
    const res = await auth.createUserWithEmailAndPassword(id + "@zizon.com", pw);
    await db.ref('users/' + res.user.uid).set({ id, nickname: nick }); location.reload();
};
document.getElementById("saveWorkBtn").onclick = async () => {
    if(!currentUser) return;
    const xml = Blockly.Xml.workspaceToDom(workspace);
    await db.ref('works').push({ title: document.getElementById('workTitle').value || "무제", code: Blockly.Xml.domToText(xml), nickname: currentUser.nickname, isStaff: false });
    alert("저장 완료!"); showSection('main');
};
document.getElementById("logoutBtn").onclick = () => auth.signOut().then(()=>location.reload());

auth.onAuthStateChanged(async user => {
    if(user) {
        const snap = await db.ref('users/' + user.uid).once('value'); currentUser = snap.val();
        document.getElementById('authBox').classList.add('hidden'); document.getElementById('topNav').classList.remove('hidden');
        document.getElementById('userNick').innerText = currentUser.nickname; showSection('main');
    }
});
</script>
</body>
</html>
