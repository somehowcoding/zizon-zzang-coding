<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존 SUPREME v20.0 - OBJECT EDITOR</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --z-blue: #4f80ff; --z-bg: #f8fafc; }
        body { font-family: 'Pretendard', sans-serif; background: var(--z-bg); margin: 0; overflow: hidden; height: 100vh; }
        
        .zizon-nav { height: 64px; background: white; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; padding: 0 40px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .content-section { margin-top: 64px; height: calc(100vh - 64px); display: none; }
        .content-section.active { display: flex; }

        .sidebar { width: 350px; border-right: 1px solid #e2e8f0; background: white; display: flex; flex-direction: column; }
        .stage-box { width: 320px; height: 240px; background: #fff; margin: 15px auto; border-radius: 20px; border: 1px solid #f1f5f9; position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        /* Object Item */
        .obj-item { padding: 12px; border-radius: 15px; border: 2px solid transparent; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; background: #f8fafc; }
        .obj-item.active { border-color: var(--z-blue); background: #eff6ff; }
        .obj-thumb { width: 40px; height: 40px; background: white; border-radius: 8px; border: 1px solid #eee; overflow: hidden; }

        /* Painter Modal */
        #painter { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .painter-win { background: white; p: 20px; border-radius: 30px; padding: 30px; text-align: center; }
        canvas { border: 2px solid #eee; cursor: crosshair; background: white; border-radius: 10px; }

        #blocklyDiv { flex: 1; }
        .z-btn { padding: 12px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; border: none; }
        .z-primary { background: var(--z-blue); color: white; }
    </style>
</head>
<body>

<nav class="zizon-nav">
    <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
        <div class="bg-blue-600 w-8 h-8 rounded-lg flex items-center justify-center text-white font-black">Z</div>
        <span class="font-black text-xl tracking-tighter">SUPREME ENGINE</span>
    </div>
</nav>

<section class="content-section active">
    <aside class="sidebar">
        <div class="stage-box">
            <div id="render-layer" class="w-full h-full relative"></div>
        </div>
        
        <div class="px-5 mb-4 space-y-2">
            <button onclick="engine.toggle()" id="run-btn" class="z-btn z-primary w-full text-lg">▶ 엔진 가동</button>
            <button onclick="painter.open()" class="z-btn bg-slate-800 text-white w-full text-sm">🎨 선택 오브젝트 그리기</button>
        </div>

        <div class="px-5 flex-1 overflow-hidden flex flex-col">
            <p class="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest">Objects</p>
            <div id="obj-list" class="flex-1 overflow-y-auto space-y-2 pb-5"></div>
            <button onclick="obj.add()" class="mb-5 p-3 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-bold hover:text-blue-500">+ 오브젝트 추가</button>
        </div>
    </aside>

    <main id="blocklyDiv"></main>
</section>

<div id="painter">
    <div class="painter-win">
        <h2 class="text-2xl font-black mb-4">모양 그리기</h2>
        <canvas id="paintCanvas" width="200" height="200"></canvas>
        <div class="flex gap-2 mt-6 justify-center">
            <button onclick="painter.clear()" class="z-btn bg-slate-100">지우기</button>
            <button onclick="painter.close(true)" class="z-btn z-primary px-10">저장하기</button>
            <button onclick="painter.close(false)" class="z-btn bg-red-100 text-red-500">취소</button>
        </div>
    </div>
</div>

<xml id="toolbox" style="display:none">
    <category name="시작" colour="#33b233"><block type="e_start"></block></category>
    <category name="움직임" colour="#33b2cc">
        <block type="m_x_by"><value name="V"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="m_y_by"><value name="V"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="m_rotate_by"><value name="V"><block type="math_number"><field name="NUM">90</field></block></value></block>
        <block type="m_bounce"></block>
    </category>
    <category name="흐름" colour="#ccb233">
        <block type="f_wait"><value name="S"><block type="math_number"><field name="NUM">1</field></block></value></block>
        <block type="f_forever"></block>
    </category>
</xml>

<script>
/** [ZIZON ENGINE v20.0] **/

const engine = {
    workspace: null, isRunning: false, objects: [], currentObjId: null,
    
    init: function() {
        this.defineBlocks();
        this.workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox'), renderer: 'zelos' });
        
        // 블록이 바뀔 때마다 현재 오브젝트에 데이터 저장
        this.workspace.addChangeListener((e) => {
            if (e.isUiEvent || !this.currentObjId) return;
            const target = this.objects.find(o => o.id === this.currentObjId);
            if (target) target.blocks = Blockly.serialization.workspaces.save(this.workspace);
        });

        obj.add(); // 기본 오브젝트 생성
    },

    defineBlocks: function() {
        const B = Blockly.Blocks; const JS = javascript.javascriptGenerator;
        B['e_start'] = { init: function() { this.appendDummyInput().appendField("🚩 시작했을 때"); this.setNextStatement(true); this.setColour("#33b233"); } };
        B['m_x_by'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField("X를"); this.appendDummyInput().appendField("만큼 바꾸기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); this.setInputsInline(true); } };
        B['m_y_by'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField("Y를"); this.appendDummyInput().appendField("만큼 바꾸기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); this.setInputsInline(true); } };
        B['m_rotate_by'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField("방향을"); this.appendDummyInput().appendField("만큼 회전"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); this.setInputsInline(true); } };
        B['m_bounce'] = { init: function() { this.appendDummyInput().appendField("벽에 닿으면 튕기기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); } };
        B['f_wait'] = { init: function() { this.appendValueInput("S").appendField("기다리기:"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ccb233"); } };
        B['f_forever'] = { init: function() { this.appendDummyInput().appendField("계속 반복"); this.appendStatementInput("DO"); this.setPreviousStatement(true); this.setColour("#ccb233"); } };

        JS.forBlock['e_start'] = () => "";
        JS.forBlock['m_x_by'] = (b, g) => `moveX(${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0});\n`;
        JS.forBlock['m_y_by'] = (b, g) => `moveY(${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0});\n`;
        JS.forBlock['m_rotate_by'] = (b, g) => `rotBy(${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0});\n`;
        JS.forBlock['m_bounce'] = () => `bounce();\n`;
        JS.forBlock['f_wait'] = (b, g) => `await wait(${g.valueToCode(b, 'S', javascript.Order.ATOMIC) || 0});\n`;
        JS.forBlock['f_forever'] = (b, g) => `while(active()){ ${g.statementToCode(b, 'DO')} await wait(0.01); }\n`;
    },

    toggle: function() {
        if(!this.isRunning) {
            this.isRunning = true; document.getElementById('run-btn').innerText = "■ 정지";
            this.objects.forEach(o => {
                const code = javascript.javascriptGenerator.workspaceToCode(this.workspace); // 현재는 각자 데이터로 실행하게 수정 필요하지만 간단히 구현
                this.runObject(o);
            });
        } else {
            this.isRunning = false; document.getElementById('run-btn').innerText = "▶ 엔진 가동";
            obj.reset();
        }
    },

    runObject: async function(target) {
        if (!target.blocks) return;
        const tempWS = new Blockly.Workspace();
        Blockly.serialization.workspaces.load(target.blocks, tempWS);
        const code = javascript.javascriptGenerator.workspaceToCode(tempWS);
        
        const moveX = v => { target.x += v; obj.render(); };
        const moveY = v => { target.y += v; obj.render(); };
        const rotBy = v => { target.rot += v; obj.render(); };
        const bounce = () => {
            if(Math.abs(target.x) > 150) { target.x = target.x > 0 ? 150 : -150; target.rot = 180 - target.rot; }
            if(Math.abs(target.y) > 110) { target.y = target.y > 0 ? 110 : -110; target.rot = -target.rot; }
            obj.render();
        };
        const wait = s => new Promise(r => setTimeout(r, s * 1000));
        const active = () => this.isRunning;
        const AsyncFn = Object.getPrototypeOf(async function(){}).constructor;
        try { await new AsyncFn('moveX','moveY','rotBy','bounce','wait','active', code)(moveX,moveY,rotBy,bounce,wait,active); } catch(e){}
    }
};

const obj = {
    add: function() {
        const id = "obj_" + Date.now();
        const newObj = { id, name: "오브젝트 " + (engine.objects.length + 1), x: 0, y: 0, rot: 0, blocks: null, img: null };
        engine.objects.push(newObj);
        this.select(id);
        this.updateList();
    },
    select: function(id) {
        engine.currentObjId = id;
        const target = engine.objects.find(o => o.id === id);
        
        // 블록 로드
        engine.workspace.clear();
        if (target.blocks) {
            Blockly.serialization.workspaces.load(target.blocks, engine.workspace);
        }
        this.updateList();
    },
    updateList: () => {
        const list = document.getElementById('obj-list');
        list.innerHTML = engine.objects.map(o => `
            <div class="obj-item ${o.id === engine.currentObjId ? 'active' : ''}" onclick="obj.select('${o.id}')">
                <div class="obj-thumb">
                    ${o.img ? `<img src="${o.img}" class="w-full h-full">` : `<div class="w-full h-full bg-slate-800 flex items-center justify-center text-white text-[10px]">Z</div>`}
                </div>
                <div class="text-sm font-bold text-slate-700">${o.name}</div>
            </div>
        `).join('');
    },
    render: () => {
        const layer = document.getElementById('render-layer');
        layer.innerHTML = engine.objects.map(o => `
            <div style="position:absolute; left:${160+o.x}px; top:${120-o.y}px; transform:translate(-50%,-50%) rotate(${o.rot}deg); transition:0.05s;">
                ${o.img ? `<img src="${o.img}" style="width:50px; height:50px;">` : `<div class="w-12 h-12 bg-slate-900 rounded-xl flex items-center justify-center text-white font-black">Z</div>`}
            </div>
        `).join('');
    },
    reset: () => {
        engine.objects.forEach(o => { o.x = 0; o.y = 0; o.rot = 0; });
        obj.render();
    }
};

/** [PAINTER SYSTEM] **/
const painter = {
    canvas: null, ctx: null, drawing: false,
    init: function() {
        this.canvas = document.getElementById('paintCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.ctx.lineWidth = 10;
        this.ctx.lineCap = 'round';
        this.ctx.strokeStyle = '#000';

        this.canvas.onmousedown = () => this.drawing = true;
        this.canvas.onmouseup = () => { this.drawing = false; this.ctx.beginPath(); };
        this.canvas.onmousemove = (e) => {
            if (!this.drawing) return;
            const rect = this.canvas.getBoundingClientRect();
            this.ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            this.ctx.stroke();
        };
    },
    open: function() {
        document.getElementById('painter').style.display = 'flex';
        this.clear();
        const target = engine.objects.find(o => o.id === engine.currentObjId);
        if (target.img) {
            const img = new Image();
            img.onload = () => this.ctx.drawImage(img, 0, 0);
            img.src = target.img;
        }
    },
    close: function(save) {
        if (save) {
            const target = engine.objects.find(o => o.id === engine.currentObjId);
            target.img = this.canvas.toDataURL();
            obj.updateList();
            obj.render();
        }
        document.getElementById('painter').style.display = 'none';
    },
    clear: function() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    }
};

// [START]
window.onload = () => {
    engine.init();
    painter.init();
    obj.render();
};
</script>
</body>
</html>
