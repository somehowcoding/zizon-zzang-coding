<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존 SUPREME v21.0 - ALL BLOCKS ENTRY</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --z-blue: #4f80ff; --z-green: #32d732; --z-purple: #9a51e0; }
        body { font-family: 'Pretendard', sans-serif; background: #f1f5f9; margin: 0; overflow: hidden; height: 100vh; }
        
        /* [TOP MENU] */
        .zizon-header { height: 50px; background: #3c3c3c; display: flex; align-items: center; padding: 0 15px; color: white; justify-content: space-between; }
        .tab-btn { padding: 0 20px; height: 100%; display: flex; align-items: center; cursor: pointer; font-size: 13px; font-weight: bold; border-bottom: 3px solid transparent; }
        .tab-btn.active { background: #505050; border-bottom-color: var(--z-blue); }

        /* [LAYOUT] */
        .main-container { display: flex; height: calc(100vh - 50px); }
        .sidebar { width: 380px; background: #e5e7eb; border-right: 1px solid #d1d5db; display: flex; flex-direction: column; }
        
        /* [STAGE] */
        .stage-box { width: 340px; height: 255px; margin: 15px auto; background: white; border: 1px solid #999; position: relative; overflow: hidden; }
        .var-overlay { position: absolute; top: 5px; left: 5px; pointer-events: none; }
        .var-item { background: rgba(255,255,255,0.8); border: 1px solid var(--z-blue); padding: 2px 6px; font-size: 11px; margin-bottom: 2px; display: flex; justify-content: space-between; min-width: 80px; }

        /* [OBJECT LIST] */
        .obj-container { flex: 1; display: flex; flex-direction: column; background: #f3f4f6; }
        .obj-header { padding: 8px 15px; font-size: 12px; font-weight: bold; display: flex; justify-content: space-between; background: #ddd; }
        .obj-list { flex: 1; overflow-y: auto; padding: 10px; }
        .obj-item { background: white; padding: 10px; border-radius: 8px; border: 2px solid transparent; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .obj-item.active { border-color: var(--z-blue); }

        /* [BLOCKLY] */
        #blocklyDiv { flex: 1; }

        /* [STATUS MODAL] */
        .prop-panel { padding: 15px; background: white; }
        .grid-ui { display: grid; grid-template-cols: 1fr 1fr; gap: 8px; font-size: 11px; }
        .z-input { border: 1px solid #ccc; padding: 4px; border-radius: 4px; font-weight: bold; }
        
        .run-btn { background: var(--z-blue); color: white; padding: 5px 20px; border-radius: 20px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<header class="zizon-header">
    <div class="flex gap-1 items-center">
        <div class="font-black text-blue-400 mr-4">SUPREME v21.0</div>
        <div class="tab-btn active">블록 코딩</div>
        <div class="tab-btn" onclick="vars.add()">변수 만들기</div>
        <div class="tab-btn" onclick="painter.open()">모양 추가</div>
    </div>
    <div id="run-btn" class="run-btn" onclick="engine.toggle()">시작하기</div>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="stage-box">
            <div id="var-layer" class="var-overlay"></div>
            <div id="render-layer" class="w-full h-full"></div>
        </div>

        <div class="prop-panel border-y">
            <div class="grid-ui">
                <div class="col-span-2">이름 <input id="st-name" class="z-input w-full" oninput="obj.sync()"></div>
                <div>X <input id="st-x" type="number" class="z-input w-full" oninput="obj.sync()"></div>
                <div>Y <input id="st-y" type="number" class="z-input w-full" oninput="obj.sync()"></div>
                <div>방향 <input id="st-rot" type="number" class="z-input w-full" oninput="obj.sync()"></div>
                <div>크기 <input id="st-size" type="number" class="z-input w-full" oninput="obj.sync()"></div>
            </div>
        </div>

        <div class="obj-container">
            <div class="obj-header">
                <span>오브젝트</span>
                <button onclick="obj.add()" class="text-blue-600">+ 추가</button>
            </div>
            <div id="obj-list" class="obj-list"></div>
        </div>
    </div>

    <div id="blocklyDiv"></div>
</div>

<script>
// --- [데이터 관리] ---
const state = {
    variables: {}, // 1. 점수 변수 초기화 (기본 생성 안 함)
    objects: [],
    selectedId: null,
    isRunning: false,
    signals: ["시작"]
};

const engine = {
    workspace: null,
    init: function() {
        this.defineBlocks();
        this.workspace = Blockly.inject('blocklyDiv', {
            toolbox: this.getToolbox(),
            renderer: 'zelos',
            theme: 'classic'
        });
        
        this.workspace.addChangeListener(e => {
            if (e.isUiEvent || !state.selectedId) return;
            const target = state.objects.find(o => o.id === state.selectedId);
            if (target) target.xml = Blockly.Xml.workspaceToDom(this.workspace);
        });

        // 2. 초기 오브젝트 1개는 반드시 생성
        obj.add("엔트리봇");
    },

    defineBlocks: function() {
        const B = Blockly.Blocks, JS = javascript.javascriptGenerator;
        
        // --- 시작 블록군 ---
        B['e_start'] = { init: function() { this.appendDummyInput().appendField("🚩 시작 버튼을 클릭했을 때"); this.setNextStatement(true); this.setColour("#33b233"); } };
        B['e_click'] = { init: function() { this.appendDummyInput().appendField("🖱 오브젝트를 클릭했을 때"); this.setNextStatement(true); this.setColour("#33b233"); } };
        
        // --- 움직임 블록군 ---
        B['m_move_dir'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField("이동 방향으로"); this.appendDummyInput().appendField("만큼 움직이기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); } };
        B['m_set_x'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField("X 좌표를"); this.appendDummyInput().appendField("(으)로 정하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); } };
        B['m_set_y'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField("Y 좌표를"); this.appendDummyInput().appendField("(으)로 정하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); } };
        B['m_rot_set'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField("방향을"); this.appendDummyInput().appendField("도로 정하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); } };
        B['m_bounce'] = { init: function() { this.appendDummyInput().appendField("화면에 닿으면 튕기기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); } };

        // --- 생김새 블록군 ---
        B['l_show'] = { init: function() { this.appendDummyInput().appendField("모양 보이기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ff45e1"); } };
        B['l_hide'] = { init: function() { this.appendDummyInput().appendField("모양 숨기기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ff45e1"); } };
        B['l_say'] = { init: function() { this.appendValueInput("V").appendField("말하기:"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ff45e1"); } };

        // --- 흐름 블록군 ---
        B['f_wait'] = { init: function() { this.appendValueInput("V").appendField("초 기다리기:"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ccb233"); } };
        B['f_repeat'] = { init: function() { this.appendValueInput("V").appendField("번 반복하기"); this.appendStatementInput("DO"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ccb233"); } };
        B['f_forever'] = { init: function() { this.appendDummyInput().appendField("계속 반복하기"); this.appendStatementInput("DO"); this.setPreviousStatement(true); this.setColour("#ccb233"); } };

        // --- 변수 블록군 ---
        B['v_get'] = { init: function() { this.appendDummyInput().appendField(new Blockly.FieldDropdown(() => Object.keys(state.variables).length ? Object.keys(state.variables).map(v => [v, v]) : [["변수없음", "NONE"]]), "VAR"); this.setOutput(true, "Number"); this.setColour("#cc33cc"); }};
        B['v_set'] = { init: function() { this.appendValueInput("V").appendField(new Blockly.FieldDropdown(() => Object.keys(state.variables).length ? Object.keys(state.variables).map(v => [v, v]) : [["변수없음", "NONE"]]), "VAR").appendField("를"); this.appendDummyInput().appendField("(으)로 정하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#cc33cc"); }};
        B['v_add'] = { init: function() { this.appendValueInput("V").appendField(new Blockly.FieldDropdown(() => Object.keys(state.variables).length ? Object.keys(state.variables).map(v => [v, v]) : [["변수없음", "NONE"]]), "VAR").appendField("에"); this.appendDummyInput().appendField("만큼 더하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#cc33cc"); }};

        // JS 생성기
        JS.forBlock['e_start'] = () => "";
        JS.forBlock['m_move_dir'] = (b, g) => `moveSteps(${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0});\n`;
        JS.forBlock['m_set_x'] = (b, g) => `target.x = ${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0}; obj.render();\n`;
        JS.forBlock['m_set_y'] = (b, g) => `target.y = ${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0}; obj.render();\n`;
        JS.forBlock['m_rot_set'] = (b, g) => `target.rot = ${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0}; obj.render();\n`;
        JS.forBlock['m_bounce'] = () => `bounce();\n`;
        JS.forBlock['f_wait'] = (b, g) => `await wait(${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0});\n`;
        JS.forBlock['f_forever'] = (b, g) => `while(active()){ ${g.statementToCode(b, 'DO')} await wait(0.01); }\n`;
        JS.forBlock['f_repeat'] = (b, g) => {
            const count = g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0;
            return `for(let i=0; i<${count}; i++){ ${g.statementToCode(b, 'DO')} await wait(0.01); }\n`;
        };
        JS.forBlock['v_get'] = (b) => [`state.variables["${b.getFieldValue('VAR')}"]`, javascript.Order.ATOMIC];
        JS.forBlock['v_set'] = (b, g) => `state.variables["${b.getFieldValue('VAR')}"] = ${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0}; vars.update();\n`;
        JS.forBlock['v_add'] = (b, g) => `state.variables["${b.getFieldValue('VAR')}"] += ${g.valueToCode(b, 'V', javascript.Order.ATOMIC) || 0}; vars.update();\n`;
        JS.forBlock['l_say'] = (b, g) => `console.log(${g.valueToCode(b, 'V', javascript.Order.ATOMIC)});\n`;
    },

    getToolbox: () => `
        <xml>
            <category name="시작" colour="#33b233">
                <block type="e_start"></block>
                <block type="e_click"></block>
            </category>
            <category name="움직임" colour="#33b2cc">
                <block type="m_move_dir"><value name="V"><block type="math_number"><field name="NUM">10</field></block></value></block>
                <block type="m_set_x"><value name="V"><block type="math_number"><field name="NUM">0</field></block></value></block>
                <block type="m_set_y"><value name="V"><block type="math_number"><field name="NUM">0</field></block></value></block>
                <block type="m_rot_set"><value name="V"><block type="math_number"><field name="NUM">90</field></block></value></block>
                <block type="m_bounce"></block>
            </category>
            <category name="생김새" colour="#ff45e1">
                <block type="l_show"></block>
                <block type="l_hide"></block>
                <block type="l_say"><value name="V"><block type="text"><field name="TEXT">안녕!</field></block></value></block>
            </category>
            <category name="흐름" colour="#ccb233">
                <block type="f_wait"><value name="V"><block type="math_number"><field name="NUM">1</field></block></value></block>
                <block type="f_repeat"><value name="V"><block type="math_number"><field name="NUM">10</field></block></value></block>
                <block type="f_forever"></block>
                <block type="controls_if"></block>
            </category>
            <category name="판단" colour="#3366cc">
                <block type="logic_compare"></block>
                <block type="logic_operation"></block>
                <block type="logic_boolean"></block>
            </category>
            <category name="계산" colour="#ee7d16">
                <block type="math_arithmetic"></block>
                <block type="math_number"></block>
                <block type="math_random_int"><value name="FROM"><block type="math_number"><field name="NUM">1</field></block></value><value name="TO"><block type="math_number"><field name="NUM">10</field></block></value></block>
            </category>
            <category name="변수" colour="#cc33cc">
                <block type="v_get"></block>
                <block type="v_set"><value name="V"><block type="math_number"><field name="NUM">10</field></block></value></block>
                <block type="v_add"><value name="V"><block type="math_number"><field name="NUM">1</field></block></value></block>
            </category>
        </xml>`,

    toggle: function() {
        state.isRunning = !state.isRunning;
        document.getElementById('run-btn').innerText = state.isRunning ? "정지하기" : "시작하기";
        document.getElementById('run-btn').style.background = state.isRunning ? "#ff4b4b" : "#4f80ff";
        if(state.isRunning) {
            state.objects.forEach(o => {
                const code = javascript.javascriptGenerator.workspaceToCode(Blockly.Xml.domToWorkspace(o.xml, new Blockly.Workspace()));
                this.run(o, code);
            });
        } else obj.reset();
    },

    run: async function(target, code) {
        const wait = s => new Promise(r => setTimeout(r, s * 1000));
        const active = () => state.isRunning;
        const moveSteps = s => {
            const rad = (target.rot * Math.PI) / 180;
            target.x += Math.cos(rad) * s;
            target.y += Math.sin(rad) * s;
            obj.render();
        };
        const bounce = () => {
            if(Math.abs(target.x) > 155) { target.x = target.x > 0 ? 155 : -155; target.rot = 180 - target.rot; }
            if(Math.abs(target.y) > 115) { target.y = target.y > 0 ? 115 : -115; target.rot = -target.rot; }
            obj.render();
        };
        const AsyncFn = Object.getPrototypeOf(async function(){}).constructor;
        try { await new AsyncFn('wait','active','target','state','vars','obj','moveSteps','bounce', code)(wait,active,target,state,vars,obj,moveSteps,bounce); } catch(e){}
    }
};

const obj = {
    add: function(name = null) {
        const id = "o_" + Date.now();
        state.objects.push({
            id, name: name || "오브젝트 " + (state.objects.length + 1),
            x: 0, y: 0, rot: 0, size: 100, img: null,
            xml: Blockly.Xml.textToDom('<xml xmlns="https://developers.google.com/blockly/xml"><block type="e_start" x="20" y="20"></block></xml>')
        });
        this.select(id);
    },
    select: function(id) {
        state.selectedId = id;
        const target = state.objects.find(o => o.id === id);
        engine.workspace.clear();
        Blockly.Xml.domToWorkspace(target.xml, engine.workspace);
        document.getElementById('st-name').value = target.name;
        document.getElementById('st-x').value = Math.round(target.x);
        document.getElementById('st-y').value = Math.round(target.y);
        document.getElementById('st-rot').value = target.rot;
        document.getElementById('st-size').value = target.size;
        this.updateList();
    },
    sync: function() {
        const target = state.objects.find(o => o.id === state.selectedId);
        if(!target) return;
        target.name = document.getElementById('st-name').value;
        target.x = Number(document.getElementById('st-x').value);
        target.y = Number(document.getElementById('st-y').value);
        target.rot = Number(document.getElementById('st-rot').value);
        target.size = Number(document.getElementById('st-size').value);
        this.updateList(); this.render();
    },
    updateList: () => {
        document.getElementById('obj-list').innerHTML = state.objects.map(o => `
            <div onclick="obj.select('${o.id}')" class="obj-item ${state.selectedId === o.id ? 'active' : ''}">
                <div class="w-8 h-8 bg-slate-200 rounded flex items-center justify-center overflow-hidden">
                    ${o.img ? `<img src="${o.img}" class="w-full h-full object-contain">` : '🖼'}
                </div>
                <div class="text-xs font-bold truncate w-24">${o.name}</div>
            </div>
        `).join('');
    },
    render: () => {
        document.getElementById('render-layer').innerHTML = state.objects.map(o => `
            <div style="position:absolute; left:${170+o.x}px; top:${127-o.y}px; transform:translate(-50%,-50%) rotate(${o.rot}deg); transition:0.05s; width:${40*(o.size/100)}px; height:${40*(o.size/100)}px;">
                ${o.img ? `<img src="${o.img}" class="w-full h-full object-contain">` : 
                `<div class="w-full h-full bg-blue-600 rounded-lg border border-white shadow-md flex items-center justify-center text-white text-[10px] font-black">Z</div>`}
            </div>
        `).join('');
    },
    reset: () => { state.objects.forEach(o => { o.x = 0; o.y = 0; o.rot = 0; }); obj.render(); }
};

const vars = {
    add: function() {
        const name = prompt("새 변수 이름을 입력하세요:");
        if(name && !state.variables[name]) {
            state.variables[name] = 0;
            this.update();
            engine.workspace.updateToolbox(engine.getToolbox());
        }
    },
    update: function() {
        document.getElementById('var-layer').innerHTML = Object.entries(state.variables).map(([name, val]) => `
            <div class="var-item"><span>${name}</span><b>${val}</b></div>
        `).join('');
    }
};

const painter = {
    canvas: null, ctx: null, drawing: false,
    open: function() {
        const win = window.open("", "Painter", "width=500,height=500");
        win.document.write(`
            <h3>모양 그리기</h3>
            <canvas id="c" width="400" height="300" style="border:1px solid #000; cursor:crosshair"></canvas><br>
            <button onclick="save()">저장하고 닫기</button>
            <script>
                const c = document.getElementById('c'), ctx = c.getContext('2d');
                let draw = false;
                c.onmousedown = () => { draw = true; ctx.beginPath(); };
                c.onmouseup = () => draw = false;
                c.onmousemove = (e) => { if(!draw) return; ctx.lineTo(e.clientX-10, e.clientY-40); ctx.stroke(); };
                function save() { window.opener.painter.callback(c.toDataURL()); window.close(); }
            <\/script>
        `);
    },
    callback: function(data) {
        const target = state.objects.find(o => o.id === state.selectedId);
        if(target) target.img = data;
        obj.updateList(); obj.render();
    }
};

engine.init();
</script>
</body>
</html>
