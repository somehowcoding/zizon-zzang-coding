<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 SUPREME - V15.7</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --z-blue: #4f80ff; --z-purple: #7c3aed; --z-bg: #f8faff; --z-border: #eef2ff; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--z-bg); margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
        .grad-text { background: linear-gradient(135deg, var(--z-blue), var(--z-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* 스테이지 & 좌표계 */
        #stage-canvas { 
            width: 400px; height: 300px; background: white; position: relative; overflow: hidden;
            background-image: linear-gradient(#f1f5f9 1px, transparent 1px), linear-gradient(90deg, #f1f5f9 1px, transparent 1px);
            background-size: 20px 20px; background-position: center; border-radius: 20px;
        }
        .axis-x { position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: #cbd5e1; pointer-events: none; }
        .axis-y { position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: #cbd5e1; pointer-events: none; }

        /* 메뉴 & 섹션 뷰 */
        #main-menu { position: fixed; inset: 0; background: white; z-index: 500; display: flex; flex-direction: column; overflow-y: auto; }
        .section-view { position: fixed; inset: 0; background: white; z-index: 600; padding: 50px; display: none; overflow-y: auto; }
        
        .big-card { background: var(--z-bg); padding: 40px; border-radius: 40px; text-align: center; transition: 0.3s; cursor: pointer; border: 3px solid transparent; }
        .big-card:hover { transform: translateY(-10px); border-color: var(--z-blue); background: white; }

        /* 에디터 */
        .sidebar { width: 380px; background: white; border-right: 1px solid var(--z-border); display: flex; flex-direction: column; }
        .tab { padding: 0 25px; height: 50px; display: flex; align-items: center; font-weight: 800; font-size: 13px; color: #94a3b8; cursor: pointer; }
        .tab.active { color: var(--z-blue); border-bottom: 3px solid var(--z-blue); }
        #blocklyDiv { flex: 1; width: 100%; }
        
        .project-item { background: var(--z-bg); padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="h-screen flex flex-col">
    <section id="auth-overlay" class="fixed inset-0 bg-slate-50 z-[1000] flex items-center justify-center">
        <div class="bg-white p-12 rounded-[50px] shadow-2xl w-full max-w-[380px] text-center border-b-[10px] border-blue-500">
            <h2 class="text-3xl font-black mb-8 grad-text italic">지존 입장</h2>
            <input id="z-id" type="text" placeholder="아이디" class="w-full bg-slate-50 p-4 rounded-xl mb-4 outline-none font-bold">
            <input id="z-pw" type="password" placeholder="비번" class="w-full bg-slate-50 p-4 rounded-xl mb-6 outline-none font-bold">
            <button onclick="zLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg">시작하기</button>
            <button onclick="zJoin()" class="mt-4 text-slate-400 text-xs font-bold">회원가입</button>
        </div>
    </section>

    <section id="main-menu" class="hidden">
        <nav class="flex justify-between items-center px-12 py-8">
            <div class="text-2xl font-black italic grad-text">지존짱짱 SUPREME</div>
            <button onclick="zLogout()" class="text-xs font-bold text-red-400 bg-red-50 px-4 py-2 rounded-full">로그아웃</button>
        </nav>
        <div class="flex flex-col items-center justify-center flex-1 pb-20">
            <h1 id="portal-user" class="text-6xl font-black mb-12">Hello, Supreme!</h1>
            <div class="grid grid-cols-4 gap-6 w-full max-w-6xl px-12">
                <div onclick="openView('story')" class="big-card">
                    <div class="text-5xl mb-4">📖</div><h3 class="font-black text-xl">지존 이야기</h3>
                </div>
                <div onclick="startProject()" class="big-card bg-blue-600 !border-none shadow-xl">
                    <div class="text-5xl mb-4">🚀</div><h3 class="font-black text-xl text-white">새 작품 만들기</h3>
                </div>
                <div onclick="loadCommunity()" class="big-card">
                    <div class="text-5xl mb-4">🌍</div><h3 class="font-black text-xl">모든 작품</h3>
                </div>
                <div onclick="loadMyPage()" class="big-card">
                    <div class="text-5xl mb-4">👤</div><h3 class="font-black text-xl">마이페이지</h3>
                </div>
            </div>
        </div>
    </section>

    <div id="view-story" class="section-view">
        <button onclick="closeView()" class="mb-10 font-black text-blue-500">← 뒤로가기</button>
        <h2 class="text-5xl font-black mb-8">지존 이야기 📢</h2>
        <div class="space-y-4 max-w-3xl">
            <div class="bg-blue-50 p-6 rounded-3xl border-l-8 border-blue-500">
                <h4 class="font-black text-xl mb-1">V15.7 통합 업데이트</h4>
                <p class="text-slate-600 font-bold">모든 기능이 하나로 합쳐졌습니다. 이제 그리기부터 코딩까지 끊김없이 즐기세요!</p>
            </div>
        </div>
    </div>

    <div id="view-community" class="section-view">
        <button onclick="closeView()" class="mb-10 font-black text-blue-500">← 뒤로가기</button>
        <h2 class="text-5xl font-black mb-8">지존들의 광장 🌍</h2>
        <div id="community-list" class="grid grid-cols-3 gap-6"></div>
    </div>

    <div id="view-mypage" class="section-view">
        <button onclick="closeView()" class="mb-10 font-black text-blue-500">← 뒤로가기</button>
        <h2 class="text-5xl font-black mb-8">나의 보관함 👤</h2>
        <div id="my-project-list" class="space-y-4"></div>
    </div>

    <header id="editor-header" class="hidden h-[60px] bg-white border-b px-6 flex justify-between items-center">
        <button onclick="goHome()" class="font-black italic text-xl grad-text">지존짱짱 SUPREME</button>
        <button onclick="saveProject()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-black text-sm">작품 저장</button>
    </header>

    <main id="editor-view" class="hidden flex-1 flex overflow-hidden">
        <aside class="sidebar">
            <div class="p-6">
                <div id="stage-canvas">
                    <div class="axis-x"></div><div class="axis-y"></div>
                    <div id="sprite-layer"></div>
                </div>
            </div>
            <div class="flex justify-center -mt-4 mb-4">
                <button id="toggleBtn" onclick="togglePlay()" class="bg-white shadow-xl border text-blue-600 font-black px-8 py-2 rounded-full">▶ 시작</button>
            </div>
            <div class="obj-panel px-6 flex-1 overflow-y-auto">
                <div id="obj-list-container"></div>
                <div id="inspector" class="bg-slate-50 p-4 rounded-2xl mt-4 hidden">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="ins-x" oninput="updateIns()" class="status-input" type="number" placeholder="X">
                        <input id="ins-y" oninput="updateIns()" class="status-input" type="number" placeholder="Y">
                    </div>
                </div>
            </div>
        </aside>

        <div class="flex-1 flex flex-col relative">
            <div class="tabs flex bg-white border-b">
                <div id="tab-p" onclick="switchTab('p')" class="tab active">모양 그리기</div>
                <div id="tab-b" onclick="switchTab('b')" class="tab">블록 조립소</div>
            </div>
            <div id="blocklyDiv" style="display:none;"></div>
            <div id="painter-view" class="flex-1 flex flex-col items-center justify-center bg-slate-50">
                <canvas id="drawing-pad" width="400" height="400" class="bg-white rounded-[40px] shadow-2xl border-4 border-white"></canvas>
                <div class="mt-8 flex gap-4">
                    <input type="color" id="brush-color" value="#4f80ff" class="w-12 h-12 rounded-xl cursor-pointer">
                    <button onclick="clearPad()" class="px-8 py-3 bg-white rounded-xl font-black text-slate-400 border">지우기</button>
                    <button onclick="applyCostume()" class="px-12 py-3 bg-blue-600 text-white rounded-xl font-black">모양 적용</button>
                </div>
            </div>
        </div>
    </main>
</div>

<xml id="toolbox" style="display:none">
    <category name="시작" colour="#33b233"><block type="on_start"></block></category>
    <category name="흐름" colour="#ccb233"><block type="wait_sec"></block><block type="forever_loop"></block><block type="controls_if"></block></category>
    <category name="움직임" colour="#33b2cc"><block type="move_x"></block><block type="turn_r"></block></category>
    <category name="생김새" colour="#cc33cc"><block type="say_it"></block></category>
    <category name="연산" colour="#52b7ff"><block type="math_arithmetic"></block><block type="logic_compare"></block></category>
</xml>

<script>
const conf = { apiKey: "AIzaSyDdFsRGy_2mZowYinOf9LeQhot08xyaqc4", authDomain: "zizon-coding.firebaseapp.com", databaseURL: "https://zizon-coding-default-rtdb.firebaseio.com" };
firebase.initializeApp(conf);
const db = firebase.database(), auth = firebase.auth();
let ws = null, objs = [], sid = null, user = null;

const getX = (x) => 200 + parseInt(x);
const getY = (y) => 150 - parseInt(y);

function openView(v) { document.getElementById('view-'+v).style.display = 'block'; }
function closeView() { document.querySelectorAll('.section-view').forEach(el => el.style.display = 'none'); }

function startProject() { 
    document.getElementById('main-menu').classList.add('hidden'); 
    document.getElementById('editor-view').classList.remove('hidden'); 
    document.getElementById('editor-header').classList.remove('hidden');
    if(!ws) { ws = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox'), renderer: 'zelos' }); createNewObj(); }
    switchTab('p');
}

async function loadMyPage() {
    openView('mypage');
    const snap = await db.ref('projects').orderByChild('uid').equalTo(user.uid).once('value');
    const container = document.getElementById('my-project-list');
    container.innerHTML = "";
    snap.forEach(c => {
        const p = c.val();
        container.innerHTML += `<div class="project-item">
            <div><h4 class="font-black">${p.title}</h4></div>
            <button onclick="togglePrivacy('${c.key}', ${p.isPublic})" class="px-4 py-2 rounded-xl text-xs font-black ${p.isPublic ? 'bg-green-400 text-white':'bg-red-400 text-white'}">${p.isPublic ? '공개 중':'비공개'}</button>
        </div>`;
    });
}

async function togglePrivacy(key, current) { await db.ref('projects/'+key).update({ isPublic: !current }); loadMyPage(); }

async function loadCommunity() {
    openView('community');
    const snap = await db.ref('projects').orderByChild('isPublic').equalTo(true).once('value');
    const container = document.getElementById('community-list');
    container.innerHTML = "";
    snap.forEach(c => {
        const p = c.val();
        container.innerHTML += `<div class="bg-slate-50 p-6 rounded-3xl border-2">
            <h4 class="font-black text-lg">${p.title}</h4>
            <p class="text-blue-500 font-black text-xs">지존: ${p.nickname}</p>
        </div>`;
    });
}

async function saveProject() {
    const title = prompt("작품 제목?");
    if(!title) return;
    await db.ref('projects').push({ title, uid: user.uid, nickname: user.nickname, objs, isPublic: false, time: Date.now() });
    alert("저장 완료!");
}

function switchTab(m) {
    const isP = m === 'p';
    document.getElementById('painter-view').style.display = isP ? 'flex' : 'none';
    document.getElementById('blocklyDiv').style.display = isP ? 'none' : 'block';
    document.getElementById('tab-p').classList.toggle('active', isP);
    document.getElementById('tab-b').classList.toggle('active', !isP);
}

// [기타 그리기/오브젝트 로직 생략(V15.6과 동일)]
const canvas = document.getElementById('drawing-pad'), ctx = canvas.getContext('2d');
let drawing = false;
canvas.onmousedown = (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); };
canvas.onmousemove = (e) => { if(drawing) { ctx.lineWidth=8; ctx.lineCap='round'; ctx.strokeStyle=document.getElementById('brush-color').value; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); }};
canvas.onmouseup = () => drawing = false;
function clearPad() { ctx.clearRect(0,0,400,400); }
function applyCostume() { const t = objs.find(o => o.id === sid); if(t) t.costume = canvas.toDataURL(); renderStage(); alert("적용!"); }

function renderStage() {
    document.getElementById('sprite-layer').innerHTML = objs.map(o => `<div style="position:absolute; left:${getX(o.x)}px; top:${getY(o.y)}px; transform:translate(-50%,-50%);">${o.costume ? `<img src="${o.costume}" style="width:80px;">` : '<div class="w-12 h-12 bg-blue-600 rounded-xl"></div>'}</div>`).join('');
}
function createNewObj() { const id = "z_"+Date.now(); objs.push({ id, name: "오브젝트", x:0, y:0, xml:"", costume:null }); updateObjUI(); selectObj(id); }
function selectObj(id) { sid = id; updateObjUI(); renderStage(); }
function updateObjUI() { document.getElementById('obj-list-container').innerHTML = objs.map(o => `<div onclick="selectObj('${o.id}')" class="p-3 mb-2 bg-slate-50 rounded-xl font-black text-xs border-2 ${o.id===sid?'border-blue-500':'border-transparent'} cursor-pointer">${o.name}</div>`).join(''); }

auth.onAuthStateChanged(async u => {
    if(u) {
        const s = await db.ref('users/'+u.uid).once('value');
        user = { uid: u.uid, nickname: s.val()?.nickname || "지존" };
        document.getElementById('portal-user').innerText = user.nickname + " 님 환영합니다";
        document.getElementById('auth-overlay').classList.add('hidden');
        document.getElementById('main-menu').classList.remove('hidden');
    }
});
function zLogin() { auth.signInWithEmailAndPassword(document.getElementById('z-id').value+"@z.com", document.getElementById('z-pw').value); }
function zJoin() { const id = prompt("ID"), pw = prompt("PW"), nk = prompt("NICK"); if(id&&pw&&nk) auth.createUserWithEmailAndPassword(id+"@z.com", pw).then(r=>db.ref('users/'+r.user.uid).set({nickname:nk})); }
function zLogout() { auth.signOut().then(()=>location.reload()); }
function goHome() { document.getElementById('main-menu').classList.remove('hidden'); document.getElementById('editor-view').classList.add('hidden'); document.getElementById('editor-header').classList.add('hidden'); }
</script>
</body>
</html>
