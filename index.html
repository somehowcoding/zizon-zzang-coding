<div id="authBox" class="flex-grow flex items-center justify-center">
    <div class="login-card text-center">
        <h2 class="text-3xl font-black mb-1 text-slate-800">지존짱짱 👋</h2>
        <p class="text-[10px] text-blue-400 font-black mb-8 tracking-widest uppercase">Made by 어쩌다코딩</p>
        
        <div id="loginView">
            <input id="loginId" type="text" placeholder="아이디" class="input-box">
            <input id="loginPw" type="password" placeholder="비밀번호" class="input-box">
            <button id="doLoginBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black mb-4 shadow-lg shadow-blue-100">로그인</button>
            <button id="goSignupBtn" type="button" class="text-slate-400 text-sm font-bold underline cursor-pointer hover:text-blue-500">회원가입 하기</button>
        </div>

        <div id="signupView" class="hidden">
            <input id="regId" type="text" placeholder="아이디 정하기" class="input-box">
            <input id="regNick" type="text" placeholder="닉네임 정하기" class="input-box">
            <input id="regPw" type="password" placeholder="비밀번호 (6자 이상)" class="input-box">
            <button id="doSignupBtn" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black mb-4 shadow-lg shadow-green-100">가입 완료</button>
            <button id="goLoginBtn" type="button" class="text-slate-400 text-sm font-bold underline cursor-pointer hover:text-blue-500">이미 계정이 있어요</button>
        </div>
    </div>
</div>

<script>
// (자바스크립트 부분에서 이 연결 코드가 잘 있는지 꼭 봐줘!)
document.addEventListener("DOMContentLoaded", function() {
    const loginView = document.getElementById("loginView");
    const signupView = document.getElementById("signupView");

    // 회원가입 화면으로 가기
    document.getElementById("goSignupBtn").onclick = () => {
        loginView.classList.add("hidden");
        signupView.classList.remove("hidden");
    };

    // 다시 로그인 화면으로 오기
    document.getElementById("goLoginBtn").onclick = () => {
        signupView.classList.add("hidden");
        loginView.classList.remove("hidden");
    };
    
    // ... 나머지 로그인/가입 로직은 그대로!
});
</script>
