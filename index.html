<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 - Made by 어쩌다코딩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fbff; margin: 0; overflow-x: hidden; }
        .hidden { display: none !important; }
        #blocklyDiv { width: 100%; height: 500px; border-radius: 20px; border: 2px solid #e2e8f0; }
        .input-box { width: 100%; background: #f8fafc; border: 2px solid #f1f5f9; padding: 14px; border-radius: 16px; outline: none; margin-bottom: 12px; }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-slate-50">

<nav id="topNav" class="bg-white border-b px-6 py-4 flex justify-between items-center hidden sticky top-0 z-50">
    <div class="text-xl font-black text-blue-600 italic cursor-pointer" onclick="showSection('main')">지존짱짱 🚀</div>
    <div class="flex items-center gap-4 font-bold text-slate-600">
        <button onclick="showSection('main')">갤러리</button>
        <button onclick="showSection('create')">만들기</button>
        <button onclick="showSection('story')">이야기</button>
        <span id="userNick" class="text-sm text-slate-400 border-l pl-3 ml-2"></span>
        <button id="logoutBtn" class="text-xs text-red-400">로그아웃</button>
    </div>
</nav>

<div id="authBox" class="flex-grow flex items-center justify-center p-6">...</div>

<main id="mainView" class="hidden p-8 max-w-5xl mx-auto w-full">
    <h1 class="text-3xl font-black mb-10">모두의 작품 🌍</h1>
    <div id="workList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
</main>

<section id="createView" class="hidden p-8 max-w-6xl mx-auto w-full">
    <div class="bg-white p-6 rounded-3xl shadow-lg border border-slate-100">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-black">코딩 스튜디오 🛠️</h2>
            <button id="saveWorkBtn" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-black">작품 저장하기</button>
        </div>
        <input id="workTitle" type="text" placeholder="작품 제목" class="input-box">
        <div id="blocklyDiv"></div>
    </div>
</section>

<section id="storyView" class="hidden p-8 max-w-3xl mx-auto w-full">...</section>

<xml id="toolbox" style="display: none">
    <category name="논리" colour="#5b80a5"><block type="controls_if"></block></category>
    <category name="반복" colour="#5ba55b"><block type="controls_repeat_ext"></block></category>
    <category name="수학" colour="#5b67a5"><block type="math_number"></block></category>
    <category name="텍스트" colour="#5ba5a5"><block type="text"></block></category>
</xml>

<script>
// Firebase 설정 (기존과 동일)
const firebaseConfig = { ... }; 
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let workspace = null;
let currentUser = null;

// 섹션 전환 시 Blockly 초기화
function showSection(name) {
    ['mainView', 'createView', 'storyView'].forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById(name + 'View').classList.remove('hidden');
    
    if(name === 'create' && !workspace) {
        workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox') });
    }
    if(name === 'main') loadWorks();
}

// 작품 저장 기능 (관리자 '어쩌다코딩' 권한 로직 포함)
document.getElementById('saveWorkBtn').onclick = async () => {
    const title = document.getElementById('workTitle').value.trim();
    if(!title || !currentUser) return alert("제목을 입력해줘!");
    
    const xml = Blockly.Xml.workspaceToDom(workspace);
    const xmlText = Blockly.Xml.domToText(xml); // 코드를 텍스트로 변환해서 저장

    await db.ref('works').push({
        title,
        code: xmlText,
        nickname: currentUser.nickname,
        isManager: currentUser.nickname === '어쩌다코딩' // 관리자 표시
    });
    alert("갤러리에 등록됐어!");
    showSection('main');
};

// ... 나머지 로그인/불러오기 로직 (이전과 동일)
</script>
</body>
</html>
