<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 SUPREME - V15.6</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --z-blue: #4f80ff; --z-purple: #7c3aed; --z-bg: #f8faff; --z-border: #eef2ff; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--z-bg); margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
        .grad-text { background: linear-gradient(135deg, var(--z-blue), var(--z-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* 스테이지 레이아웃 */
        #stage-canvas { 
            width: 400px; height: 300px; background: white; position: relative; overflow: hidden;
            background-image: linear-gradient(#f1f5f9 1px, transparent 1px), linear-gradient(90deg, #f1f5f9 1px, transparent 1px);
            background-size: 20px 20px; background-position: center; border-radius: 20px;
        }
        .axis-x { position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: #cbd5e1; pointer-events: none; }
        .axis-y { position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: #cbd5e1; pointer-events: none; }

        /* 포털 & 섹션 */
        #main-menu { position: fixed; inset: 0; background: white; z-index: 500; display: flex; flex-direction: column; overflow-y: auto; }
        .section-view { position: fixed; inset: 0; background: white; z-index: 600; padding: 50px; display: none; overflow-y: auto; }
        
        /* 에디터 UI */
        .sidebar { width: 380px; background: white; border-right: 1px solid var(--z-border); display: flex; flex-direction: column; }
        .tab { padding: 0 25px; height: 50px; display: flex; align-items: center; font-weight: 800; font-size: 13px; color: #94a3b8; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--z-blue); border-bottom-color: var(--z-blue); }
        .status-input { background: var(--z-bg); border: none; padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; width: 100%; outline: none; }
        #blocklyDiv { flex: 1; width: 100%; }
        
        #painter-view { background: white; z-index: 10; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="h-screen flex flex-col">
    <section id="auth-overlay" class="fixed inset-0 bg-slate-50 z-[1000] flex items-center justify-center">
        <div class="bg-white p-12 rounded-[50px] shadow-2xl w-full max-w-[380px] text-center">
            <h2 class="text-3xl font-black mb-8 grad-text italic">지존 입장</h2>
            <input id="z-id" type="text" placeholder="아이디" class="w-full bg-slate-50 p-4 rounded-xl mb-4 outline-none font-bold">
            <input id="z-pw" type="password" placeholder="비번" class="w-full bg-slate-50 p-4 rounded-xl mb-6 outline-none font-bold">
            <button onclick="zLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg">시작하기</button>
            <button onclick="zJoin()" class="mt-4 text-slate-400 text-xs font-bold">회원가입</button>
        </div>
    </section>

    <section id="main-menu" class="hidden">
        <nav class="flex justify-between p-8"><div class="text-2xl font-black italic grad-text">지존짱짱 SUPREME</div><button onclick="zLogout()" class="text-xs font-bold text-red-400">로그아웃</button></nav>
        <div class="flex flex-col items-center justify-center flex-1">
            <h1 id="portal-user" class="text-6xl font-black mb-12">Hello, Supreme!</h1>
            <div class="grid grid-cols-2 gap-6 w-full max-w-2xl px-12">
                <div onclick="startProject()" class="bg-blue-600 p-10 rounded-[40px] text-center hover:shadow-2xl cursor-pointer group">
                    <div class="text-5xl mb-4">🚀</div><h3 class="font-black text-xl text-white">새 작품 만들기</h3>
                </div>
                <div onclick="loadMyPage()" class="bg-slate-50 p-10 rounded-[40px] text-center hover:bg-white border-2 border-transparent hover:border-blue-500 cursor-pointer">
                    <div class="text-5xl mb-4">👤</div><h3 class="font-black text-xl">마이페이지</h3>
                </div>
            </div>
        </div>
    </section>

    <header id="editor-header" class="hidden h-[60px] bg-white border-b px-6 flex justify-between items-center">
        <button onclick="goHome()" class="font-black italic text-xl grad-text">지존짱짱 SUPREME</button>
        <button onclick="saveProject()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-black text-sm">작품 저장</button>
    </header>

    <main id="editor-view" class="hidden flex-1 flex overflow-hidden">
        <aside class="sidebar">
            <div class="p-6">
                <div id="stage-canvas" class="border">
                    <div class="axis-x"></div><div class="axis-y"></div>
                    <div id="sprite-layer"></div>
                </div>
            </div>
            <div class="flex justify-center -mt-4 mb-4">
                <button id="toggleBtn" onclick="togglePlay()" class="bg-white shadow-xl border text-blue-600 font-black px-8 py-2 rounded-full">▶ 시작</button>
            </div>
            <div class="obj-panel px-6 flex-1 overflow-y-auto">
                <div class="flex justify-between items-center mb-4"><span class="text-[10px] font-black text-slate-400">OBJECTS</span><button onclick="createNewObj()" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-[10px] font-black">+ 추가</button></div>
                <div id="obj-list-container"></div>
                <div id="inspector" class="bg-slate-50 p-4 rounded-2xl mt-4 hidden">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="col-span-2"><input id="ins-name" oninput="updateIns()" class="status-input" placeholder="이름"></div>
                        <input id="ins-x" oninput="updateIns()" class="status-input" type="number" placeholder="X">
                        <input id="ins-y" oninput="updateIns()" class="status-input" type="number" placeholder="Y">
                    </div>
                </div>
            </div>
        </aside>

        <div class="flex-1 flex flex-col relative">
            <div class="tabs flex bg-white border-b">
                <div id="tab-p" onclick="switchTab('p')" class="tab active">모양 그리기</div>
                <div id="tab-b" onclick="switchTab('b')" class="tab">블록 조립소</div>
            </div>
            
            <div id="blocklyDiv" style="display:none;"></div>
            
            <div id="painter-view" class="flex-1 flex">
                <div class="flex flex-col items-center justify-center h-full w-full bg-slate-50">
                    <canvas id="drawing-pad" width="400" height="400" class="bg-white rounded-[40px] shadow-2xl border-4 border-white"></canvas>
                    <div class="mt-8 flex gap-4">
                        <input type="color" id="brush-color" value="#4f80ff" class="w-12 h-12 rounded-xl cursor-pointer">
                        <button onclick="clearPad()" class="px-8 py-3 bg-white rounded-xl font-black text-slate-400 border">지우기</button>
                        <button onclick="applyCostume()" class="px-12 py-3 bg-blue-600 text-white rounded-xl font-black shadow-lg">모양 적용하기</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<xml id="toolbox" style="display:none">
    <category name="시작" colour="#33b233">
        <block type="on_start"></block>
    </category>
    <category name="흐름" colour="#ccb233">
        <block type="wait_sec"></block>
        <block type="forever_loop"></block>
        <block type="controls_if"></block>
    </category>
    <category name="움직임" colour="#33b2cc">
        <block type="move_x"></block>
        <block type="turn_r"></block>
        <block type="go_xy"></block>
    </category>
    <category name="생김새" colour="#cc33cc">
        <block type="say_it"></block>
        <block type="change_size"></block>
    </category>
    <category name="연산" colour="#52b7ff">
        <block type="math_arithmetic"></block>
        <block type="logic_compare"></block>
        <block type="logic_operation"></block>
        <block type="math_random_int"><value name="FROM"><block type="math_number"><field name="NUM">1</field></block></value><value name="TO"><block type="math_number"><field name="NUM">10</field></block></value></block>
    </category>
    <category name="자료" colour="#ff8b3d" custom="VARIABLE"></category>
</xml>

<script>
/** [지존 V15.6 - 그리기 우선 & 전체 코드 복구] */
const conf = { apiKey: "AIzaSyDdFsRGy_2mZowYinOf9LeQhot08xyaqc4", authDomain: "zizon-coding.firebaseapp.com", databaseURL: "https://zizon-coding-default-rtdb.firebaseio.com" };
firebase.initializeApp(conf);
const db = firebase.database(), auth = firebase.auth();

let ws = null, objs = [], sid = null, isRunning = false, user = null;

// [블록 정의]
Blockly.Blocks['on_start'] = { init: function() { this.appendDummyInput().appendField("▶ 시작했을 때"); this.setNextStatement(true); this.setColour("#33b233"); }};
Blockly.Blocks['move_x'] = { init: function() { this.appendDummyInput().appendField("앞으로 10 만큼 이동"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['turn_r'] = { init: function() { this.appendDummyInput().appendField("오른쪽으로 15 도 회전"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['go_xy'] = { init: function() { this.appendDummyInput().appendField("X:").appendField(new Blockly.FieldTextInput("0"),"X").appendField("Y:").appendField(new Blockly.FieldTextInput("0"),"Y").appendField("로 이동"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['say_it'] = { init: function() { this.appendDummyInput().appendField(new Blockly.FieldTextInput("안녕!"),"TEXT").appendField("말하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#cc33cc"); }};
Blockly.Blocks['wait_sec'] = { init: function() { this.appendDummyInput().appendField(new Blockly.FieldTextInput("1"),"SEC").appendField("초 기다리기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ccb233"); }};
Blockly.Blocks['forever_loop'] = { init: function() { this.appendDummyInput().appendField("무한 반복"); this.appendStatementInput("DO"); this.setPreviousStatement(true); this.setColour("#ccb233"); }};
Blockly.Blocks['change_size'] = { init: function() { this.appendDummyInput().appendField("크기를 10 만큼 바꾸기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#cc33cc"); }};

function startProject() { 
    document.getElementById('main-menu').classList.add('hidden'); 
    document.getElementById('editor-view').classList.remove('hidden'); 
    document.getElementById('editor-header').classList.remove('hidden');
    
    if(!ws) {
        ws = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox'), renderer: 'zelos' });
        createNewObj();
    }
    // [핵심] 시작하자마자 모양 그리기 탭 활성화
    switchTab('p');
}

function switchTab(m) {
    const isP = m === 'p';
    document.getElementById('painter-view').style.display = isP ? 'flex' : 'none';
    document.getElementById('blocklyDiv').style.display = isP ? 'none' : 'block';
    document.getElementById('tab-p').classList.toggle('active', isP);
    document.getElementById('tab-b').classList.toggle('active', !isP);
    if(!isP) setTimeout(() => Blockly.svgResize(ws), 50);
}

// [그리기 로직]
const canvas = document.getElementById('drawing-pad'), ctx = canvas.getContext('2d');
let drawing = false;
canvas.onmousedown = (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); };
canvas.onmousemove = (e) => { if(drawing) { ctx.lineWidth=8; ctx.lineCap='round'; ctx.strokeStyle=document.getElementById('brush-color').value; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); }};
canvas.onmouseup = () => drawing = false;
function clearPad() { ctx.clearRect(0,0,400,400); }
function applyCostume() {
    const t = objs.find(o => o.id === sid);
    if(t) t.costume = canvas.toDataURL();
    renderStage(); 
    alert("모양이 적용되었습니다! 블록 조립소에서 코딩을 시작하세요.");
}

// [그 외 기능 - 좌표계 및 오브젝트]
const getX = (x) => 200 + parseInt(x);
const getY = (y) => 150 - parseInt(y);

function renderStage() {
    document.getElementById('sprite-layer').innerHTML = objs.map(o => `
        <div style="position:absolute; left:${getX(o.x)}px; top:${getY(o.y)}px; transform:translate(-50%,-50%) rotate(${o.rot}deg) scale(${o.size/100});">
            ${o.costume ? `<img src="${o.costume}" style="width:80px; height:80px;">` : '<div class="w-12 h-12 bg-blue-600 rounded-2xl"></div>'}
        </div>
    `).join('');
}

function createNewObj() {
    const id = "z_" + Date.now();
    objs.push({ id, name: "오브젝트 "+(objs.length+1), x: 0, y: 0, rot: 0, size: 100, xml: "", costume: null });
    updateObjUI(); selectObj(id);
}

function selectObj(id) {
    sid = id; const t = objs.find(o => o.id === id);
    document.getElementById('inspector').classList.remove('hidden');
    document.getElementById('ins-name').value = t.name;
    document.getElementById('ins-x').value = t.x;
    document.getElementById('ins-y').value = t.y;
    updateObjUI(); renderStage();
}

function updateObjUI() {
    document.getElementById('obj-list-container').innerHTML = objs.map(o => `
        <div onclick="selectObj('${o.id}')" class="p-3 mb-2 bg-slate-50 rounded-xl flex items-center gap-3 border-2 ${o.id === sid ? 'border-blue-500 bg-white' : 'border-transparent'} cursor-pointer">
            <div class="w-6 h-6 rounded bg-white flex items-center justify-center text-[10px]">${o.costume ? '🖼️' : '🔹'}</div>
            <span class="text-[10px] font-black">${o.name}</span>
        </div>`).join('');
}

// [인증 및 공통 (기존 코드 유지)]
auth.onAuthStateChanged(async u => {
    if(u) {
        const s = await db.ref('users/'+u.uid).once('value');
        user = { uid: u.uid, nickname: s.val()?.nickname || "지존" };
        document.getElementById('portal-user').innerText = user.nickname + " 님 환영합니다";
        document.getElementById('auth-overlay').classList.add('hidden');
        document.getElementById('main-menu').classList.remove('hidden');
    }
});
function zLogin() { auth.signInWithEmailAndPassword(document.getElementById('z-id').value+"@z.com", document.getElementById('z-pw').value); }
function zLogout() { auth.signOut().then(()=>location.reload()); }
function goHome() { document.getElementById('main-menu').classList.remove('hidden'); document.getElementById('editor-view').classList.add('hidden'); document.getElementById('editor-header').classList.add('hidden'); }
</script>
</body>
</html>
