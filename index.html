<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 코딩사이트 - 리턴즈</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --zizon-primary: #4f80ff;
            --zizon-bg: #f4f7ff;
            --zizon-border: #e2e8f0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--zizon-bg);
            margin: 0;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        /* 헤더 스타일 */
        .zizon-header {
            height: 70px;
            background: white;
            border-bottom: 1px solid var(--zizon-border);
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 900;
            font-style: italic;
            background: linear-gradient(135deg, #4f80ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 메인 레이아웃 */
        .main-container {
            display: flex;
            height: calc(100vh - 70px);
        }

        /* 왼쪽 스테이지 & 리스트 */
        .sidebar {
            width: 420px;
            background: white;
            border-right: 1px solid var(--zizon-border);
            display: flex;
            flex-direction: column;
        }

        #stage-wrap {
            height: 340px;
            background: #fff;
            border-bottom: 4px solid var(--zizon-bg);
            position: relative;
        }

        #stage-canvas {
            width: 100%;
            height: 100%;
            background-image: linear-gradient(var(--zizon-bg) 1.5px, transparent 1.5px), linear-gradient(90deg, var(--zizon-bg) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            position: relative;
        }

        .control-bar {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.9);
            padding: 8px 16px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* 오브젝트 리스트 */
        .object-manager { flex: 1; overflow-y: auto; background: var(--zizon-bg); padding: 20px; }
        .obj-item {
            background: white;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .obj-item.active { border-color: var(--zizon-primary); }

        /* 오른쪽 에디터 */
        .editor-wrap { flex: 1; display: flex; flex-direction: column; position: relative; }
        .editor-tabs { height: 60px; background: white; display: flex; border-bottom: 1px solid var(--zizon-border); }
        .tab-item { padding: 0 30px; display: flex; align-items: center; font-weight: 800; color: #94a3b8; cursor: pointer; border-bottom: 4px solid transparent; }
        .tab-item.active { color: var(--zizon-primary); border-bottom-color: var(--zizon-primary); }

        #blocklyDiv { flex: 1; }

        /* 화방(그림판) 오버레이 */
        #painter {
            position: absolute;
            inset: 0;
            background: white;
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .bubble {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 8px 15px;
            border-radius: 12px;
            border: 2px solid var(--zizon-primary);
            font-weight: 800;
            font-size: 13px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="h-screen flex flex-col">
    <header id="main-header" class="zizon-header hidden">
        <div class="flex items-center gap-10">
            <h1 class="logo-text cursor-pointer" onclick="location.reload()">지존짱짱</h1>
            <nav class="flex gap-6">
                <button onclick="changePage('editor')" class="text-sm font-black text-blue-500">워크스페이스</button>
            </nav>
        </div>
        <div class="flex items-center gap-5">
            <div id="user-display" class="text-xs font-black text-blue-600 bg-blue-50 px-4 py-2 rounded-xl border border-blue-100">Loading...</div>
            <button onclick="zLogout()" class="text-[10px] font-bold text-slate-300 hover:text-red-500">LOGOUT</button>
        </div>
    </header>

    <main class="flex-grow relative">
        <section id="view-auth" class="absolute inset-0 flex items-center justify-center bg-slate-50">
            <div class="bg-white p-16 rounded-[50px] shadow-2xl w-full max-w-[400px] text-center">
                <h2 class="text-4xl font-black italic mb-10">지존 입장</h2>
                <input id="auth-id" type="text" placeholder="아이디" class="w-full bg-slate-50 p-4 rounded-2xl mb-4 outline-none border-2 border-transparent focus:border-blue-400 font-bold">
                <input id="auth-pw" type="password" placeholder="비밀번호" class="w-full bg-slate-50 p-4 rounded-2xl mb-6 outline-none border-2 border-transparent focus:border-blue-400 font-bold">
                <button onclick="zLogin()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg">들어가기</button>
                <button onclick="zJoin()" class="mt-6 text-slate-400 text-xs font-bold hover:underline">신규 지존 등록</button>
            </div>
        </section>

        <section id="view-editor" class="hidden absolute inset-0 main-container">
            <aside class="sidebar">
                <div id="stage-wrap">
                    <div id="stage-canvas">
                        <div id="actor-layer"></div>
                    </div>
                    <div class="control-bar">
                        <button onclick="runEngine()" class="text-blue-600 font-black text-sm px-4">▶ 시작</button>
                        <button onclick="stopEngine()" class="text-red-500 font-black text-sm px-4">■ 정지</button>
                    </div>
                </div>
                <div class="object-manager">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-black text-slate-400 uppercase">Objects</span>
                        <button onclick="addObj()" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-[10px] font-black">+ 추가</button>
                    </div>
                    <div id="obj-list-scroll"></div>
                </div>
            </aside>

            <div class="editor-wrap">
                <div class="editor-tabs">
                    <div id="tab-block" onclick="setMode('block')" class="tab-item active">블록 조립소</div>
                    <div id="tab-paint" onclick="setMode('paint')" class="tab-item">지존 화방(모양)</div>
                </div>
                <div id="blocklyDiv"></div>
                
                <div id="painter">
                    <canvas id="paint-canvas" width="400" height="400" class="bg-slate-50 rounded-3xl border-2 border-slate-200"></canvas>
                    <div class="mt-8 flex gap-4">
                        <input type="color" id="p-color" value="#4f80ff" class="w-12 h-12 rounded-lg cursor-pointer">
                        <button onclick="savePaint()" class="bg-blue-600 text-white px-10 py-3 rounded-2xl font-black">이 모양 적용</button>
                        <button onclick="setMode('block')" class="text-slate-400 font-bold px-4">취소</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<xml id="toolbox" style="display:none">
    <category name="시작" colour="#33b233"><block type="on_start"></block></category>
    <category name="움직임" colour="#33b2cc">
        <block type="move_steps"><value name="V"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="turn_deg"><value name="V"><block type="math_number"><field name="NUM">15</field></block></value></block>
    </category>
    <category name="생김새" colour="#cc33cc">
        <block type="say_msg"><value name="V"><block type="text"><field name="TEXT">안녕!</field></block></value></block>
    </category>
    <category name="흐름" colour="#ccb233">
        <block type="wait_sec"><value name="V"><block type="math_number"><field name="NUM">1</field></block></value></block>
        <block type="forever"></block>
    </category>
</xml>

<script>
// [1. 블록 설정]
Blockly.Blocks['on_start'] = { init: function() { this.appendDummyInput().appendField("▶ 시작했을 때"); this.setNextStatement(true); this.setColour("#33b233"); }};
Blockly.Blocks['move_steps'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField("앞으로"); this.appendDummyInput().appendField("만큼 이동"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['turn_deg'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField("오른쪽으로"); this.appendDummyInput().appendField("도 회전"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); }};
Blockly.Blocks['say_msg'] = { init: function() { this.appendValueInput("V").setCheck("String").appendField(""); this.appendDummyInput().appendField("말하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#cc33cc"); }};
Blockly.Blocks['wait_sec'] = { init: function() { this.appendValueInput("V").setCheck("Number").appendField(""); this.appendDummyInput().appendField("초 기다리기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#ccb233"); }};
Blockly.Blocks['forever'] = { init: function() { this.appendDummyInput().appendField("무한 반복"); this.appendStatementInput("DO"); this.setPreviousStatement(true); this.setColour("#ccb233"); }};

const G = javascript.javascriptGenerator;
G.forBlock['on_start'] = () => '//start\n';
G.forBlock['move_steps'] = (b, g) => `move(${g.valueToCode(b, 'V', G.Order.ATOMIC) || 0});\n`;
G.forBlock['turn_deg'] = (b, g) => `turn(${g.valueToCode(b, 'V', G.Order.ATOMIC) || 0});\n`;
G.forBlock['say_msg'] = (b, g) => `say(${g.valueToCode(b, 'V', G.Order.ATOMIC) || "''"});\n`;
G.forBlock['wait_sec'] = (b, g) => `await wait(${g.valueToCode(b, 'V', G.Order.ATOMIC) || 0});\n`;
G.forBlock['forever'] = (b, g) => `while(isRunning){${g.statementToCode(b, 'DO')} await wait(0.01);}\n`;

// [2. 초기화 & Firebase]
const config = { apiKey: "AIzaSyDdFsRGy_2mZowYinOf9LeQhot08xyaqc4", authDomain: "zizon-coding.firebaseapp.com", databaseURL: "https://zizon-coding-default-rtdb.firebaseio.com" };
firebase.initializeApp(config);
const db = firebase.database(), auth = firebase.auth();

let ws = null, objs = [], sid = null, isRunning = false;

function initWS() {
    if(ws) return;
    ws = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox'), renderer: 'zelos' });
    addObj();
}

function addObj() {
    const id = "z_" + Date.now();
    objs.push({ id, name: "오브젝트"+(objs.length+1), x: 200, y: 170, rot: 0, xml: "", say: "", costume: null });
    select(id);
}

function select(id) {
    if(sid && ws) {
        const p = objs.find(o => o.id === sid);
        if(p) p.xml = Blockly.Xml.domToText(Blockly.Xml.workspaceToDom(ws));
    }
    sid = id;
    const t = objs.find(o => o.id === id);
    Blockly.Events.disable();
    ws.clear();
    if(t.xml) Blockly.Xml.domToWorkspace(Blockly.Xml.textToDom(t.xml), ws);
    Blockly.Events.enable();
    updateUI();
    render();
}

function updateUI() {
    document.getElementById('obj-list-scroll').innerHTML = objs.map(o => `
        <div onclick="select('${o.id}')" class="obj-item ${o.id === sid ? 'active' : ''}">
            <span class="font-black text-sm">${o.name}</span>
            <button onclick="event.stopPropagation(); objs=objs.filter(x=>x.id!=='${o.id}'); select(objs[0].id)" class="text-slate-300">×</button>
        </div>
    `).join('');
}

function render() {
    document.getElementById('actor-layer').innerHTML = objs.map(o => `
        <div style="position:absolute; left:${o.x}px; top:${o.y}px; transform:translate(-50%,-50%) rotate(${o.rot}deg);">
            ${o.say ? `<div class="bubble">${o.say}</div>` : ''}
            ${o.costume ? `<img src="${o.costume}" style="width:60px; height:60px;">` : `<div class="w-12 h-12 bg-blue-500 rounded-xl shadow-lg"></div>`}
        </div>
    `).join('');
}

async function runEngine() {
    isRunning = true;
    for(const o of objs) {
        select(o.id);
        const code = G.workspaceToCode(ws);
        const f = new Function('wait', 'move', 'turn', 'say', 'isRunning', `(async()=>{ ${code} })()`);
        f(
            (s) => new Promise(r => setTimeout(r, s*1000)),
            (v) => { const r=o.rot*Math.PI/180; o.x+=v*Math.cos(r); o.y+=v*Math.sin(r); render(); },
            (v) => { o.rot+=v; render(); },
            (v) => { o.say=v; render(); setTimeout(()=>{o.say=""; render();}, 2000); },
            isRunning
        );
    }
}

function stopEngine() { isRunning = false; objs.forEach(o=>{o.x=200; o.y=170; o.rot=0; o.say="";}); render(); }

function setMode(m) {
    const isB = m === 'block';
    document.getElementById('blocklyDiv').style.display = isB ? 'block' : 'none';
    document.getElementById('painter').style.display = isB ? 'none' : 'flex';
    document.getElementById('tab-block').classList.toggle('active', isB);
    document.getElementById('tab-paint').classList.toggle('active', !isB);
}

function savePaint() {
    const canvas = document.getElementById('paint-canvas');
    const t = objs.find(o => o.id === sid);
    if(t) t.costume = canvas.toDataURL();
    render();
    setMode('block');
}

// [3. 인증 로직]
function zLogin() {
    const id = document.getElementById('auth-id').value, pw = document.getElementById('auth-pw').value;
    auth.signInWithEmailAndPassword(id+"@zizon.com", pw).catch(()=>alert("실패"));
}

function zJoin() {
    const id = prompt("아이디"), pw = prompt("비번"), nk = prompt("닉네임");
    if(id && pw && nk) auth.createUserWithEmailAndPassword(id+"@zizon.com", pw).then(r=>db.ref('users/'+r.user.uid).set({nickname:nk}));
}

function zLogout() { auth.signOut().then(()=>location.reload()); }

auth.onAuthStateChanged(async u => {
    if(u) {
        const s = await db.ref('users/'+u.uid).once('value');
        document.getElementById('user-display').innerText = (s.val()?.nickname || "지존") + " 님";
        document.getElementById('main-header').classList.remove('hidden');
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('view-editor').classList.remove('hidden');
        initWS();
    } else {
        document.getElementById('view-auth').classList.remove('hidden');
    }
});
</script>
</body>
</html>
