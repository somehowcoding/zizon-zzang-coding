<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 - Made by 어쩌다코딩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
        #createView { display: flex; height: calc(100vh - 64px); width: 100vw; gap: 0; }
        .left-panel { flex: 1; display: flex; flex-direction: column; border-right: 2px solid #e2e8f0; background: white; }
        #canvasArea { height: 45%; background: #ffffff; position: relative; border-bottom: 2px solid #e2e8f0; overflow: hidden; }
        #blocklyDiv { flex: 1; width: 100%; }
        .right-panel { width: 350px; background: #f8fafc; display: flex; flex-direction: column; padding: 15px; gap: 15px; overflow-y: auto; }
        .status-panel { background: white; border-radius: 20px; padding: 15px; border: 1px solid #e2e8f0; }
        .status-input { width: 100%; background: #f1f5f9; border: 1px solid #ddd; border-radius: 6px; padding: 4px; text-align: center; font-weight: bold; }
        .obj-box { background: white; border-radius: 20px; padding: 15px; border: 1px solid #e2e8f0; flex-grow: 1; display: flex; flex-direction: column; }
        .obj-card { cursor: pointer; padding: 10px; border-radius: 12px; border: 2px solid transparent; background: #f1f5f9; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .obj-card.active { border-color: #3b82f6; background: #eff6ff; }
        .game-obj { position: absolute; transform: translate(-50%, -50%); transition: 0.1s; display: flex; align-items: center; justify-content: center; background: #3b82f6; color: white; border-radius: 8px; font-size: 12px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .login-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    </style>
</head>
<body>

<nav id="topNav" class="bg-white border-b px-6 py-3 flex justify-between items-center hidden h-16">
    <div class="text-xl font-black text-blue-600 italic cursor-pointer" onclick="showSection('main')">지존짱짱 🚀</div>
    <div class="flex items-center gap-6 font-bold text-slate-600">
        <button onclick="showSection('main')">갤러리</button>
        <button onclick="showSection('create')">만들기</button>
        <button onclick="showSection('story')">이야기</button>
        <span id="userNick" class="text-sm text-blue-500 ml-4"></span>
        <button id="logoutBtn" class="text-xs text-red-500 underline ml-2">로그아웃</button>
    </div>
</nav>

<div id="authBox" class="min-h-screen flex items-center justify-center bg-slate-100">
    <div class="login-card">
        <div class="text-center mb-8"><h2 class="text-3xl font-black text-slate-800">지존짱짱 👋</h2><p class="text-xs text-blue-500 font-bold mt-1 uppercase">Made by 어쩌다코딩</p></div>
        <div id="loginView">
            <input id="loginId" type="text" placeholder="아이디" class="w-full bg-slate-50 border-2 p-3 rounded-xl mb-3 outline-none">
            <input id="loginPw" type="password" placeholder="비밀번호" class="w-full bg-slate-50 border-2 p-3 rounded-xl mb-4 outline-none">
            <button id="doLoginBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black">로그인</button>
            <button id="goSignupBtn" class="w-full text-slate-400 text-sm font-bold underline mt-4">회원가입 하기</button>
        </div>
        <div id="signupView" class="hidden">
            <input id="regId" type="text" placeholder="아이디" class="w-full bg-slate-50 border-2 p-3 rounded-xl mb-3 outline-none">
            <input id="regNick" type="text" placeholder="닉네임" class="w-full bg-slate-50 border-2 p-3 rounded-xl mb-3 outline-none">
            <input id="regPw" type="password" placeholder="비밀번호 (6자 이상)" class="w-full bg-slate-50 border-2 p-3 rounded-xl mb-4 outline-none">
            <button id="doSignupBtn" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black">가입 완료</button>
            <button id="goLoginBtn" class="w-full text-slate-400 text-sm font-bold underline mt-4">이미 계정이 있어요</button>
        </div>
    </div>
</div>

<main id="mainView" class="hidden p-8 overflow-y-auto h-screen">
    <h1 class="text-3xl font-black text-slate-800 mb-10">모두의 작품 🌍</h1>
    <div id="workList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</main>

<section id="createView" class="hidden">
    <div class="left-panel">
        <div id="canvasArea">
            <div class="absolute top-4 left-4 flex gap-2 z-10">
                <button onclick="playProject()" class="bg-green-500 text-white px-5 py-2 rounded-xl font-black shadow-lg">▶ 시작하기</button>
                <button onclick="stopProject()" class="bg-red-500 text-white px-5 py-2 rounded-xl font-black shadow-lg">■ 정지하기</button>
            </div>
            <div id="screen" class="w-full h-full relative bg-white"></div>
        </div>
        <div id="blocklyDiv"></div>
    </div>
    <div class="right-panel">
        <div class="bg-blue-600 p-4 rounded-2xl text-white text-center font-black shadow-md">오브젝트 설정</div>
        <div id="statusPanel" class="status-panel shadow-sm">
            <div class="grid grid-cols-2 gap-3 text-xs font-bold text-slate-500">
                <div>X좌표 <input type="number" id="stX" class="status-input" onchange="updateObjStatus()"></div>
                <div>Y좌표 <input type="number" id="stY" class="status-input" onchange="updateObjStatus()"></div>
                <div>크기 <input type="number" id="stSize" class="status-input" onchange="updateObjStatus()"></div>
                <div>방향(도) <input type="number" id="stDir" class="status-input" onchange="updateObjStatus()"></div>
            </div>
        </div>
        <div class="obj-box shadow-sm">
            <div class="flex justify-between items-center mb-4"><span class="font-black text-slate-700">목록</span><button onclick="addObj()" class="bg-blue-500 text-white text-xs px-4 py-1.5 rounded-full font-bold">+ 추가</button></div>
            <div id="objList" class="flex-grow overflow-y-auto h-40"></div>
        </div>
        <div class="bg-white p-4 rounded-2xl border border-slate-100">
            <input id="workTitle" type="text" placeholder="작품 이름" class="w-full p-2 border-b-2 outline-none font-bold mb-3">
            <button id="saveWorkBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black">갤러리에 저장</button>
        </div>
    </div>
</section>

<section id="storyView" class="hidden p-8 max-w-4xl mx-auto w-full overflow-y-auto h-screen">
    <h1 class="text-3xl font-black mb-8 text-slate-800">이야기 게시판 💬</h1>
    <div class="bg-white p-6 rounded-3xl shadow-sm mb-8 border border-slate-100">
        <textarea id="storyInput" placeholder="새로운 소식을 들려주세요!" class="w-full h-24 p-4 bg-slate-50 rounded-xl outline-none resize-none mb-3 font-bold"></textarea>
        <button id="postStoryBtn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black">글 올리기</button>
    </div>
    <div id="storyList" class="space-y-4 pb-20"></div>
</section>

<xml id="toolbox" style="display: none">
    <category name="시작" colour="#33b233"><block type="when_run"></block></category>
    <category name="움직임" colour="#33b2cc">
        <block type="move_x"><value name="VAL"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="move_y"><value name="VAL"><block type="math_number"><field name="NUM">10</field></block></value></block>
    </category>
    <category name="흐름" colour="#ccb233"><block type="controls_repeat_ext"></block><block type="controls_if"></block></category>
    <category name="변수" colour="#cc3333" custom="VARIABLE"></category>
    <category name="계산" colour="#3333cc"><block type="math_number"></block><block type="math_arithmetic"></block></category>
</xml>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDdFsRGy_2mZowYinOf9LeQhot08xyaqc4",
    authDomain: "zizon-coding.firebaseapp.com",
    projectId: "zizon-coding",
    databaseURL: "https://zizon-coding-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser = null, workspace = null, objects = [], selectedId = null;

// 한글 블록 정의
Blockly.Blocks['when_run'] = { init: function() { this.appendDummyInput().appendField("▶ 시작하기를 클릭했을 때"); this.setNextStatement(true); this.setColour("#33b233"); } };
Blockly.Blocks['move_x'] = { init: function() { this.appendValueInput("VAL").setCheck("Number").appendField("x좌표를"); this.appendDummyInput().appendField("만큼 이동하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); } };
Blockly.Blocks['move_y'] = { init: function() { this.appendValueInput("VAL").setCheck("Number").appendField("y좌표를"); this.appendDummyInput().appendField("만큼 이동하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); } };
Blockly.Msg["CONTROLS_REPEAT_TITLE"] = "%1번 반복하기";
Blockly.Msg["CONTROLS_IF_MSG_IF"] = "만약";

function showSection(name) {
    ['mainView', 'createView', 'storyView'].forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById(name + 'View').classList.remove('hidden');
    if(name === 'create' && !workspace) {
        workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox') });
        if(objects.length === 0) addObj();
    }
    if(name === 'main') loadWorks();
    if(name === 'story') loadStories();
}

function addObj() {
    const id = Date.now();
    objects.push({ id, name: "오브젝트"+(objects.length+1), x: 100, y: 100, size: 60, dir: 90, defX: 100, defY: 100 });
    render(); selectObj(id);
}

function selectObj(id) {
    selectedId = id; const o = objects.find(obj => obj.id === id); if(!o) return;
    document.getElementById('stX').value = o.x; document.getElementById('stY').value = o.y;
    document.getElementById('stSize').value = o.size; document.getElementById('stDir').value = o.dir;
    render();
}

function updateObjStatus() {
    const o = objects.find(obj => obj.id === selectedId); if(!o) return;
    o.x = Number(document.getElementById('stX').value); o.y = Number(document.getElementById('stY').value);
    o.size = Number(document.getElementById('stSize').value); o.dir = Number(document.getElementById('stDir').value);
    o.defX = o.x; o.defY = o.y; render();
}

function render() {
    const screen = document.getElementById('screen'), list = document.getElementById('objList');
    screen.innerHTML = ''; list.innerHTML = '';
    objects.forEach(o => {
        const div = document.createElement('div');
        div.className = 'game-obj';
        div.style.left = o.x + 'px'; div.style.top = o.y + 'px';
        div.style.width = o.size + 'px'; div.style.height = o.size + 'px';
        div.style.transform = `translate(-50%, -50%) rotate(${o.dir - 90}deg)`;
        div.innerText = o.name; screen.appendChild(div);

        const card = document.createElement('div');
        card.className = `obj-card ${o.id === selectedId ? 'active' : ''}`;
        card.onclick = () => selectObj(o.id);
        card.innerHTML = `<span class="font-bold text-slate-700">🖼️ ${o.name}</span><button onclick="deleteObj(${o.id})" class="text-red-400 font-bold text-xs">삭제</button>`;
        list.appendChild(card);
    });
}

function deleteObj(id) {
    objects = objects.filter(o => o.id !== id);
    selectedId = objects.length > 0 ? objects[0].id : null;
    render();
}

function playProject() { alert("프로그램이 실행됩니다!"); }
function stopProject() {
    objects.forEach(o => { o.x = o.defX; o.y = o.defY; });
    render(); if(selectedId) selectObj(selectedId);
}

function loadWorks() {
    db.ref('works').on('value', snap => {
        const list = document.getElementById('workList'); list.innerHTML = ''; if(!snap.val()) return;
        Object.entries(snap.val()).reverse().forEach(([key, w]) => {
            const isStaff = w.isStaff ? `<span class="bg-yellow-400 text-white text-[10px] px-2 py-1 rounded-full ml-2">⭐ 스선</span>` : '';
            const staffBtn = (currentUser && currentUser.nickname === '어쩌다코딩') ? `<button onclick="db.ref('works/${key}/isStaff').set(${!w.isStaff})" class="text-[10px] text-blue-500 ml-2 font-bold">[스선전환]</button>` : '';
            list.innerHTML += `<div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm"><h3 class="font-black text-xl mb-2">${w.title}${isStaff}</h3><p class="text-xs font-bold text-slate-400">By ${w.nickname}${staffBtn}</p></div>`;
        });
    });
}

function loadStories() {
    db.ref('stories').on('value', snap => {
        const list = document.getElementById('storyList'); list.innerHTML = ''; if(!snap.val()) return;
        Object.entries(snap.val()).reverse().forEach(([key, s]) => {
            const delBtn = (currentUser && currentUser.nickname === '어쩌다코딩') ? `<button onclick="db.ref('stories/${key}').remove()" class="text-red-400 text-xs ml-2 font-bold">[삭제]</button>` : '';
            list.innerHTML += `<div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm"><p class="text-xs font-black text-blue-600 mb-1">${s.nickname}${delBtn}</p><p class="text-slate-700 font-medium">${s.text}</p></div>`;
        });
    });
}

// 인증 및 저장 로직
document.getElementById("goSignupBtn").onclick = () => { document.getElementById("loginView").classList.add("hidden"); document.getElementById("signupView").classList.remove("hidden"); };
document.getElementById("goLoginBtn").onclick = () => { document.getElementById("signupView").classList.add("hidden"); document.getElementById("loginView").classList.remove("hidden"); };
document.getElementById("doLoginBtn").onclick = () => auth.signInWithEmailAndPassword(document.getElementById('loginId').value.trim() + "@zizon.com", document.getElementById('loginPw').value.trim()).catch(()=>alert("실패!"));
document.getElementById("doSignupBtn").onclick = async () => {
    const id = document.getElementById('regId').value.trim(), nick = document.getElementById('regNick').value.trim(), pw = document.getElementById('regPw').value.trim();
    const res = await auth.createUserWithEmailAndPassword(id + "@zizon.com", pw);
    await db.ref('users/' + res.user.uid).set({ id, nickname: nick }); location.reload();
};
document.getElementById("postStoryBtn").onclick = async () => {
    const text = document.getElementById('storyInput').value.trim(); if(!text || !currentUser) return;
    await db.ref('stories').push({ text, nickname: currentUser.nickname, time: Date.now() }); document.getElementById('storyInput').value = '';
};
document.getElementById("saveWorkBtn").onclick = async () => {
    if(!currentUser) return;
    const xml = Blockly.Xml.workspaceToDom(workspace);
    await db.ref('works').push({ title: document.getElementById('workTitle').value || "무제", code: Blockly.Xml.domToText(xml), nickname: currentUser.nickname, isStaff: false });
    alert("저장 완료!"); showSection('main');
};
document.getElementById("logoutBtn").onclick = () => auth.signOut().then(() => location.reload());

auth.onAuthStateChanged(async user => {
    if(user) {
        const snap = await db.ref('users/' + user.uid).once('value'); currentUser = snap.val();
        if(currentUser) { 
            document.getElementById('authBox').classList.add('hidden'); document.getElementById('topNav').classList.remove('hidden'); 
            document.getElementById('userNick').innerText = currentUser.nickname + (currentUser.nickname === '어쩌다코딩' ? ' (관리자)' : '');
            showSection('main'); 
        }
    }
});
</script>
</body>
</html>
