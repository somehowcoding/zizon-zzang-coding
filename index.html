<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 - Made by 어쩌다코딩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
        /* 전체 화면 레이아웃 */
        #createView { display: flex; height: calc(100vh - 64px); width: 100vw; gap: 0; }
        /* 왼쪽: 실행창 + 블록 조립소 */
        .left-panel { flex: 1; display: flex; flex-direction: column; border-right: 2px solid #e2e8f0; background: white; }
        #canvasArea { height: 40%; background: #ffffff; position: relative; border-bottom: 2px solid #e2e8f0; overflow: hidden; }
        #blocklyDiv { flex: 1; width: 100%; }
        /* 오른쪽: 오브젝트 관리창 */
        .right-panel { width: 350px; background: #f8fafc; display: flex; flex-direction: column; padding: 15px; gap: 15px; }
        
        .obj-box { background: white; border-radius: 20px; padding: 15px; shadow: sm; border: 1px solid #e2e8f0; flex-grow: 1; overflow-y: auto; }
        .obj-card { cursor: pointer; padding: 10px; border-radius: 12px; border: 2px solid transparent; background: #f1f5f9; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .obj-card.active { border-color: #3b82f6; background: #eff6ff; }
        
        .status-panel { background: white; border-radius: 20px; padding: 15px; border: 1px solid #e2e8f0; }
        .input-grid { display: grid; grid-cols: 2; gap: 8px; font-size: 12px; font-weight: bold; }
        .status-input { width: 100%; background: #f1f5f9; border: 1px solid #ddd; border-radius: 6px; padding: 4px; text-align: center; }
        
        /* 오브젝트 실제 그래픽 */
        .game-obj { position: absolute; transform: translate(-50%, -50%); pointer-events: none; transition: 0.1s; display: flex; align-items: center; justify-content: center; background: #3b82f6; color: white; border-radius: 8px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<nav id="topNav" class="bg-white border-b px-6 py-3 flex justify-between items-center hidden h-16">
    <div class="text-xl font-black text-blue-600 italic cursor-pointer" onclick="showSection('main')">지존짱짱 🚀</div>
    <div class="flex items-center gap-6 font-bold">
        <button onclick="showSection('main')">갤러리</button>
        <button onclick="showSection('create')">만들기</button>
        <button onclick="showSection('story')">이야기</button>
        <button id="logoutBtn" class="text-xs text-red-500 underline ml-4">로그아웃</button>
    </div>
</nav>

<div id="authBox" class="min-h-screen flex items-center justify-center"> ... </div>

<main id="mainView" class="hidden p-8"> ... </main>
<section id="storyView" class="hidden p-8"> ... </section>

<section id="createView" class="hidden">
    <div class="left-panel">
        <div id="canvasArea">
            <div class="absolute top-4 left-4 flex gap-2 z-10">
                <button onclick="playProject()" class="bg-green-500 text-white px-4 py-2 rounded-lg font-black shadow-md">▶ 시작</button>
                <button onclick="stopProject()" class="bg-red-500 text-white px-4 py-2 rounded-lg font-black shadow-md">■ 정지</button>
            </div>
            <div id="screen" class="w-full h-full relative bg-slate-50">
                </div>
        </div>
        <div id="blocklyDiv"></div>
    </div>

    <div class="right-panel">
        <div class="bg-blue-600 p-3 rounded-xl text-white text-center font-black">오브젝트 관리</div>
        
        <div id="statusPanel" class="status-panel">
            <div class="grid grid-cols-2 gap-4">
                <div><label>X좌표</label><input type="number" id="stX" class="status-input" onchange="updateObjStatus()"></div>
                <div><label>Y좌표</label><input type="number" id="stY" class="status-input" onchange="updateObjStatus()"></div>
                <div><label>크기</label><input type="number" id="stSize" class="status-input" onchange="updateObjStatus()"></div>
                <div><label>방향</label><input type="number" id="stDir" class="status-input" onchange="updateObjStatus()"></div>
            </div>
        </div>

        <div class="obj-box">
            <div class="flex justify-between items-center mb-4">
                <span class="font-black text-slate-600">목록</span>
                <button onclick="addObj()" class="bg-slate-800 text-white text-xs px-3 py-1 rounded-full">+ 추가하기</button>
            </div>
            <div id="objList"></div>
        </div>

        <button id="saveWorkBtn" class="bg-blue-600 text-white py-4 rounded-2xl font-black">작품 저장하기</button>
    </div>
</section>

<xml id="toolbox" style="display: none">
    <category name="시작" colour="#33b233"><block type="when_run"></block></category>
    <category name="움직임" colour="#33b2cc">
        <block type="move_x"><value name="VAL"><block type="math_number"><field name="NUM">10</field></block></value></block>
        <block type="move_y"><value name="VAL"><block type="math_number"><field name="NUM">10</field></block></value></block>
    </category>
    <category name="흐름" colour="#ccb233"><block type="controls_repeat_ext"></block></category>
    <category name="변수" colour="#cc3333" custom="VARIABLE"></category>
</xml>

<script>
// Firebase 및 기초 설정
const firebaseConfig = { ... }; // 본인의 설정값 유지
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let objects = [];
let selectedId = null;
let workspace = null;

// 한글 블록 정의
Blockly.Blocks['when_run'] = { init: function() { this.appendDummyInput().appendField("▶ 시작하기를 클릭했을 때"); this.setNextStatement(true); this.setColour("#33b233"); } };
Blockly.Blocks['move_x'] = { init: function() { this.appendValueInput("VAL").setCheck("Number").appendField("x좌표를"); this.appendDummyInput().appendField("만큼 이동하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); } };
Blockly.Blocks['move_y'] = { init: function() { this.appendValueInput("VAL").setCheck("Number").appendField("y좌표를"); this.appendDummyInput().appendField("만큼 이동하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#33b2cc"); } };

Blockly.Msg["CONTROLS_REPEAT_TITLE"] = "%1번 반복하기";

function showSection(name) {
    ['mainView', 'createView', 'storyView'].forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById(name + 'View').classList.remove('hidden');
    if(name === 'create' && !workspace) {
        workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox') });
        if(objects.length === 0) addObj();
    }
}

// 오브젝트 로직
function addObj() {
    const id = Date.now();
    objects.push({ id, name: "오브젝트"+(objects.length+1), x: 200, y: 150, size: 60, dir: 90, defX: 200, defY: 150 });
    render();
    selectObj(id);
}

function selectObj(id) {
    selectedId = id;
    const o = objects.find(obj => obj.id === id);
    document.getElementById('stX').value = o.x;
    document.getElementById('stY').value = o.y;
    document.getElementById('stSize').value = o.size;
    document.getElementById('stDir').value = o.dir;
    render();
}

function updateObjStatus() {
    const o = objects.find(obj => obj.id === selectedId);
    if(!o) return;
    o.x = Number(document.getElementById('stX').value);
    o.y = Number(document.getElementById('stY').value);
    o.size = Number(document.getElementById('stSize').value);
    o.dir = Number(document.getElementById('stDir').value);
    o.defX = o.x; o.defY = o.y;
    render();
}

// 화면 렌더링 (캔버스 + 목록)
function render() {
    const screen = document.getElementById('screen');
    const list = document.getElementById('objList');
    screen.innerHTML = ''; list.innerHTML = '';

    objects.forEach(o => {
        // 캔버스에 그리기
        const div = document.createElement('div');
        div.className = 'game-obj';
        div.style.left = o.x + 'px';
        div.style.top = o.y + 'px';
        div.style.width = o.size + 'px';
        div.style.height = o.size + 'px';
        div.style.transform = `translate(-50%, -50%) rotate(${o.dir - 90}deg)`;
        div.innerText = o.name;
        screen.appendChild(div);

        // 목록에 추가
        const card = document.createElement('div');
        card.className = `obj-card ${o.id === selectedId ? 'active' : ''}`;
        card.onclick = () => selectObj(o.id);
        card.innerHTML = `<span class="font-bold">🖼️ ${o.name}</span><button onclick="deleteObj(${o.id})" class="text-red-400 text-xs">삭제</button>`;
        list.appendChild(card);
    });
}

function deleteObj(id) {
    objects = objects.filter(o => o.id !== id);
    if(selectedId === id) selectedId = objects[0]?.id || null;
    render();
}

function stopProject() {
    objects.forEach(o => { o.x = o.defX; o.y = o.defY; });
    render();
    if(selectedId) selectObj(selectedId);
}

function playProject() { alert("코딩대로 움직임이 시작됩니다!"); }

// (가입/로그인 등 파이어베이스 로직은 이전과 동일하게 유지)
</script>
</body>
</html>
